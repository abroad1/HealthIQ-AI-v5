# P3-PROSE-DEPTH-1 / P3-PROSE-DEPTH-1A — MR candidate asset templates (skeletal; CANDIDATE only)
# Do not promote to production without medical review and compile/promotion sprint.

schema_version: "1.0.1"
template_pack_id: mr_candidate_templates_v1
review_status_default: CANDIDATE

templates:

  base_biomarker_explainer:
    asset_id: candidate_base_biomarker_EXAMPLE_v1
    asset_type: base_biomarker_explainer
    audience: retail_consumer
    scope: biomarker_id_placeholder
    range_state: not_applicable
    context_dependencies:
      supporting_markers: []
      missing_markers: []
      pattern_dependencies: []
      lifestyle_context: []
      medication_context: []
      supplement_context: []
      confidence_limiters: []
    personalisation_axes: []
    trigger_conditions:
      biomarker_present: true
      result_direction: any
    evidence_refs:
      - "educational: general physiology reference — MR to cite"
    evidence_strength: educational_only
    safety_boundaries:
      no_diagnosis: true
      no_treatment_recommendation: true
      no_supplement_or_medication_advice: true
    review_status: CANDIDATE
    destination_mapping:
      target_pack: backend/ssot/retail_explainer_v1/registry.yaml
      target_registry_key: biomarker_id_placeholder
      narrative_section_id: null
    prose_content:
      title: "[Biomarker display name]"
      body: |
        [Educational description of what the marker measures and why it is discussed on panels.
        Non-diagnostic. UK consumer-facing. Does not explain in-range/high/low/borderline interpretation.]
    interpretive_limitations:
      - "Base explainer does not cover marker-state interpretation; see marker-state explainer assets."
    max_word_count: 180
    authored_by: MR_LLM_CANDIDATE
    authored_utc: "YYYY-MM-DDTHH:MM:SSZ"
    source_asset_ids: []
    supersedes_asset_ids: []
    notes_for_medical_reviewer: "Confirm educational framing only; does not replace marker-state explainers."

