      no_treatment_recommendation: true
      no_supplement_or_medication_advice: true
    review_status: CANDIDATE
    destination_mapping:
      target_pack: TBD_marker_state_prose_pack_v1
      target_registry_key: biomarker_id_placeholder_in_range
      narrative_section_id: marker_evidence
    prose_content:
      retail: >
        [Explain what an in-range result may cautiously suggest in context.
        Include what strengthens or limits interpretation. Do not diagnose. Do not use generic disclaimer wording.]
      clinician: null
    interpretive_limitations:
      - "[Specific limit — e.g. single timepoint cannot confirm trend without prior results.]"
    max_word_count: 120
    authored_by: MR_LLM_CANDIDATE
    authored_utc: "YYYY-MM-DDTHH:MM:SSZ"
    source_asset_ids: []
    supersedes_asset_ids: []
