      interpretive_caution: "General education only; absence does not imply required testing."
    max_word_count: 120
    authored_by: MR_LLM
    authored_utc: "YYYY-MM-DDTHH:MM:SSZ"
    source_asset_ids: []
    supersedes_asset_ids: []
    notes_for_medical_reviewer: "Align with P2-3 missing-marker pack structure."

  positive_resilience_qualifier:
