    evidence_refs: []
    evidence_strength: weak
    safety_boundaries:
      no_diagnosis: true
      no_treatment_recommendation: true
      no_supplement_or_medication_advice: true
    review_status: CANDIDATE
    destination_mapping:
      target_pack: knowledge_bus/governance/context_modifier_catalogue_draft_v1.yaml
