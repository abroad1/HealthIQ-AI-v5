    evidence_strength: educational_only
    safety_boundaries:
      no_diagnosis: true
      no_treatment_recommendation: true
      no_supplement_or_medication_advice: true
    review_status: CANDIDATE
    destination_mapping:
      target_pack: knowledge_bus/missing_marker_explainers_v1/missing_marker_explainers_v1.yaml
      target_registry_key: missing_marker_id_placeholder
      narrative_section_id: missing_evidence_limitations
