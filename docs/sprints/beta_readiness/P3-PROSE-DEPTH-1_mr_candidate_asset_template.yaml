      narrative_section_id: body_overview
    prose_content:
      additive_fragment: "[Supplement may affect interpretation context — educational only.]"
    max_word_count: 55
    authored_by: MR_LLM
    authored_utc: "YYYY-MM-DDTHH:MM:SSZ"
    source_asset_ids: []
    supersedes_asset_ids: []
