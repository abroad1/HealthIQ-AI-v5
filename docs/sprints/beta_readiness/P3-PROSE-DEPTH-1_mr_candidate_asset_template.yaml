  missing_marker_caveat:
    asset_id: candidate_missing_marker_EXAMPLE_v1
    asset_type: missing_marker_caveat
    audience: retail_consumer
    scope: biomarker_id_placeholder
    personalisation_axes: []
    trigger_conditions:
