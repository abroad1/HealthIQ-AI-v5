    max_word_count: 50
    authored_by: MR_LLM
    authored_utc: "YYYY-MM-DDTHH:MM:SSZ"
    source_asset_ids: []
    supersedes_asset_ids: []
    notes_for_medical_reviewer: "Must not reassure without governing signal state."
