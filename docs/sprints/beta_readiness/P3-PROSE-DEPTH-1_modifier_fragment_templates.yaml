schema_version: "1.0.0"
pack_id: modifier_fragment_templates_v1
work_id: P3-PROSE-DEPTH-1
authority: DYNAMIC-PROSE-ARCH-1
runtime_consumed: false
candidate_only: true

principles:
  modifiers_are_additive: true
  modifiers_do_not_replace_base_prose: true
  no_causation_without_evidence: true
  no_advice: true
  gemini_must_not_infer_modifier_relationships: true
  max_fragment_words_default: 60

fragment_types:

  lifestyle_modifier_fragment:
    structure:
      modifier_id: string
      applies_to_biomarker_ids: list
      trigger_band: string
      additive_fragment: string
      evidence_refs: list
      prohibited_claims:
        - diagnosis
        - treatment_recommendation
        - supplement_advice
        - medication_advice
        - causation_without_evidence
      max_word_count: 60
      destination_mapping:
        narrative_section_id: body_overview
        modifier_catalogue_ref: knowledge_bus/governance/context_modifier_catalogue_draft_v1.yaml
    high_value_classes:
      - mod_q_lifestyle_alcohol
      - mod_q_lifestyle_smoking
      - mod_q_lifestyle_exercise
      - mod_q_hydration

  medication_modifier_fragment:
    structure:
      intervention_class_id: string
      applies_to_biomarker_ids: list
      additive_fragment: string
      evidence_refs: list
      prohibited_claims:
        - dose_change_advice
        - start_stop_medication
        - diagnosis
      max_word_count: 60
      destination_mapping:
        narrative_section_id: marker_evidence
        intervention_registry_ref: knowledge_bus/interventions/intervention_effects_registry_v1.yaml
    high_value_classes:
      - lipid_lowering_statin
      - biguanide_metformin
      - raas_inhibitor

  supplement_modifier_fragment:
    structure:
      modifier_id: string
      applies_to_biomarker_ids: list
      additive_fragment: string
      evidence_refs: list
      prohibited_claims:
        - supplement_recommendation
        - diagnosis
      max_word_count: 55
      destination_mapping:
        narrative_section_id: body_overview
        modifier_catalogue_ref: knowledge_bus/governance/context_modifier_catalogue_draft_v1.yaml
    high_value_classes:
      - mod_sup_creatine
      - mod_sup_iron
      - mod_sup_b12
      - mod_sup_folate
      - mod_sup_vitamin_d

  conflict_resolution_fragment:
    structure:
      conflict_id: string
      competing_modifiers: list
      resolution_rule: suppress_weaker | append_both_with_caution | defer_to_clinician_section
      suppression_note: string
      max_word_count: 40
    note: Template only — runtime binding deferred.

  suppression_rule_note:
    structure:
      rule_id: string
      when: string
      suppress_fragment_ids: list
      rationale: string
    note: Prevents contradictory modifier stacking; not runtime-active.

required_evidence:
  non_educational_claims_require_citation: true
  uncertainty_must_be_stated: true

prohibited_claims_global:
  - diagnosis
  - confirms_disease
  - rules_out_disease
  - treatment_recommendation
  - medication_action
  - supplement_recommendation
  - test_ordering_obligation

destination_mapping_placeholder:
  production_status: not_bound
  promotion_sprint: deferred
  runtime_active: false
