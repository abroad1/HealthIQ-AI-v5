    prose_content:
      display_title: "Blood sugar and metabolic context"
      overview: |
        Blood glucose regulation sits at the centre of how the body converts food into energy and protects organs from the effects of sustained high or low sugar levels. Glucose is the primary fuel for most cells, and the pancreas produces insulin to move glucose from the bloodstream into tissues. Two markers give different windows into this system: fasting glucose captures a single moment, reflecting what the blood sugar is doing in a steady state; HbA1c reflects the average over approximately 8–12 weeks by measuring how much glucose has attached to haemoglobin in red blood cells. Together they provide a longitudinal and point-in-time view. Insulin itself, where measured, adds context about how hard the pancreas is working to achieve that glucose level — a useful but not routine addition. These markers are all sensitive to recent food and drink, the timing of the blood draw, illness, stress, and — for those taking glucose-lowering medication — to treatment effects. HealthIQ uses the combination of available markers to characterise the glycaemic picture; where markers are absent, interpretation is limited to the data available.
