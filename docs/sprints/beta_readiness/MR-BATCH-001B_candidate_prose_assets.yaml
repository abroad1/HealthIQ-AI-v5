    prose_content:
      title: "Total protein"
      body: |
        The blood contains a rich mix of proteins — transport carriers, immune defenders, clotting factors, and structural scaffolding for tissues. Total protein measures their combined concentration, and since the liver manufactures most of them, this reading reflects both nutritional status and liver synthetic capacity. The two main contributors are albumin (the most abundant protein, involved in transport and osmotic pressure) and globulins (which include immune proteins and a range of other functional proteins). Total protein on its own is limited; its value comes from comparison with albumin. If albumin is within range but total protein is raised, the globulin fraction is elevated. If albumin is low and total protein is also low, the picture is different again. Total protein is most interpretable alongside a separate albumin measurement — without albumin, the globulin fraction (which includes immune proteins) cannot be estimated.
      clinician: null
    interpretive_limitations:
      - "Total protein without albumin does not allow albumin-globulin breakdown; the two should always be interpreted together."
