    prose_content:
      display_title: "Liver enzyme context"
      overview: |
        Liver enzymes in the blood are signals of what is happening inside liver cells — not simply numbers on a report. When liver cells are under stress, they release enzymes into the circulation; the pattern, degree, and combination of elevations carries more meaning than any single value. The hepatic panel typically includes ALT (a marker closely tied to liver cell health), AST (also found in muscle), GGT (sensitive to alcohol-related strain and biliary changes), and ALP (raised in both liver and bone conditions). Bilirubin and albumin add further context about how the liver is managing its processing and synthetic functions. A mildly elevated reading on one occasion, in a person with no symptoms and no other abnormalities, is often not significant — but it depends on which enzyme, how elevated, and the full clinical picture. Alcohol, certain medications, exercise, fatty change in liver tissue, and viral infections can all affect these markers. What HealthIQ can assess is the pattern across the available markers; where the panel is incomplete, interpretive confidence is lower.
      clinician: null
