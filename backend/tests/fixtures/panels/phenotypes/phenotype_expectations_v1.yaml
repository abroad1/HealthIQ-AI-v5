schema_version: "v1"
suite_id: "phenotype_suite_v1"
updated_at: "2026-04-08"
notes:
  - "Expectations are clinically declared first; engine output must not be copied back into expectations."
  - "Chain coverage is enforced for homocysteine (v1), renal stress (KB-S56B), HbA1c metabolic stress, and thyroid–lipid disturbance (KB-S58B) where interaction-map edges and runtime behaviour justify it."

phenotypes:
  - phenotype_id: "ph_vascular_hcy_inflammation_v1"
    chain_coverage_status: "enforced"
    clinical_intent: "Homocysteine elevation with inflammatory context; should produce vascular chain and root-cause hypotheses."
    fixture_filename: "ph_vascular_hcy_inflammation_v1.json"
    expected_signals:
      must_fire:
        - "signal_homocysteine_elevation_context"
      must_not_fire: []
    expected_chains:
      must_exist: true
      min_count: 1
      min_chain_confidence: 0.40
      must_include_any_signal:
        - "signal_homocysteine_elevation_context"
      optional_expected_sequences: []
    expected_root_cause:
      must_exist: true
      min_hypothesis_count: 3
      applies_to_signal_id: "signal_homocysteine_elevation_context"

