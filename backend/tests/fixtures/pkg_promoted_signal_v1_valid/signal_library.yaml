library:
  package_id: KBP-9997
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: Fixture Promoted Signal v1 Signal Library
  description: Minimal valid v2.0.0 signal library for promoted signal intelligence v1 validation tests.
signals:
  - signal_id: signal_fixture_psi_alt_high
    name: Fixture PSI ALT High
    description: Fixture signal for promoted signal intelligence v1 contract validation.
    system: hepatic
    primary_metric: alt
    trigger_direction: high
    supporting_metrics:
      - biomarker_id: ast
        expected_direction: high
        role: corroborator
        availability: common
        rationale: AST elevation alongside ALT corroborates hepatocellular injury pattern.
      - biomarker_id: ggt
        expected_direction: high
        role: differential_marker
        availability: common
        rationale: GGT elevation differentiates cholestatic from pure hepatocellular injury pattern.
    dependencies:
      biomarkers:
        - alt
        - ast
        - ggt
      derived_metrics: []
      signals: []
    thresholds:
      - threshold_id: alt_lab_range_activation_placeholder
        metric_id: alt
        operator: ">="
        value: 9999.0
        severity: at_risk
        description: Validator placeholder; runtime activation uses lab_range_exceeded.
    activation_logic: lab_range_exceeded
    activation_config:
      upper_bound_state: suboptimal
      enable_lower_bound: false
      lower_bound_state: suboptimal
    override_rules:
      - rule_id: or_alt_ast_concurrent_elevation
        description: Escalate when concurrent AST is also above the laboratory upper reference limit.
        conditions:
          - metric_id: ast
            condition_type: all_of
            comparator_type: lab_range_boundary
            boundary: above_max
        resulting_state: at_risk
        source_refs:
          - source_fixture_study
    output:
      signal_value: alt
      signal_state: at_risk
      confidence: confidence_model_v1
      primary_metric: alt
      supporting_markers:
        - ast
        - ggt
