# Minimal valid investigation spec v3.0.0 (fixture for KB-S47c)
investigation_spec_contract_version: "3.0.0"
spec_id: inv_fixture_v3_alp
signal_id: signal_alp_high
research_domain: hepatic
primary_marker:
  biomarker_id: alp
  rationale: Alkaline phosphatase elevation may reflect hepatobiliary or bone turnover processes.
  signal_system: hepatic
trigger_direction: high
activation:
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
states:
  baseline_state: suboptimal
  escalation_state: at_risk
supporting_markers:
  - biomarker_id: ggt
    expected_direction: high
    role: differential_marker
    relationship_kind: differential
    availability: common
    rationale: GGT elevation supports a hepatobiliary source when ALP is high.
  - biomarker_id: bilirubin
    expected_direction: high
    role: mechanism_marker
    relationship_kind: mechanism
    availability: common
    rationale: Bilirubin co-elevation supports cholestatic injury alongside ALP.
  - biomarker_id: calcium
    expected_direction: either
    role: corroborator
    relationship_kind: corroboration
    availability: common
    rationale: Calcium context can support bone turnover when GGT is not elevated.
hypotheses:
  - hypothesis_id: hyp_hepatobiliary
    rank: 1
    physiological_claim: Elevated ALP with GGT and bilirubin pattern supports hepatobiliary obstruction or cholestasis.
    evidence_strength: strong
    caveats:
      - Isolated ALP changes still require clinical correlation.
    missing_data:
      policy: explicit_unknown_allowed
    supporting_marker_refs:
      - ggt
      - bilirubin
    contradiction_markers: []
  - hypothesis_id: hyp_bone_turnover
    rank: 2
    physiological_claim: When GGT is not concordant, ALP may reflect bone turnover or vitamin D related bone activity.
    evidence_strength: moderate
    caveats:
      - Overlap with mild hepatobiliary elevation is possible.
    missing_data:
      policy: explicit_unknown_allowed
    supporting_marker_refs:
      - ggt
      - calcium
    contradiction_markers: []
hypothesis_ranking:
  ordered_hypothesis_ids:
    - hyp_hepatobiliary
    - hyp_bone_turnover
confirmatory_tests:
  - test_id: ct_repeat_lft_bone_profile
    rationale: Repeat liver panel and bone alkaline phosphatase isoenzymes clarify tissue origin when clinically indicated.
override_rules:
  - rule_id: or_fixture_alp_escalation
    resulting_state: at_risk
    description: Escalate when ALP breach is accompanied by GGT lab-range breach.
    conditions:
      - metric_id: ggt
        operator: ">"
        condition_type: all_of
        comparator_type: lab_range_boundary
        boundary: above_max
    source_refs:
      - source_fixture_2021
evidence:
  evidence_strength: strong
  sources:
    - source_id: source_fixture_2021
      paper_title: Fixture reference for validation only
      journal: Test Journal
      year: 2021
  physiological_claim: ALP isoenzymes arise from liver and bone; pattern with GGT and bilirubin refines interpretation.
  threshold_notes: Lab-range breach is the primary trigger; overrides use lab-range conditions only in this fixture.
narrative:
  mechanism: Tissue-specific ALP release from hepatocytes or osteoblasts underlies elevation patterns.
  biological_pathway: Biliary excretion and bone remodeling both regulate circulating ALP activity.
  interpretation: Combined GGT, bilirubin, and calcium context separates common hepatobiliary from bone-predominant patterns.
  implications: Persistent unexplained ALP elevation warrants directed hepatobiliary or metabolic bone evaluation per clinical context.
  supporting_marker_roles: GGT is the primary discriminator; bilirubin supports cholestasis; calcium aids bone-source consideration.
