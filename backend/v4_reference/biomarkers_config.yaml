# Derived Biomarkers (Calculated Ratios and Indices)
derived_biomarkers:
  # Lipid Ratios
  tg_hdl_ratio:
    name: "Triglyceride/HDL Ratio"
    unit: "ratio"
    scoring_direction: "lower_is_better"
    description: "Ratio of triglycerides to HDL cholesterol"
    formula: "triglycerides / hdl"
    source_biomarkers: ["triglycerides", "hdl"]
    metadata:
      category: "cardiovascular"
    
  tc_hdl_ratio:
    name: "Total Cholesterol/HDL Ratio"
    unit: "ratio"
    scoring_direction: "lower_is_better"
    description: "Ratio of total cholesterol to HDL cholesterol"
    formula: "total_cholesterol / hdl"
    source_biomarkers: ["total_cholesterol", "hdl"]
    metadata:
      category: "cardiovascular"
    
  ldl_hdl_ratio:
    name: "LDL/HDL Ratio"
    unit: "ratio"
    scoring_direction: "lower_is_better"
    description: "Ratio of LDL to HDL cholesterol"
    formula: "ldl / hdl"
    source_biomarkers: ["ldl", "hdl"]
    metadata:
      category: "cardiovascular"
    
  apob_apoa1_ratio:
    name: "ApoB/ApoA1 Ratio"
    unit: "ratio"
    scoring_direction: "lower_is_better"
    description: "Ratio of ApoB to ApoA1"
    formula: "apob / apoa1"
    source_biomarkers: ["apob", "apoa1"]
    metadata:
      category: "cardiovascular"
    
  cholesterol_hdl_ratio:
    name: "Cholesterol/HDL Ratio"
    unit: "ratio"
    scoring_direction: "lower_is_better"
    description: "Ratio of total cholesterol to HDL cholesterol"
    formula: "total_cholesterol / hdl"
    source_biomarkers: ["total_cholesterol", "hdl"]
    metadata:
      category: "cardiovascular"
    
  # Metabolic Ratios
  homa_ir:
    name: "HOMA-IR"
    unit: "ratio"
    scoring_direction: "lower_is_better"
    description: "Homeostatic Model Assessment of Insulin Resistance"
    formula: "(glucose * insulin) / 22.5"
    source_biomarkers: ["glucose", "insulin"]
    
  # Inflammatory Ratios
  nlr:
    name: "Neutrophil/Lymphocyte Ratio"
    unit: "ratio"
    scoring_direction: "lower_is_better"
    description: "Ratio of neutrophil count to lymphocyte count"
    formula: "neutrophil_count / lymphocyte_count"
    source_biomarkers: ["neutrophil_count", "lymphocyte_count"]
    
  # Protein Ratios
  ag_ratio:
    name: "Albumin/Globulin Ratio"
    unit: "ratio"
    scoring_direction: "contextual"
    description: "Ratio of albumin to globulin"
    formula: "albumin / globulin"
    source_biomarkers: ["albumin", "globulin"]
    
  # Kidney Function
  urea_creatinine_ratio:
    name: "Urea/Creatinine Ratio"
    unit: "ratio"
    scoring_direction: "contextual"
    description: "Ratio of blood urea nitrogen to creatinine"
    formula: "urea / creatinine"
    source_biomarkers: ["urea", "creatinine"]
    
  # Metabolic Calculations
  anion_gap:
    name: "Anion Gap"
    unit: "mEq/L"
    scoring_direction: "contextual"
    description: "Calculated anion gap from electrolytes"
    formula: "sodium + potassium - (chloride + bicarbonate)"
    source_biomarkers: ["sodium", "chloride", "bicarbonate", "potassium"]
    
  # Body Composition
  waist_to_height_ratio:
    name: "Waist-to-Height Ratio"
    unit: "ratio"
    scoring_direction: "lower_is_better"
    description: "Ratio of waist circumference to height"
    formula: "waist_cm / height_cm"
    source_biomarkers: []
    
  # Iron Metabolism
  transferrin_saturation:
    name: "Transferrin Saturation"
    unit: "%"
    scoring_direction: "contextual"
    description: "Percentage of transferrin bound to iron"
    formula: "(iron / transferrin) * 100"
    source_biomarkers: ["iron", "transferrin"]
    normal_range: [20.0, 50.0]
    status_logic:
      low: "value < 20.0"
      normal: "20.0 <= value <= 50.0"
      high: "value > 50.0" 

# Calculated Ratios - Fallback Reference Ranges
# These provide clinically accepted normal ranges when user input lacks reference ranges
calculated_ratios:
  urea_creatinine_ratio:
    inferred_ranges:
      normal_low: 12.0
      normal_high: 20.0
    clinical_tiers:
      low: "Normal"
      high: "May indicate dehydration"

  tc_hdl_ratio:
    inferred_ranges:
      normal_low: 0.0
      normal_high: 4.5
    clinical_tiers:
      low: "Excellent cardiovascular profile"
      high: "Increased cardiovascular risk"

