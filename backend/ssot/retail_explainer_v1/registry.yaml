# FE-VISUALISATION-B1B — governed retail explainer registry (v1)
# Ownership: retail_explainer_v1 SSOT. Keys must match canonical biomarker ids and cluster-schema system keys.
# Symptom relevance and personalised interpretation are out of scope for this file.
# ContributionContextV1 is assembled at runtime (cluster membership); it is not stored here.

registry_version: "1.0.1"

biomarkers:
  glucose:
    title: "Glucose (blood sugar)"
    body: |
      Glucose is a simple sugar and the main fuel your cells use for quick energy. A blood glucose
      measurement reflects how much is circulating when the sample was taken.

      It matters because your body works to keep glucose in a balanced range for energy, hydration,
      and organ function. Results are interpreted alongside other markers and clinical context.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  hba1c:
    title: "HbA1c (glycated haemoglobin)"
    body: |
      HbA1c reflects average blood glucose exposure over roughly the past two to three months by
      measuring how much glucose is attached to haemoglobin in red blood cells.

      Because red cells live for months, HbA1c smooths out day-to-day swings and is widely used as
      a longer-term glycaemic indicator alongside single glucose readings.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  insulin:
    title: "Insulin"
    body: |
      Insulin is a hormone made by the pancreas that helps move glucose from the bloodstream into
      cells so it can be used or stored.

      It sits in a network of hormones and tissues that regulate energy storage and release.
      Interpretation depends on sampling context and other metabolic markers, not this text alone.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  total_cholesterol:
    title: "Total cholesterol"
    body: |
      Total cholesterol is the sum of cholesterol carried in the blood across major particle types.
      Cholesterol is a fat-like substance used to build cell membranes and make certain hormones.

      It is one piece of a broader cardiovascular risk picture that typically includes HDL, LDL or
      apoB-related measures, triglycerides, blood pressure, and personal history.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  ldl_cholesterol:
    title: "LDL cholesterol"
    body: |
      LDL cholesterol measures cholesterol carried in low-density lipoprotein particles. In public
      health education it is often described as delivering cholesterol to tissues.

      Higher LDL cholesterol is commonly highlighted as a modifiable factor in long-term
      cardiovascular risk models, but your report should be interpreted as a whole—not from this
      paragraph alone.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  hdl_cholesterol:
    title: "HDL cholesterol"
    body: |
      HDL cholesterol reflects cholesterol carried in high-density lipoprotein particles. It is
      often described in education as part of the system that moves cholesterol back toward the
      liver for processing.

      HDL is interpreted alongside triglycerides, LDL or non-HDL measures, and overall risk
      context—not as a standalone “good or bad” label.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  triglycerides:
    title: "Triglycerides"
    body: |
      Triglycerides are a form of fat stored and transported in the blood after meals and during
      fasting, depending on metabolism and recent intake.

      They relate to how your body handles dietary energy and insulin sensitivity and are often
      reviewed together with glucose-related markers and HDL cholesterol.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  non_hdl_cholesterol:
    title: "Non-HDL cholesterol"
    body: |
      Non-HDL cholesterol is calculated from total cholesterol minus HDL cholesterol. In educational
      terms, it captures cholesterol carried by atherogenic (plaque-associated) particle types as a
      group.

      It is sometimes used as a practical complement to LDL in risk conversations because it is
      available whenever total cholesterol and HDL are measured.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  apob:
    title: "Apolipoprotein B (ApoB)"
    body: |
      ApoB is a protein found on several cholesterol- and triglyceride-carrying particles. Lab
      tests often use ApoB concentration as a proxy for the number of these particles in circulation.

      Particle number concepts are part of modern lipid education, but numbers still require
      clinical interpretation alongside the rest of your panel and history.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  creatinine:
    title: "Creatinine"
    body: |
      Creatinine is a waste product formed from muscle metabolism. Blood creatinine is commonly used
      in equations that estimate how well the kidneys filter waste.

      A single value reflects muscle mass, hydration, and kidney function signals together; it is
      not a full kidney assessment by itself.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  egfr:
    title: "eGFR (estimated glomerular filtration rate)"
    body: |
      eGFR is an estimated measure of kidney filtration derived from blood creatinine and other
      standard inputs using validated equations.

      It helps clinicians group kidney function for monitoring and decisions, but estimation has
      limits and should be interpreted in clinical context.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  alt:
    title: "ALT (alanine aminotransferase)"
    body: |
      ALT is an enzyme found largely in liver cells. When liver cells are stressed or injured, ALT
      can rise in the bloodstream.

      ALT is a laboratory signal, not a specific disease label. It is interpreted with other liver
      tests, history, medications, and imaging when needed.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  ast:
    title: "AST (aspartate aminotransferase)"
    body: |
      AST is an enzyme present in the liver and also in other tissues such as muscle and heart.
      Because it is less liver-specific than ALT, results are usually read alongside ALT and other tests.

      Patterns over time and the full panel matter more than any single snapshot in isolation.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  hemoglobin:
    title: "Haemoglobin"
    body: |
      Haemoglobin is the protein inside red blood cells that binds oxygen in the lungs and delivers
      it to tissues.

      Blood haemoglobin concentration helps assess oxygen-carrying capacity and is interpreted
      with cell indices, iron studies, and clinical symptoms when relevant.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  ferritin:
    title: "Ferritin"
    body: |
      Ferritin reflects iron stored in the body and is commonly used as part of assessing iron
      balance. It can also rise with inflammation because it behaves like an acute-phase reactant.

      That dual role is why ferritin is interpreted with other iron markers and the clinical picture,
      not from a single value alone.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  vitamin_d:
    title: "Vitamin D (25‑hydroxyvitamin D)"
    body: |
      The commonly measured form, 25‑hydroxyvitamin D, reflects vitamin D obtained from sun exposure,
      diet, and supplements over recent months.

      Vitamin D supports bone mineralisation and has wide roles in physiology; laboratory thresholds
      vary by lab method and guideline context.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  tsh:
    title: "TSH (thyroid stimulating hormone)"
    body: |
      TSH is a pituitary hormone that signals the thyroid gland to produce thyroid hormones. In
      steady state, TSH moves inversely with thyroid hormone levels in many common patterns.

      Thyroid testing is interpreted as a panel (often including free T4 and sometimes antibodies)
      and symptoms, not from TSH alone.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  iron:
    title: "Iron (serum iron)"
    body: |
      Serum iron measures iron circulating in the blood at the time of sampling. It reflects
      transport traffic rather than total body iron stores on its own.

      Iron sits in a network with ferritin, transferrin, and transferrin saturation; interpretation
      depends on the wider panel and clinical context, not this marker in isolation.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  transferrin:
    title: "Transferrin"
    body: |
      Transferrin is a transport protein that carries iron in the bloodstream. Its concentration
      can shift with iron status, inflammation, and liver synthetic function.

      Transferrin is read alongside serum iron, ferritin, and saturation to describe iron traffic
      rather than as a standalone label.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  transferrin_saturation:
    title: "Transferrin saturation"
    body: |
      Transferrin saturation summarises how fully iron transport proteins are loaded. It helps
      place serum iron and ferritin in context when assessing circulating iron availability.

      A single value reflects sampling timing and the wider iron/inflammatory picture; repeat and
      panel context matter for interpretation.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  crp:
    title: "CRP (C‑reactive protein)"
    body: |
      CRP is an acute-phase protein that rises with inflammation and tissue injury. In educational
      materials it is often grouped with immune and cardiovascular context markers.

      CRP is non-specific: elevation does not, by itself, identify a cause. Results are interpreted
      with symptoms, history, and other laboratory signals.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  mcv:
    title: "MCV (mean cell volume)"
    body: |
      MCV describes the average size of red blood cells. It sits adjacent to haemoglobin and iron
      markers when reviewing oxygen-carrying capacity and erythroid dynamics.

      Cell volume shifts with nutrition, marrow activity, and other physiological factors; it is
      interpreted as part of a blood-count pattern, not in isolation.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  vitamin_b12:
    title: "Vitamin B12"
    body: |
      Vitamin B12 supports DNA synthesis, nerve function, and red-cell production. Blood levels
      reflect intake, absorption, and tissue need over recent time.

      B12 is often read with folate and homocysteine-related markers in one-carbon metabolism
      education, but individual results still require clinical context.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  active_b12:
    title: "Active B12 (holotranscobalamin)"
    body: |
      Active B12 measures the fraction of vitamin B12 available for cellular uptake. It is
      sometimes used alongside total B12 when assessing functional B12 status in research and
      clinical practice.

      Interpretation depends on assay method, other B12-related markers, and the full clinical
      picture—not this value alone.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  folate:
    title: "Folate (serum folate)"
    body: |
      Folate is a B vitamin involved in DNA synthesis and one-carbon metabolism. Serum folate
      reflects recent intake and absorption but does not fully describe tissue stores.

      Folate is commonly reviewed with B12 and homocysteine in educational materials about
      methylation and erythropoiesis, with panel-level interpretation remaining essential.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  homocysteine:
    title: "Homocysteine"
    body: |
      Homocysteine sits in one-carbon metabolism pathways linked to B vitamins, folate, and vascular
      education contexts. Elevated values can reflect multiple physiological influences.

      Homocysteine is a pathway-level signal read with related vitamins and clinical context—not a
      standalone disease label from a single reading.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  free_t3:
    title: "Free T3 (free triiodothyronine)"
    body: |
      Free T3 is the biologically active thyroid hormone fraction available to tissues. It is
      interpreted with TSH and free T4 as part of thyroid panel education.

      Isolated shifts can reflect systemic illness, conversion dynamics, or broader thyroid hormone
      traffic; the full panel and clinical setting matter.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  free_t4:
    title: "Free T4 (free thyroxine)"
    body: |
      Free T4 reflects circulating thyroxine not bound to carrier proteins. It helps describe thyroid
      hormone output alongside TSH and, when measured, free T3.

      Thyroid hormones influence metabolic rate and energy context; laboratory grouping supports
      panel review rather than single-value conclusions.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  tpo_ab:
    title: "TPO antibodies (thyroid peroxidase antibodies)"
    body: |
      TPO antibodies mark immune recognition of thyroid peroxidase, an enzyme involved in thyroid
      hormone synthesis. Antibody elevation adds context when read with thyroid function markers.

      Antibody positivity alone is not a diagnosis; interpretation depends on TSH, free T4, free T3,
      and clinical follow-up as appropriate.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  bilirubin:
    title: "Bilirubin"
    body: |
      Bilirubin is a breakdown product of haemoglobin processing. Blood levels reflect production,
      liver handling, and excretion pathways.

      Bilirubin shifts with haemolysis, liver chemistry, and bile flow patterns; it is interpreted
      with other liver tests and clinical context, not from one value alone.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  ggt:
    title: "GGT (gamma‑glutamyl transferase)"
    body: |
      GGT is an enzyme found in liver and bile duct tissues. It often rises with cholestatic or
      hepatobiliary stress signals and is read alongside ALT, AST, and bilirubin.

      GGT can also be influenced by medications and alcohol exposure in population education
      materials; clinical correlation remains essential.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  urea:
    title: "Urea (blood urea nitrogen context)"
    body: |
      Urea is a waste product of protein metabolism cleared by the kidneys. Blood urea reflects
      kidney filtration, hydration, and protein intake together.

      Urea is interpreted with creatinine, eGFR, and clinical context rather than as an isolated
      kidney function label.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  urate:
    title: "Urate (uric acid)"
    body: |
      Urate is the end product of purine metabolism. Blood urate reflects production, renal
      clearance, and dietary factors.

      Urate is commonly discussed in metabolic and kidney education contexts; interpretation depends
      on the wider panel, symptoms, and repeat measures when relevant.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  apoa1:
    title: "Apolipoprotein A1 (ApoA1)"
    body: |
      ApoA1 is the main protein on HDL particles and participates in reverse cholesterol transport
      education. It complements HDL cholesterol and broader lipid particle summaries.

      ApoA1 is one facet of lipid transport architecture, not a standalone cardiovascular
      diagnosis from a single measurement.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  lipoprotein_a:
    title: "Lipoprotein(a)"
    body: |
      Lipoprotein(a) is an LDL-like particle with an additional protein component. It is discussed
      in long-term cardiovascular risk education alongside other lipid markers.

      Values are influenced by genetics and assay methods; clinical use varies by guideline and
      must be interpreted with full risk context.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  alp:
    title: "ALP (alkaline phosphatase)"
    body: |
      ALP is an enzyme found in liver, bone, and other tissues. Blood ALP can rise with bile flow
      changes, bone turnover, or growth in younger individuals.

      ALP is interpreted with GGT, bilirubin, and clinical context to help separate hepatic from
      bone-related patterns when needed.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  albumin:
    title: "Albumin"
    body: |
      Albumin is the major protein synthesized by the liver and helps maintain fluid balance in the
      bloodstream. Low values can reflect synthetic function, nutrition, or inflammation-related
      redistribution.

      Albumin is read with liver enzymes, kidney markers, and clinical history—not as a single
      organ diagnosis.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  potassium:
    title: "Potassium"
    body: |
      Potassium is a key electrolyte for nerve and muscle function, including heart rhythm
      education contexts. Blood levels reflect intake, renal handling, and cell shifts.

      Potassium interpretation depends on sampling conditions, medications, and concurrent
      electrolyte results.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  sodium:
    title: "Sodium"
    body: |
      Sodium is a major extracellular electrolyte involved in fluid balance. Blood sodium reflects
      hydration status, renal regulation, and hormonal control together.

      Single sodium values are interpreted with clinical context and other electrolytes rather than
      as isolated labels.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

  magnesium:
    title: "Magnesium"
    body: |
      Magnesium supports enzyme function, muscle activity, and bone physiology. Blood magnesium
      measures circulating levels, which may not fully reflect total body stores.

      Magnesium is interpreted with symptoms, medications, and related electrolytes when clinicians
      review results.

      This is general education only. It is not a diagnosis and does not replace advice from a
      qualified clinician about your own results.

systems:
  metabolic:
    title: "Metabolic system (educational overview)"
    body: |
      In laboratory education, “metabolic” often refers to how your body converts food into energy
      and manages fuels such as glucose and circulating fats.

      Related biomarkers can reflect insulin signalling, short-term glucose exposure, and longer-term
      glycaemic patterns, but names on your report describe analytic groupings—not a single disease.

      When this system is under strain in population health language, it can mean multiple pathways
      need review together with a clinician, including lifestyle and medications.

      This overview is general education only. It does not prove illness in any individual and does
      not replace personalised medical advice.

  cardiovascular:
    title: "Cardiovascular system (educational overview)"
    body: |
      The cardiovascular system includes the heart and blood vessels that move oxygen and nutrients.
      Blood tests often focus on lipids and related markers that contribute to long-term vessel health
      risk models.

      Biomarkers in this theme usually describe particle-related cholesterol and triglycerides, not
      chest symptoms or diagnoses.

      Educational “strain” language means only that several markers may move in directions clinicians
      monitor—not that a specific event has occurred.

      This overview is general education only. It does not prove illness in any individual and does
      not replace personalised medical advice.

  renal:
    title: "Renal (kidney) system (educational overview)"
    body: |
      Kidneys filter blood, regulate fluid and electrolytes, and help remove metabolic waste.
      Creatinine-based estimates summarise filtration as a practical monitoring tool alongside urine
      tests when used.

      Kidney-related markers describe physiology and lab estimates; they do not replace clinical
      assessment of symptoms or imaging.

      In educational terms, “under strain” can mean filtration estimates or related signals deserve
      structured follow-up with a clinician.

      This overview is general education only. It does not prove illness in any individual and does
      not replace personalised medical advice.

  hepatic:
    title: "Hepatic (liver chemistry) pattern (educational overview)"
    body: |
      Hepatic panels focus on liver-related enzymes and proteins measured in blood. Enzymes can rise
      when liver cells are irritated, but patterns vary widely by cause and timing.

      These markers are pieces of a liver health picture that may include history, medications,
      imaging, and other labs.

      “Strain” here means only that liver chemistry signals may warrant professional review—not a
      specific diagnosis from grouping names.

      This overview is general education only. It does not prove illness in any individual and does
      not replace personalised medical advice.

  liver:
    title: "Liver (organ‑level) pattern (educational overview)"
    body: |
      The liver processes nutrients, makes proteins, and helps detoxify metabolic by-products.
      Blood tests may reflect liver synthetic function and cellular stress signals.

      Marker groupings are educational shorthand for how labs are organised in analysis; they are not a
      substitute for a clinical liver evaluation.

      When multiple liver-associated signals shift together, clinicians integrate context rather than
      relying on pattern names alone.

      This overview is general education only. It does not prove illness in any individual and does
      not replace personalised medical advice.

  hematological:
    title: "Haematological (blood) system (educational overview)"
    body: |
      Haematology-related blood tests assess oxygen delivery (for example haemoglobin), cell
      production, and iron storage markers.

      These results describe blood physiology in broad terms and are paired with symptoms and
      examination when interpreting change.

      Educational phrasing about “strain” refers to patterns that may merit investigation, not a
      confirmed condition from this text.

      This overview is general education only. It does not prove illness in any individual and does
      not replace personalised medical advice.

  immune:
    title: "Immune‑related markers (educational overview)"
    body: |
      Some blood markers rise with inflammation or immune activation. In educational materials they
      are often grouped for visibility, but they are not specific to one infection or autoimmune label.

      Interpretation depends on the full clinical context, timing, and often repeat testing.

      A pattern grouping name cannot, by itself, establish an immune diagnosis.

      This overview is general education only. It does not prove illness in any individual and does
      not replace personalised medical advice.

  thyroid:
    title: "Thyroid system (educational overview)"
    body: |
      The thyroid gland makes hormones that set the pace for metabolism, temperature, and energy use.
      Pituitary TSH and thyroid hormone levels are usually read together.

      Laboratory grouping helps organise results for review; it does not replace the panel‑level
      interpretation a clinician provides.

      “Under strain” in plain language can mean hormone signals are discordant enough to warrant
      professional follow-up—not a self-diagnosis.

      This overview is general education only. It does not prove illness in any individual and does
      not replace personalised medical advice.

  nutritional:
    title: "Nutritional markers (educational overview)"
    body: |
      Nutritional blood markers can reflect vitamins, minerals, and related transport proteins.
      They describe physiology and intake patterns imperfectly because values shift with
      inflammation, supplements, and lab methods.

      Grouping supports consistent reporting; it is not a complete nutrition assessment by itself.

      When several nutritional signals sit outside expected ranges, clinicians may recommend targeted
      review rather than broad assumptions from labels alone.

      This overview is general education only. It does not prove illness in any individual and does
      not replace personalised medical advice.

  hormonal:
    title: "Hormonal markers (educational overview)"
    body: |
      Hormones coordinate growth, metabolism, reproduction, and stress responses. Laboratory
      markers in this theme are highly timing- and context-dependent.

      Educational grouping summarises related tests; it does not determine a single hormone disorder
      without clinical correlation.

      “Strain” language means only that endocrine signals may deserve structured interpretation—not
      that any one marker proves a condition.

      This overview is general education only. It does not prove illness in any individual and does
      not replace personalised medical advice.
