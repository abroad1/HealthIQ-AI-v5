policy_version: "1.0.0"
schema_version: "1.0"

cluster_membership:
  min_members_per_cluster: 2

severity_thresholds:
  critical_lt: 30.0
  high_lt: 50.0
  moderate_lt: 70.0
  mild_lt: 85.0

confidence:
  variance_divisor: 2500.0
  size_boost_per_member: 0.05
  max_size_boost: 0.2

overall_confidence:
  invalid_cluster_penalty: 0.2
  out_of_range_cluster_count_penalty: 0.1
  optimal_cluster_count_min: 2
  optimal_cluster_count_max: 6
