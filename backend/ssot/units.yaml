# Single Source of Truth - Unit Definitions
# HealthIQ-AI v5 Backend

units:
  # Volume Units
  mg_dL:
    name: "mg/dL"
    description: "Milligrams per deciliter"
    category: "concentration"
    si_equivalent: "mg/dL"
    
  g_dL:
    name: "g/dL"
    description: "Grams per deciliter"
    category: "concentration"
    si_equivalent: "g/dL"

  g_L:
    name: "g/L"
    description: "Grams per liter (mass concentration)"
    category: "concentration"
    si_equivalent: "g/L"

  l_L:
    name: "L/L"
    description: "Liters per liter (volume fraction, e.g. haematocrit)"
    category: "concentration"
    si_equivalent: "L/L"
    
  # Percentage Units
  percent:
    name: "%"
    description: "Percentage"
    category: "ratio"
    si_equivalent: "%"
    
  # Enzyme Activity Units
  U_L:
    name: "U/L"
    description: "Units per liter"
    category: "enzyme_activity"
    si_equivalent: "U/L"
    
  # Count Units
  K_uL:
    name: "K/μL"
    description: "Thousands per microliter"
    category: "count"
    si_equivalent: "10³/μL"
    
  # Insulin Units
  uU_mL:
    name: "μU/mL"
    description: "Microunits per milliliter"
    category: "concentration"
    si_equivalent: "μU/mL"
    
  # Inflammatory Units
  mg_L:
    name: "mg/L"
    description: "Milligrams per liter"
    category: "concentration"
    si_equivalent: "mg/L"

  ng_mL:
    name: "ng/mL"
    description: "Nanograms per milliliter"
    category: "concentration"
    si_equivalent: "ng/mL"

  nmol_L:
    name: "nmol/L"
    description: "Nanomoles per liter"
    category: "concentration"
    si_equivalent: "nmol/L"

  umol_L:
    name: "µmol/L"
    description: "Micromoles per liter"
    category: "concentration"
    si_equivalent: "µmol/L"
    
  # Conversion Factors
  conversions:
    mg_dL_to_mmol_L_cholesterol:
      from_unit: "mg/dL"
      to_unit: "mmol/L"
      factor: 0.02586
      description: "Cholesterol conversion"

    mmol_L_to_mg_dL_cholesterol:
      from_unit: "mmol/L"
      to_unit: "mg/dL"
      factor: 38.67
      description: "Cholesterol reverse conversion"

    mg_dL_to_mmol_L_triglycerides:
      from_unit: "mg/dL"
      to_unit: "mmol/L"
      factor: 0.01129
      description: "Triglycerides conversion"

    mmol_L_to_mg_dL_triglycerides:
      from_unit: "mmol/L"
      to_unit: "mg/dL"
      factor: 88.57
      description: "Triglycerides reverse conversion"
      
    mg_dL_to_mmol_L_glucose:
      from_unit: "mg/dL"
      to_unit: "mmol/L"
      factor: 0.0555555556
      description: "Glucose conversion"

    mmol_L_to_mg_dL_glucose:
      from_unit: "mmol/L"
      to_unit: "mg/dL"
      factor: 18.0
      description: "Glucose reverse conversion"
      
    percent_to_mmol_mol:
      from_unit: "%"
      to_unit: "mmol/mol"
      factor: 10.929
      description: "HbA1c conversion"

    # IFCC (mmol/mol) -> NGSP (%). Linear NGSP = slope * IFCC_mmol_mol + intercept.
    # Aligns 48 mmol/mol with ~6.5% diagnostic convention (ADA/WHO paired criteria).
    mmol_mol_to_percent_hba1c:
      from_unit: "mmol/mol"
      to_unit: "%"
      slope: 0.09148
      intercept: 2.152
      description: "HbA1c IFCC mmol/mol to NGSP %"

    mg_dL_to_mmol_L_urea:
      from_unit: "mg/dL"
      to_unit: "mmol/L"
      factor: 0.357
      description: "BUN-labeled urea conversion"

    mg_dL_to_umol_L_creatinine:
      from_unit: "mg/dL"
      to_unit: "µmol/L"
      factor: 88.4
      description: "Creatinine conversion"

    ng_mL_to_nmol_L_vitamin_d:
      from_unit: "ng/mL"
      to_unit: "nmol/L"
      factor: 2.5
      description: "Vitamin D conversion"

    g_L_to_g_dL_hemoglobin:
      from_unit: "g/L"
      to_unit: "g/dL"
      factor: 0.1
      description: "Hemoglobin mass concentration (SI g/L to US g/dL)"

    g_dL_to_g_L_hemoglobin:
      from_unit: "g/dL"
      to_unit: "g/L"
      factor: 10.0
      description: "Hemoglobin mass concentration (US g/dL to SI g/L)"

    l_L_to_percent_hematocrit:
      from_unit: "L/L"
      to_unit: "%"
      factor: 100.0
      description: "Hematocrit volume fraction to percent"

    percent_to_l_L_hematocrit:
      from_unit: "%"
      to_unit: "L/L"
      factor: 0.01
      description: "Hematocrit percent to volume fraction"
      
  # Unit Categories
  categories:
    concentration:
      description: "Concentration-based measurements"
      units: ["mg/dL", "g/dL", "g/L", "L/L", "μU/mL", "mg/L"]
      
    ratio:
      description: "Ratio and percentage measurements"
      units: ["%"]
      
    enzyme_activity:
      description: "Enzyme activity measurements"
      units: ["U/L"]
      
    count:
      description: "Cell and particle counts"
      units: ["K/μL"]
