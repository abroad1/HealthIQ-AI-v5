policy_version: "1.2.0"
schema_version: "1.0"

system_execution_order:
  - metabolic
  - cardiovascular
  - inflammatory
  - hormonal
  - nutritional
  - kidney
  - liver
  - cbc

scoring_runtime:
  # Preserve existing runtime sentinel for deterministic contracts.
  unscored_reason_missing_lab_reference_range: "missing_lab_reference_range"

systems:
  metabolic:
    min_biomarkers_required: 2
    system_weight: 0.25
    biomarkers: ["glucose", "hba1c", "insulin"]
  cardiovascular:
    min_biomarkers_required: 3
    system_weight: 0.25
    biomarkers: ["total_cholesterol", "ldl_cholesterol", "hdl_cholesterol", "triglycerides", "tc_hdl_ratio"]
  inflammatory:
    min_biomarkers_required: 1
    system_weight: 0.15
    biomarkers: ["crp"]
  hormonal:
    min_biomarkers_required: 0
    system_weight: 0.0
    biomarkers: []
  nutritional:
    min_biomarkers_required: 0
    system_weight: 0.0
    biomarkers: []
  kidney:
    min_biomarkers_required: 1
    system_weight: 0.15
    biomarkers: ["creatinine", "urea"]
  liver:
    min_biomarkers_required: 1
    system_weight: 0.1
    biomarkers: ["alt", "ast"]
  cbc:
    min_biomarkers_required: 2
    system_weight: 0.1
    biomarkers: ["hemoglobin", "hematocrit", "white_blood_cells", "platelets"]

biomarkers:
