# LC-S14 — governed lab-range directionality (replaces per-marker hardcoded scoring exceptions).
biomarker_directionality:
  default_class: bidirectional_concern
  informational_position: 0.05
  protective_in_range_position: 0.75
  allowed_classes:
    - bidirectional_concern
    - high_only_concern
    - low_only_concern
    - protective_high
    - protective_low
    - informational_low
    - informational_high
  markers:
    alt:
      direction_class: high_only_concern
    ast:
      direction_class: high_only_concern
    ggt:
      direction_class: high_only_concern
    alp:
      direction_class: high_only_concern
    hdl_cholesterol:
      direction_class: protective_high
    apoa1:
      direction_class: protective_high

derived_ratios:
  - "tc_hdl_ratio"
  - "tg_hdl_ratio"
  - "ldl_hdl_ratio"
  - "chol_hdl_ratio"
  - "apob_apoa1_ratio"
  - "non_hdl_cholesterol"
  - "urea_creatinine_ratio"
  - "testosterone_free_testosterone_ratio"

derived_ratio_policy_bounds:
  tc_hdl_ratio:
    min: 0.0
    max: 5.0
    unit: "ratio"
    source: "healthiq_policy"
    notes: "Cardiovascular ratio policy band, dimensionless."
  tg_hdl_ratio:
    min: 0.0
    max: 4.0
    unit: "ratio"
    source: "healthiq_policy"
    notes: "Cardiovascular ratio policy band, dimensionless."
  ldl_hdl_ratio:
    min: 0.0
    max: 3.5
    unit: "ratio"
    source: "healthiq_policy"
    notes: "Cardiovascular ratio policy band, dimensionless."
  non_hdl_cholesterol:
    min: 0.0
    max: 4.0
    unit: "mmol/L"
    source: "healthiq_policy"
    notes: "Computed as total_cholesterol - hdl_cholesterol in mmol/L basis."
  apob_apoa1_ratio:
    min: 0.0
    max: 1.5
    unit: "ratio"
    source: "healthiq_policy"
    notes: "Computed as apoB / apoA1, dimensionless ratio basis."
  urea_creatinine_ratio:
    min: 0.0
    max: 20.0
    unit: "ratio"
    source: "healthiq_policy"
    notes: "Computed as urea / creatinine, dimensionless ratio basis."
  testosterone_free_testosterone_ratio:
    min: 0.0
    max: 50.0
    unit: "ratio"
    source: "healthiq_policy"
    notes: "Computed as testosterone / free_testosterone, dimensionless ratio basis."

status_map:
  low_critical: "critical"
  low_borderline: "borderline"
  normal: "normal"
  optimal: "optimal"
  high_borderline: "high"
  high_critical: "critical"

score_curve:
  optimal_band: {min: 0.2, max: 0.8, score: 100.0}
  normal_band: {min: 0.1, max: 0.9}
  normal_low: {start: 0.1, end: 0.2, score_start: 90.0, score_end: 100.0}
  normal_high: {start: 0.8, end: 0.9, score_start: 100.0, score_end: 90.0}
  borderline_band: {min: 0.05, max: 0.95}
  borderline_low: {start: 0.05, end: 0.1, score_start: 70.0, score_end: 90.0}
  borderline_high: {start: 0.9, end: 0.95, score_start: 90.0, score_end: 70.0}
  low_noncritical: {start: 0.0, end: 0.05, score_start: 50.0, score_end: 70.0}
  low_critical: {excess_multiplier: 50.0, base_score: 10.0}
  high_noncritical: {start: 0.95, end: 1.0, score_start: 70.0, score_end: 50.0}
  high_critical: {excess_multiplier: 50.0, base_score: 30.0}
