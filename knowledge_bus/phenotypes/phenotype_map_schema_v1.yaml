schema_version: "v1"

top_level_required_keys:
  - "schema_version"
  - "phenotypes"

required_phenotype_keys:
  - "phenotype_id"
  - "name"
  - "description"
  - "systems_involved"
  - "required_signals"
  - "optional_signals"
  - "required_edges"
  - "synthetic_fixture_refs"
  - "chain_expectations"
  - "evidence_notes"

required_edge_keys:
  - "from_signal_id"
  - "to_signal_id"
  - "relationship_type"
  - "evidence_strength"
  - "evidence_basis"
  - "requires_research_promotion"

required_evidence_basis_keys:
  - "type"
  - "ref"

allowed_enums:
  relationship_type:
    - "driver"
    - "consequence"
    - "co_occurrence"
    - "bidirectional"
  evidence_strength:
    - "exploratory"
    - "moderate"
    - "strong"
    - "consensus"
  evidence_basis_type:
    - "research_package"
    - "guideline"
    - "rationale_md"
  chain_expectations_status:
    - "enforced"
    - "pending"

type_contract:
  phenotype_id: "str"
  name: "str"
  description: "str"
  systems_involved: "list"
  required_signals: "list"
  optional_signals: "list"
  required_edges: "list"
  synthetic_fixture_refs: "list"
  chain_expectations: "dict"
  evidence_notes: "str"

edge_type_contract:
  from_signal_id: "str"
  to_signal_id: "str"
  relationship_type: "str"
  evidence_strength: "str"
  evidence_basis: "dict"
  requires_research_promotion: "bool"
