    name: "Vascular homocysteine inflammation pattern"
    description: "Homocysteine elevation with inflammatory context and vascular stress signals. This phenotype supports chain-aware synthesis when homocysteine context and inflammatory burden co-occur."
    systems_involved:
      - "vascular"
      - "inflammatory"
      - "metabolic"
    required_signals:
      - "signal_homocysteine_elevation_context"
      - "signal_homocysteine_high"
      - "signal_systemic_inflammation"
    optional_signals:
      - "signal_crp_high"
      - "signal_mcv_high"
    required_edges:
      - from_signal_id: "signal_homocysteine_high"
        to_signal_id: "signal_homocysteine_elevation_context"
        relationship_type: "co_occurrence"
        evidence_strength: "strong"
        evidence_basis:
          type: "research_package"
          ref: "KB-S30d-stage2-hcy-context-link"
        requires_research_promotion: false
      - from_signal_id: "signal_systemic_inflammation"
        to_signal_id: "signal_homocysteine_elevation_context"
        relationship_type: "co_occurrence"
        evidence_strength: "exploratory"
        evidence_basis:
          type: "rationale_md"
          ref: "knowledge_bus/phenotypes/rationales/ph_vascular_hcy_inflammation_edge_inflammation_to_hcy_context.md"
        requires_research_promotion: true
    synthetic_fixture_refs:
      - "ph_vascular_hcy_inflammation_v1.json"
    chain_expectations:
      status: "enforced"
      min_chain_confidence: 0.40
      must_include_any_signal:
        - "signal_homocysteine_elevation_context"
    evidence_notes: "Anchors the current homocysteine synthesis pathway and tracks an exploratory inflammation coupling pending research-package promotion."

