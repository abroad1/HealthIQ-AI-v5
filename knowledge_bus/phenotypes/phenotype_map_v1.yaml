        requires_research_promotion: false
      - from_signal_id: "signal_crp_high"
        to_signal_id: "signal_homocysteine_high"
        relationship_type: "driver"
        evidence_strength: "exploratory"
        # NOTE: candidate for promotion to moderate/strong once research package exists
        evidence_basis:
          type: "guideline"
          ref: "KB-S37-coverage-expansion-v1"
        requires_research_promotion: false
      - from_signal_id: "signal_crp_high"
        to_signal_id: "signal_homocysteine_elevation_context"
        relationship_type: "co_occurrence"
        evidence_strength: "exploratory"
        evidence_basis:
          type: "guideline"
          ref: "KB-S37-coverage-expansion-v1"
        requires_research_promotion: false
