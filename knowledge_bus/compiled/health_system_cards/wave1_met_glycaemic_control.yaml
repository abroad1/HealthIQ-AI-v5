schema_version: "1.0.0"
artefact_id: wave1_met_glycaemic_control_v1
domain_id: wave1_blood_sugar
subsystem_id: wave1_met_glycaemic_control
subsystem_label: Long-term blood sugar
visibility_tier: scored_subsystem
source_spec_ids:
  - inv_hba1c_high_glycaemia_v1
compile_manifest_ref: knowledge_bus/compiled/manifests/kb_util1_glycaemic_card_evidence.yaml
missing_policy_line: Missing markers reduce confidence for this subsystem; they are not treated as absent clinical results.
mechanism_line: HbA1c reflects average glucose exposure over red-cell lifespan; fasting glucose strengthens completeness when present.
subsystem_summary: >
  HbA1c anchors long-term blood sugar exposure on this panel; glucose corroborates glycaemia when
  uploaded but is optional for the score.
evidence_limitations_line: >
  Insulin-resistance and triglyceride metabolic context are not shown as scored subsystems on this panel.
markers:
  - marker_id: glucose
    display_label: Glucose
    marker_role: missing_for_confidence
    relationship_kind: confidence_input
    rationale_short: Fasting glucose corroborates chronic glycaemia when present alongside HbA1c.
    presence_policy: optional_on_panel
  - marker_id: hba1c
    display_label: HbA1c
    marker_role: score_contributor
    relationship_kind: direct_score_input
    rationale_short: Longer-window glycaemic exposure marker from nonenzymatic hemoglobin glycation.
    presence_policy: required_for_subsystem
provenance:
  artefact_kind: health_system_card_evidence_v1
  compile_status: kb_util1_package_enrichment
  source_spec_provenance: explicit
  package_refs:
    - pkg_s24_hba1c_high_glycaemia
    - pkg_kb52d_hba1c_pct_high_chronic_hyperglycemia_diabetes
  notes: >
    KB-UTIL-1 enrichment from pkg_kb52d explanation.* (compile-time). Glucose optional_on_panel per MED-REV-1.
    No PSI runtime.
