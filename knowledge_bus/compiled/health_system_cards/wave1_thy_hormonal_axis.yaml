domain_id: wave1_thyroid
subsystem_id: wave1_thy_hormonal_axis
subsystem_label: Thyroid hormonal axis
visibility_tier: scored_subsystem
source_spec_ids:
  - inv_tsh_high_primary_hypothyroid_pattern
  - inv_tsh_low_thyrotoxic_pattern
  - inv_free_t3_high_t3_predominant_thyrotoxicosis
  - inv_free_t3_low_low_t3_syndrome
  - inv_free_t4_high_thyrotoxicosis_context
  - inv_free_t4_low_thyroid_hormone_deficiency
  - inv_tpo_ab_high_autoimmune_hypothyroid_pattern
compile_manifest_ref: knowledge_bus/compiled/manifests/p1_25_thyroid_completion_card_evidence.yaml
missing_policy_line: Missing markers reduce confidence for this subsystem; they are not treated as absent clinical results.
mechanism_line: TSH anchors pituitary-thyroid feedback on this panel; free T4 and free T3 add hormone-pattern context when present; TPO antibodies may add autoimmune thyroid context when uploaded alongside thyroid function markers.
subsystem_summary: >
  TSH anchors thyroid hormonal axis markers on this panel; free T4 and free T3 may add high- and
  low-hormone pattern context when uploaded; TPO antibodies may add contextual autoimmune thyroid
  support when present but are optional for the scored subsystem view.
evidence_limitations_line: >
  This card focuses on thyroid hormonal axis markers and does not diagnose hypothyroidism, thyrotoxicosis,
  autoimmune thyroid disease, or other thyroid disease.
markers:
  - marker_id: tsh
    display_label: TSH
    marker_role: score_contributor
    relationship_kind: direct_score_input
    rationale_short: Primary pituitary-thyroid feedback marker on routine thyroid panels.
    presence_policy: required_for_subsystem
  - marker_id: free_t4
    display_label: Free T4
    marker_role: score_contributor
    relationship_kind: direct_score_input
    rationale_short: Circulating thyroid hormone marker that classifies TSH abnormalities when present.
    presence_policy: required_for_subsystem
  - marker_id: free_t3
    display_label: Free T3
    marker_role: confidence_contributor
    relationship_kind: confidence_input
    rationale_short: Active thyroid hormone fraction that can add high- and low-hormone pattern context alongside TSH and free T4.
    presence_policy: optional_on_panel
  - marker_id: tpo_ab
    display_label: TPO antibodies
    marker_role: contextual_marker
    relationship_kind: contextual_support
    rationale_short: Elevated TPO antibodies may add autoimmune thyroid context when paired with raised TSH and available free T4; not diagnostic on its own.
    presence_policy: optional_on_panel
provenance:
  artefact_kind: health_system_card_evidence_v1
  compile_status: compile_pipeline
  source_spec_provenance: explicit
  package_refs:
    - pkg_kb52c_tsh_high_primary_hypothyroid_pattern
    - pkg_kb52c_tsh_low_thyrotoxic_pattern
    - pkg_kb47_free_t3_high_t3_predominant_thyrotoxicosis
    - pkg_kb47_free_t3_low_low_t3_syndrome
    - pkg_kb47_free_t4_high_thyrotoxicosis_context
    - pkg_kb47_free_t4_low_thyroid_hormone_deficiency
    - pkg_kb59_tpo_ab_high_autoimmune_hypothyroid_pattern
  notes: >
    P1-25 compile-time card evidence for launch-core thyroid domain. Scoring uses existing hormonal
    rail (TSH, free T4, free T3 lab-range-only). FT3-low and TPOAb hypothyroid-context signals
    activated per P1-25 MR-v2 allowlist with mandatory pre-emission gates.
