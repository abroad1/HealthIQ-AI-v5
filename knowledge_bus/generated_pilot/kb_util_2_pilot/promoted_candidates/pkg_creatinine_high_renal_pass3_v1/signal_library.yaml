library:
  description: Pilot-compiled from inv_creatinine_high_reduced_glomerular_filtration via kb_util2_pass3_pilot_compiler_v1.0.0.
  library_name: signal_creatinine_high Investigation Library (Pass 3 pilot)
  package_id: KBP-9201
  package_version: 1.0.0
  schema_version: 1.0.0
signals:
- activation_config:
    enable_lower_bound: false
    enable_upper_bound: true
    lower_bound_state: suboptimal
    upper_bound_state: suboptimal
  activation_logic: lab_range_exceeded
  dependencies:
    biomarkers:
    - creatinine
    - cystatin_c
    - egfr
    - uacr
    derived_metrics: []
    signals: []
  description: High creatinine commonly reflects reduced kidney filtration but requires interpretation alongside eGFR and
    urine findings because muscle mass and acute hemodynamics also affect concentration.
  explanation:
    biological_pathway: Creatinine generation, glomerular filtration, tubular handling, and kidney injury or chronic kidney
      disease pathways.
    implications: Trend confirmation and urine protein assessment usually clarify whether the finding reflects persistent
      kidney disease or a creatinine-specific confounder.
    interpretation: This pattern supports reduced kidney filtration most strongly when corroborated by eGFR and albuminuria
      rather than read in isolation.
    mechanism: Serum creatinine rises when filtration falls or when creatinine generation and distribution change enough to
      increase circulating concentration.
    supporting_marker_roles: Low eGFR corroborates filtration reduction, UACR supports kidney disease context, and cystatin
      C helps distinguish true filtration loss from creatinine distortion.
  name: Creatinine High
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  output:
    confidence: confidence_model_v1
    primary_metric: creatinine
    signal_state: at_risk
    signal_value: creatinine
    supporting_markers: &id001
    - egfr
    - uacr
    - cystatin_c
  override_rules:
  - conditions:
    - boundary: above_max
      comparator_type: lab_range_boundary
      condition_type: all_of
      metric_id: uacr
      operator: '>'
    description: Escalate when high creatinine coincides with high UACR, as this more strongly supports clinically meaningful
      kidney disease.
    resulting_state: at_risk
    rule_id: or_creatinine_high_with_uacr_high
    source_refs:
    - source_kdigo_ckd_2024
  primary_metric: creatinine
  signal_id: signal_creatinine_high
  supporting_metrics: *id001
  system: renal
  thresholds:
  - description: Validator-compatibility placeholder; runtime activation is lab-range driven per Pass 3 activation block.
    metric_id: creatinine
    operator: '>='
    severity: at_risk
    threshold_id: signal_creatinine_high_lab_range_activation_placeholder
    value: 9999.0
  trigger_direction: high
