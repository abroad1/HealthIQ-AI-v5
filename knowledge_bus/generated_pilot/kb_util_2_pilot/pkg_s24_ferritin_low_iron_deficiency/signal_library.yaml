library:
  description: Pilot-compiled from inv_ferritin_low_iron_store_depletion via kb_util2_pass3_pilot_compiler_v1.0.0.
  library_name: signal_ferritin_low Investigation Library (Pass 3 pilot)
  package_id: KBP-9202
  package_version: 1.0.0
  schema_version: 2.0.0
signals:
- activation_config:
    enable_lower_bound: true
    enable_upper_bound: false
    lower_bound_state: suboptimal
    upper_bound_state: suboptimal
  activation_logic: lab_range_exceeded
  dependencies:
    biomarkers:
    - crp
    - ferritin
    - hemoglobin
    - iron
    derived_metrics: []
    signals: []
  description: Low ferritin is a direct indicator of depleted iron stores and is one of the most useful biochemical markers
    of iron deficiency.
  explanation:
    biological_pathway: Body iron storage, reticuloendothelial ferritin reserve, and iron supply to erythropoiesis.
    implications: The key follow-on task is usually to confirm functional iron restriction and determine whether the depletion
      has already impaired erythropoiesis.
    interpretation: This is a well-established nutrient-storage deficiency signal in routine testing and gains specificity
      for iron depletion when interpreted with inflammatory awareness.
    mechanism: Ferritin falls as stored iron becomes depleted and available reserve for erythropoiesis contracts.
    supporting_marker_roles: Serum iron and hemoglobin corroborate depletion and hematologic impact, while CRP helps differentiate
      true low stores from inflammatory distortion.
  name: Ferritin Low
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  output:
    confidence: confidence_model_v1
    primary_metric: ferritin
    signal_state: at_risk
    signal_value: ferritin
    supporting_markers:
    - iron
    - hemoglobin
    - crp
  override_rules:
  - conditions:
    - boundary: below_min
      comparator_type: lab_range_boundary
      condition_type: all_of
      metric_id: hemoglobin
      operator: <
    description: Escalate when low ferritin coincides with low hemoglobin, as this more strongly supports clinically significant
      iron-deficiency anemia rather than isolated iron depletion.
    resulting_state: at_risk
    rule_id: or_ferritin_low_with_hemoglobin_low
    source_refs:
    - source_bsg_iron_guideline_2021
  primary_metric: ferritin
  signal_id: signal_ferritin_low
  supporting_metrics:
  - availability: common
    biomarker_id: iron
    expected_direction: low
    rationale: Low serum iron can corroborate depleted available iron when ferritin is low.
    role: corroborator
  - availability: common
    biomarker_id: hemoglobin
    expected_direction: low
    rationale: Low hemoglobin supports progression from iron depletion toward iron-deficiency anemia.
    role: mechanism_marker
  - availability: optional
    biomarker_id: crp
    expected_direction: any
    rationale: A noninflammatory context helps preserve ferritin specificity for iron deficiency because ferritin rises as
      an acute-phase reactant.
    role: differential_marker
  system: hematologic
  thresholds:
  - description: Validator-compatibility placeholder; runtime activation is lab-range driven per Pass 3 activation block.
    metric_id: ferritin
    operator: <=
    severity: at_risk
    threshold_id: signal_ferritin_low_lab_range_activation_placeholder
    value: 0.0
  trigger_direction: low
