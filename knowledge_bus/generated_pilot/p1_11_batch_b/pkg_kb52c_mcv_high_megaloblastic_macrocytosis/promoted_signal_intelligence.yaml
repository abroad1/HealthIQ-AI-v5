promoted_signal_intelligence_contract_version: 1.0.0
schema_version: 1.0.0
package_id: pkg_kb52c_mcv_high_megaloblastic_macrocytosis
translation:
  source: investigation_spec_v3_pass3_p1_11_batch_b
  investigation_spec_contract_version: 3.0.0
  investigation_spec_id: inv_mcv_high_megaloblastic_macrocytosis
  signal_id: signal_mcv_high
  compiler_version: p1_11_batch_b_pass3_psi_compiler_v1.0.0
  work_id: P1-11
  cluster_id: mcv_morphology
signals:
- signal_id: signal_mcv_high
  research_domain: hematologic
  signal_system: hematologic
  primary_metric:
    biomarker_id: mcv
    rationale: MCV reflects average erythrocyte size and high values indicate macrocytosis, not a specific diagnosis by themselves.
  trigger_direction: high
  activation:
    activation_logic: lab_range_exceeded
    activation_config:
      enable_upper_bound: true
      upper_bound_state: suboptimal
      enable_lower_bound: false
      lower_bound_state: suboptimal
  states:
    baseline_state: suboptimal
    escalation_state: at_risk
  supporting_markers:
  - biomarker_id: folate
    expected_direction: low
    role: mechanism_marker
    relationship_kind: mechanism
    availability: common
    rationale: Low folate supports megaloblastic macrocytosis from impaired DNA synthesis.
  - biomarker_id: active_b12
    expected_direction: low
    role: corroborator
    relationship_kind: corroboration
    availability: common
    rationale: Low active B12 supports a cobalamin-related megaloblastic contribution.
  - biomarker_id: ggt
    expected_direction: high
    role: differential_marker
    relationship_kind: differential
    availability: common
    rationale: High GGT supports an alcohol-related or hepatic non-megaloblastic alternative to hematinic deficiency.
  contradiction_markers:
  - contradiction_id: ctr_high_ggt_mcv
    marker_reference: ggt
    contradiction_rationale: A high GGT weakens a purely megaloblastic interpretation and raises alcohol-related or hepatic
      macrocytosis as an alternative.
    contradiction_strength: moderate
  - contradiction_id: ctr_normal_active_b12_mcv
    marker_reference: active_b12
    contradiction_rationale: Normal active B12 weakens a cobalamin-predominant explanation for macrocytosis.
    contradiction_strength: moderate
  missing_data:
    policies:
    - Do not assume folate deficiency is sole cause if active B12 is low or borderline.
    - Review folate and active B12 together before assigning a megaloblastic cause.
  confidence:
    evidence_strength: strong
  override_rules:
  - rule_id: or_mcv_high_with_low_active_b12
    resulting_state: at_risk
    description: Escalate when MCV is high and active B12 is low because the combination supports clinically relevant megaloblastic
      macrocytosis rather than isolated macrocytosis of uncertain cause.
    conditions:
    - metric_id: active_b12
      operator: <
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: below_min
    source_refs:
    - source_macrocytosis_review
  evidence:
    evidence_strength: strong
    physiological_claim: High MCV commonly reflects macrocytosis from B12 or folate deficiency, alcohol-related change, liver
      disease, hypothyroidism, reticulocytosis, or marrow disorders.
    threshold_notes: The deterministic trigger is the laboratory abnormality; cause assignment depends on accompanying hematinic
      and liver markers.
    sources:
    - source_id: source_macrocytosis_review
      paper_title: Macrocytosis evaluation and megaloblastic versus non-megaloblastic causes
      journal: Hematology review literature
      year: 2025
  confirmatory_test_refs:
  - test_id: ct_b12_and_folate_panel
    rationale: Parallel hematinic testing helps distinguish the cause of macrocytosis.
  - test_id: ct_peripheral_blood_film
    rationale: Blood-film review can help identify megaloblastic change and other macrocytic patterns.
