promoted_signal_intelligence_contract_version: 1.0.0
schema_version: 1.0.0
package_id: pkg_kb52c_rbc_high_erythrocytosis_pattern
translation:
  source: investigation_spec_v3_pass3_p1_11_batch_b
  investigation_spec_contract_version: 3.0.0
  investigation_spec_id: inv_rbc_high_erythrocytosis_pattern
  signal_id: signal_rbc_high
  compiler_version: p1_11_batch_b_pass3_psi_compiler_v1.0.0
  work_id: P1-11
  cluster_id: rbc_count_patterns
signals:
- signal_id: signal_rbc_high
  research_domain: hematologic
  signal_system: hematologic
  primary_metric:
    biomarker_id: rbc
    rationale: A high RBC count raises consideration of relative or absolute erythrocytosis and requires correlation with
      hemoglobin, hematocrit, and clinical context.
  trigger_direction: high
  activation:
    activation_logic: lab_range_exceeded
    activation_config:
      enable_upper_bound: true
      upper_bound_state: suboptimal
      enable_lower_bound: false
      lower_bound_state: suboptimal
  states:
    baseline_state: suboptimal
    escalation_state: at_risk
  supporting_markers:
  - biomarker_id: neutrophil_pct
    expected_direction: high
    role: corroborator
    relationship_kind: corroboration
    availability: common
    rationale: Concurrent neutrophil predominance can support a proliferative or strong physiologic-stress context rather
      than a trivial isolated count shift.
  - biomarker_id: mch
    expected_direction: low
    role: differential_marker
    relationship_kind: differential
    availability: common
    rationale: Low MCH redirects interpretation toward microcytic high-count states such as thalassemia trait instead of true
      erythrocytosis.
  - biomarker_id: mchc
    expected_direction: low
    role: differential_marker
    relationship_kind: differential
    availability: common
    rationale: Low MCHC further weakens a pure erythrocytosis interpretation by suggesting hypochromic microcytosis.
  contradiction_markers:
  - contradiction_id: ctr_hypochromic_microcytosis_redirect
    marker_reference: mch
    contradiction_rationale: Low MCH weakens a true erythrocytosis interpretation and suggests a microcytic high-count carrier
      state instead.
    contradiction_strength: strong
  - contradiction_id: ctr_low_mchc_redirect
    marker_reference: mchc
    contradiction_rationale: Low MCHC similarly redirects away from pure erythrocytosis toward hypochromic microcytosis.
    contradiction_strength: strong
  - contradiction_id: ctr_microcytic_carrier_pattern
    marker_reference: mch
    contradiction_rationale: Microcytic hypochromic support weakens hemoconcentration as the main explanation and points toward
      a carrier-state differential instead.
    contradiction_strength: moderate
  missing_data:
    policies:
    - Confirm with hemoglobin or hematocrit and evaluate erythropoietin-driven versus primary marrow causes before assigning
      true erythrocytosis.
    - Review volume status and confirm with hemoglobin or hematocrit before treating a high RBC count as true polycythemia.
  confidence:
    evidence_strength: moderate
  override_rules:
  - rule_id: or_rbc_high_with_high_neutrophil_pct
    resulting_state: at_risk
    description: Escalate when RBC is high and neutrophil percentage is also high, because concurrent myeloid predominance
      can strengthen concern for a proliferative or clinically important erythrocytosis context.
    conditions:
    - metric_id: neutrophil_pct
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_erythrocytosis_review_2024
  evidence:
    evidence_strength: moderate
    physiological_claim: A high RBC count is an entry point into erythrocytosis work-up but cannot by itself separate relative
      from absolute or primary from secondary causes.
    threshold_notes: Interpretation should remain directional and lab-range anchored because RBC count alone is not the defining
      criterion for erythrocytosis severity.
    sources:
    - source_id: source_erythrocytosis_review_2024
      paper_title: 'Erythrocytosis: Diagnosis and investigation'
      journal: International Journal of Laboratory Hematology
      year: 2024
  confirmatory_test_refs:
  - test_id: ct_hemoglobin_hematocrit_erythropoietin_and_jak2_review
    rationale: Hemoglobin, hematocrit, erythropoietin, and where appropriate JAK2 testing help distinguish relative from primary
      or secondary erythrocytosis.
