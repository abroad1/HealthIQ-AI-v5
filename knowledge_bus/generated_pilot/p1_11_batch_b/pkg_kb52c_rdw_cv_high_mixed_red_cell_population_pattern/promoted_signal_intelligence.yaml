promoted_signal_intelligence_contract_version: 1.0.0
schema_version: 1.0.0
package_id: pkg_kb52c_rdw_cv_high_mixed_red_cell_population_pattern
translation:
  source: investigation_spec_v3_pass3_p1_11_batch_b
  investigation_spec_contract_version: 3.0.0
  investigation_spec_id: inv_rdw_cv_high_mixed_red_cell_population_pattern
  signal_id: signal_rdw_cv_high
  compiler_version: p1_11_batch_b_pass3_psi_compiler_v1.0.0
  work_id: P1-11
  cluster_id: rdw_anisocytosis
signals:
- signal_id: signal_rdw_cv_high
  research_domain: hematologic
  signal_system: hematologic
  primary_metric:
    biomarker_id: rdw_cv
    rationale: High RDW-CV can also reflect admixture of red-cell populations rather than isolated iron deficiency alone.
  trigger_direction: high
  activation:
    activation_logic: lab_range_exceeded
    activation_config:
      enable_upper_bound: true
      upper_bound_state: suboptimal
      enable_lower_bound: false
      lower_bound_state: suboptimal
  states:
    baseline_state: suboptimal
    escalation_state: at_risk
  supporting_markers:
  - biomarker_id: rdw_sd
    expected_direction: high
    role: corroborator
    relationship_kind: corroboration
    availability: common
    rationale: Concurrent RDW-SD elevation supports genuine red-cell size heterogeneity rather than borderline variation in
      one RDW metric.
  - biomarker_id: mchc
    expected_direction: high
    role: differential_marker
    relationship_kind: differential
    availability: common
    rationale: A high MCHC redirects interpretation toward spherocytic or regenerative hemolytic processes rather than simple
      deficiency.
  - biomarker_id: rbc
    expected_direction: low
    role: corroborator
    relationship_kind: corroboration
    availability: common
    rationale: A reduced RBC count supports clinically relevant anemia when anisocytosis is marked.
  contradiction_markers:
  - contradiction_id: ctr_hypochromic_profile
    marker_reference: mchc
    contradiction_rationale: A low or normal MCHC without other regenerative clues weakens a hemolytic or dense-cell interpretation.
    contradiction_strength: moderate
  - contradiction_id: ctr_normal_rdw_sd_weakens_mixed_population_shift
    marker_reference: rdw_sd
    contradiction_rationale: A normal RDW-SD weakens a post-treatment or transitional mixed red cell population interpretation,
      as a true admixture of old and new red cell cohorts would be expected to produce absolute size dispersion captured by
      RDW-SD alongside the coefficient-based RDW-CV elevation.
    contradiction_strength: moderate
  missing_data:
    policies:
    - Add hemolysis and reticulocyte testing before prioritizing regeneration or destruction as the main cause of anisocytosis.
    - Repeat CBC comparison or clinical history is needed before promoting a treatment-response interpretation.
  confidence:
    evidence_strength: moderate
  override_rules:
  - rule_id: or_rdw_cv_high_with_high_mchc
    resulting_state: at_risk
    description: Escalate when high RDW-CV coexists with high MCHC, because this combination is more compatible with a clinically
      important mixed-population or hemolytic pattern than uncomplicated deficiency alone.
    conditions:
    - metric_id: mchc
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_rdw_review_2019
    - source_hs_protocol_2021
  evidence:
    evidence_strength: moderate
    physiological_claim: High RDW-CV can reflect admixture of red-cell populations during regeneration, hemolysis, recovery,
      or combined deficiency states.
    threshold_notes: No disease-specific RDW-CV threshold should be invented; direction and pattern with corroborating indices
      are more reliable than isolated magnitude.
    sources:
    - source_id: source_rdw_review_2019
      paper_title: 'The role of red blood cell distribution width (RDW) in cardiovascular risk assessment: useful or hype?'
      journal: Annals of Translational Medicine
      year: 2019
    - source_id: source_hs_protocol_2021
      paper_title: The diagnostic protocol for hereditary spherocytosis-2021 update
      journal: Journal of Clinical Laboratory Analysis
      year: 2021
  confirmatory_test_refs:
  - test_id: ct_reticulocyte_and_smear_review
    rationale: Reticulocyte assessment and smear review help determine whether high RDW-CV reflects regeneration, hemolysis,
      or another mixed-population process.
