promoted_signal_intelligence_contract_version: 1.0.0
schema_version: 1.0.0
package_id: pkg_kb52c_rdw_cv_high_iron_deficiency_anisocytosis
translation:
  source: investigation_spec_v3_pass3_p1_11_batch_b
  investigation_spec_contract_version: 3.0.0
  investigation_spec_id: inv_rdw_cv_high_iron_deficiency_anisocytosis
  signal_id: signal_rdw_cv_high
  compiler_version: p1_11_batch_b_pass3_psi_compiler_v1.0.0
  work_id: P1-11
  cluster_id: rdw_anisocytosis
signals:
- signal_id: signal_rdw_cv_high
  research_domain: hematologic
  signal_system: hematologic
  primary_metric:
    biomarker_id: rdw_cv
    rationale: High RDW-CV reflects increased variability in red-cell size and is most classically used in anemia differential
      diagnosis.
  trigger_direction: high
  activation:
    activation_logic: lab_range_exceeded
    activation_config:
      enable_upper_bound: true
      upper_bound_state: suboptimal
      enable_lower_bound: false
      lower_bound_state: suboptimal
  states:
    baseline_state: suboptimal
    escalation_state: at_risk
  supporting_markers:
  - biomarker_id: mch
    expected_direction: low
    role: mechanism_marker
    relationship_kind: mechanism
    availability: common
    rationale: Low MCH supports impaired erythrocyte hemoglobinization within an anisocytic deficiency pattern.
  - biomarker_id: mchc
    expected_direction: low
    role: corroborator
    relationship_kind: corroboration
    availability: common
    rationale: Low MCHC reinforces hypochromic physiology accompanying anisocytosis.
  - biomarker_id: rbc
    expected_direction: low
    role: differential_marker
    relationship_kind: differential
    availability: common
    rationale: A reduced RBC count favors iron deficiency anemia over compensated thalassemia trait.
  contradiction_markers:
  - contradiction_id: ctr_preserved_high_rbc
    marker_reference: rbc
    contradiction_rationale: A preserved or increased RBC count weakens classic iron deficiency anemia and favors thalassemia
      trait or another compensated microcytic state.
    contradiction_strength: strong
  - contradiction_id: ctr_uniform_microcytosis_pattern
    marker_reference: rbc
    contradiction_rationale: A high RBC count with more uniform microcytosis is less compatible with mixed nutritional deficiency
      and more compatible with thalassemia trait.
    contradiction_strength: moderate
  missing_data:
    policies:
    - Confirm iron status before assigning causality because RDW-CV rises in several hematologic states.
    - If nutritional biochemistry is unavailable, keep combined deficiency as a secondary hypothesis rather than a definitive
      conclusion.
  confidence:
    evidence_strength: strong
  override_rules:
  - rule_id: or_rdw_cv_high_with_hypochromic_anemia_pattern
    resulting_state: at_risk
    description: Escalate when high RDW-CV coexists with low MCH and low RBC count, because that combination is more consistent
      with clinically relevant iron-deficiency-type anisocytosis than an isolated RDW shift.
    conditions:
    - metric_id: mch
      operator: <
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: below_min
    - metric_id: rbc
      operator: <
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: below_min
    source_refs:
    - source_rdw_review_2019
    - source_ida_vs_thal_review_2023
  evidence:
    evidence_strength: strong
    physiological_claim: High RDW-CV is a well-established indicator of anisocytosis and is particularly useful in distinguishing
      iron deficiency patterns from more uniform microcytic states.
    threshold_notes: RDW-CV should be interpreted against the analyzer reference interval and never converted into an invented
      disease-specific threshold.
    sources:
    - source_id: source_rdw_review_2019
      paper_title: 'The role of red blood cell distribution width (RDW) in cardiovascular risk assessment: useful or hype?'
      journal: Annals of Translational Medicine
      year: 2019
    - source_id: source_ida_vs_thal_review_2023
      paper_title: Differential diagnosis between iron deficiency anemia and thalassemia trait-induced anemia
      journal: Journal of Dental Sciences
      year: 2023
  confirmatory_test_refs:
  - test_id: ct_iron_b12_folate_review
    rationale: Iron studies with B12 and folate assessment help distinguish isolated iron deficiency from combined nutritional
      causes of anisocytosis.
