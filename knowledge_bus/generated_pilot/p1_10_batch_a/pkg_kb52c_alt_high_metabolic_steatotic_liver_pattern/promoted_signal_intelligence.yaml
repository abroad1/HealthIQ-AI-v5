promoted_signal_intelligence_contract_version: 1.0.0
schema_version: 1.0.0
package_id: pkg_kb52c_alt_high_metabolic_steatotic_liver_pattern
translation:
  source: investigation_spec_v3_pass3_p1_10_batch_a
  investigation_spec_contract_version: 3.0.0
  investigation_spec_id: inv_alt_high_metabolic_steatotic_liver_pattern
  signal_id: signal_alt_high
  compiler_version: p1_10_batch_a_pass3_psi_compiler_v1.0.0
  work_id: P1-10
  cluster_id: liver_enzymes
signals:
- signal_id: signal_alt_high
  research_domain: metabolic
  signal_system: hepatic
  primary_metric:
    biomarker_id: alt
    rationale: Raised ALT in ambulatory adults is commonly associated with metabolic
      dysfunction-associated steatotic liver disease when metabolic risk context is
      present.
  trigger_direction: high
  activation:
    activation_logic: lab_range_exceeded
    activation_config:
      enable_upper_bound: true
      upper_bound_state: suboptimal
      enable_lower_bound: false
      lower_bound_state: suboptimal
  states:
    baseline_state: suboptimal
    escalation_state: at_risk
  supporting_markers:
  - biomarker_id: triglycerides
    expected_direction: high
    role: corroborator
    relationship_kind: corroboration
    availability: common
    rationale: Raised triglycerides support an insulin-resistant metabolic context
      that commonly accompanies steatotic liver disease.
  - biomarker_id: hba1c
    expected_direction: high
    role: mechanism_marker
    relationship_kind: mechanism
    availability: common
    rationale: Elevated HbA1c supports dysglycaemic or insulin-resistant metabolic
      stress associated with hepatic steatosis.
  - biomarker_id: creatine_kinase
    expected_direction: high
    role: differential_marker
    relationship_kind: differential
    availability: common
    rationale: Elevated creatine kinase redirects interpretation toward recent exertion
      or muscle injury rather than steatotic liver disease.
  contradiction_markers:
  - contradiction_id: ctr_high_ck
    marker_reference: creatine_kinase
    contradiction_rationale: Raised creatine kinase weakens a liver-specific metabolic
      interpretation and raises the possibility of muscle-source ALT elevation.
    contradiction_strength: strong
  - contradiction_id: ctr_normal_metabolic_markers
    marker_reference: hba1c
    contradiction_rationale: Normal glycaemic and triglyceride markers weaken a metabolic-steatotic
      interpretation, especially if alternative exposures are present.
    contradiction_strength: moderate
  missing_data:
    policies:
    - Obtain exposure history and broader liver tests before assigning a single-cause
      steatotic interpretation.
    - Review adiposity, diabetes status, alcohol intake, medications, and imaging
      before treating this as a steatotic liver diagnosis.
  confidence:
    evidence_strength: strong
  override_rules:
  - rule_id: or_alt_high_with_metabolic_context
    resulting_state: at_risk
    description: Escalate when ALT is high with corroborating metabolic-risk markers
      suggestive of steatotic liver stress.
    conditions:
    - metric_id: triglycerides
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    - metric_id: hba1c
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_lft_guide
    - source_alt_statpearls
  evidence:
    evidence_strength: strong
    physiological_claim: In asymptomatic adults, elevated ALT commonly occurs in a
      metabolic steatotic liver context when insulin-resistance markers are also abnormal.
    threshold_notes: No single ALT threshold establishes MASLD; this frame depends
      on lab abnormality plus corroborating metabolic context.
    sources:
    - source_id: source_lft_guide
      paper_title: Liver function Tests in Adults - A Guide for GPs
      journal: Royal United Hospitals Bath NHS Foundation Trust
      year: 2022
    - source_id: source_alt_statpearls
      paper_title: Alanine Aminotransferase (ALT) Test
      journal: StatPearls
      year: 2024
  confirmatory_test_refs:
  - test_id: ct_liver_ultrasound
    rationale: Imaging helps assess whether elevated ALT sits within a steatotic liver
      pattern.
  - test_id: ct_fibrosis_assessment
    rationale: Fibrosis scoring or elastography helps determine whether chronic metabolic
      liver injury has progressed beyond simple steatosis.
