hypotheses:
  - hypothesis_id: "mcv_high_anchor_pattern_v1"
    title: "Elevated MCV — structured macrocytosis signal pattern"
    safety_class: "monitoring"
    evidence_strength: "strong"
    summary_template: "MCV is elevated with an activated macrocytosis-related signal on this structured panel."
    required_markers:
      - "mcv"
    confirmatory_markers:
      - "vitamin_b12"
      - "folate"
    differentiator_markers: []
    evidence_for_rules:
      - rule_id: "mcv_high_signal_fired"
        signals_any:
          - "signal_mcv_high"
        direction: "fired"
        evidence_for_item: "An MCV-high signal fired, anchoring macrocytic red-cell interpretation."
        marker_refs:
          - "mcv"
      - rule_id: "mcv_marker_above_range"
        markers_all:
          - "mcv"
        direction: "high"
        evidence_for_item: "MCV is above reference range, supporting macrocytosis as measured."
        marker_refs:
          - "mcv"
    evidence_against_rules:
      - rule_id: "mcv_clearly_normal"
        markers_all:
          - "mcv"
        direction: "clearly_normal"
        evidence_against_item: "MCV appears within reference range, arguing against macrocytosis on this panel alone."
        marker_refs:
          - "mcv"
    missing_data_markers:
      - marker_id: "vitamin_b12"
        reason: "Serum B12 clarifies whether nutrient deficiency contributes when MCV is high."
      - marker_id: "folate"
        reason: "Folate adds methylation-context clarity alongside elevated MCV."
    confirmatory_tests:
      - "test_full_blood_count_indices_v1"
      - "test_serum_vitamin_b12_v1"
      - "test_serum_folate_v1"

