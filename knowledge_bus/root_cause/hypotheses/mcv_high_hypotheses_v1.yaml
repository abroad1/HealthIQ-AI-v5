    confirmatory_markers:
      - "homocysteine"
    differentiator_markers: []
    evidence_for_rules:
      - rule_id: "b12_low_with_high_mcv"
        markers_any:
          - "vitamin_b12"
        direction: "low"
        evidence_for_item: "Vitamin B12 is below reference range, supporting nutrient-associated macrocytosis context."
        marker_refs:
          - "vitamin_b12"
          - "mcv"
      - rule_id: "folate_low_with_high_mcv"
        markers_any:
          - "folate"
        direction: "low"
        evidence_for_item: "Folate is below reference range, supporting one-carbon pathway strain alongside elevated MCV."
        marker_refs:
          - "folate"
          - "mcv"
      - rule_id: "homocysteine_elevation_support"
        markers_any:
          - "homocysteine"
        direction: "high"
