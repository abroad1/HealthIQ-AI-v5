schema_version: "v1"
asset_id: "hdl_cholesterol_low_hypotheses_v1"
updated_at: "2026-04-04"
primary_signal_id: "signal_hdl_cholesterol_low"
primary_metric: "hdl_cholesterol"
notes:
  - "KB-S48 governed root-cause asset for low HDL-cholesterol context (canonical signal_hdl_cholesterol_low)."
  - "No diagnosis language, medication advice, dosing, or intervention instructions."
  - "All confirmatory_tests must reference knowledge_bus/registries/confirmatory_tests_v1.yaml."

hypotheses:
  - hypothesis_id: "hdl_adverse_cardiometabolic_pattern_v1"
    title: "Adverse HDL-cholesterol pattern"
    safety_class: "monitoring"
    evidence_strength: "strong"
    summary_template: "HDL cholesterol is low with a pattern consistent with adverse cardiometabolic HDL-C context on this panel."
    required_markers:
      - "hdl_cholesterol"
    confirmatory_markers:
      - "triglycerides"
      - "total_cholesterol"
    differentiator_markers: []
    evidence_for_rules:
      - rule_id: "hdl_signal_fired"
        signals_any:
          - "signal_hdl_cholesterol_low"
        direction: "fired"
        evidence_for_item: "A low-HDL-cholesterol signal fired, anchoring adverse HDL-C risk framing."
        marker_refs:
          - "hdl_cholesterol"
      - rule_id: "hdl_low_support"
        markers_all:
          - "hdl_cholesterol"
        direction: "low"
        evidence_for_item: "HDL cholesterol is below range, supporting a low-HDL dyslipidaemia pattern."
        marker_refs:
          - "hdl_cholesterol"
    evidence_against_rules:
      - rule_id: "hdl_clearly_normal"
        markers_all:
          - "hdl_cholesterol"
        direction: "clearly_normal"
        evidence_against_item: "HDL cholesterol appears clearly within range, arguing against a low-HDL pattern."
        marker_refs:
          - "hdl_cholesterol"
    missing_data_markers:
      - marker_id: "non_hdl_cholesterol"
        reason: "Non-HDL contextualises risk when HDL is low."
    confirmatory_tests:
      - "test_ty_g_component_markers_panel_v1"
      - "test_hba1c_repeat_v1"

  - hypothesis_id: "hdl_tg_dyslipidaemia_cluster_v1"
    title: "Low HDL with triglyceride dyslipidaemia cluster"
    safety_class: "monitoring"
    evidence_strength: "moderate"
    summary_template: "Low HDL co-occurs with elevated triglycerides consistent with atherogenic dyslipidaemia clustering."
    required_markers:
      - "hdl_cholesterol"
    confirmatory_markers:
      - "triglycerides"
    differentiator_markers: []
    evidence_for_rules:
      - rule_id: "triglyceride_high_with_low_hdl"
        markers_any:
          - "triglycerides"
        direction: "high"
        evidence_for_item: "Triglycerides are elevated, supporting TG-rich lipoprotein patterns that often accompany low HDL-C."
        marker_refs:
          - "triglycerides"
    evidence_against_rules: []
    missing_data_markers:
      - marker_id: "glucose"
        reason: "Glucose refines insulin-resistance coupling with low HDL and high TG."
    confirmatory_tests:
      - "test_ty_g_component_markers_panel_v1"
      - "test_fasting_glucose_insulin_context_v1"

  - hypothesis_id: "hdl_hepatic_metabolic_overlap_v1"
    title: "Hepatic–metabolic overlap with low HDL"
    safety_class: "monitoring"
    evidence_strength: "exploratory"
    summary_template: "Low HDL appears alongside hepatic enzyme context that can co-occur in metabolic–hepatic overlap patterns."
    required_markers:
      - "hdl_cholesterol"
    confirmatory_markers:
      - "ggt"
      - "alt"
    differentiator_markers: []
    evidence_for_rules:
      - rule_id: "ggt_high_low_hdl"
        markers_any:
          - "ggt"
        direction: "high"
        evidence_for_item: "GGT is elevated, supporting hepatic stress that can track with adverse lipid patterns."
        marker_refs:
          - "ggt"
    evidence_against_rules: []
    missing_data_markers: []
    confirmatory_tests:
      - "test_liver_ggt_alt_ast_v1"
