      - "creatinine"
    confirmatory_markers:
      - "urea"
    differentiator_markers: []
    evidence_for_rules:
      - rule_id: "creatinine_signal_fired"
        signals_any:
          - "signal_creatinine_high"
        direction: "fired"
        evidence_for_item: "A creatinine-high signal fired, anchoring elevated filtration-marker interpretation."
        marker_refs:
          - "creatinine"
      - rule_id: "creatinine_high_marker"
        markers_all:
          - "creatinine"
        direction: "high"
        evidence_for_item: "Creatinine is above the stated reference interval, supporting an elevated filtration-marker pattern."
        marker_refs:
          - "creatinine"
    evidence_against_rules:
      - rule_id: "creatinine_clearly_normal"
        markers_all:
          - "creatinine"
        direction: "clearly_normal"
