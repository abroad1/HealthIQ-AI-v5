    safety_class: "monitoring"
    evidence_strength: "moderate"
    summary_template: "Triglyceride elevation co-occurs with glycaemic markers that often track with insulin-resistance physiology."
    required_markers:
      - "triglycerides"
    confirmatory_markers:
      - "glucose"
      - "hba1c"
    differentiator_markers: []
    evidence_for_rules:
      - rule_id: "glucose_high_with_tg"
        markers_any:
          - "glucose"
        direction: "high"
        evidence_for_item: "Glucose is elevated, supporting glycaemic stress alongside triglyceride elevation."
        marker_refs:
          - "glucose"
      - rule_id: "hba1c_high_with_tg"
        markers_any:
          - "hba1c"
        direction: "high"
        evidence_for_item: "HbA1c is elevated, supporting chronic dysglycaemia overlapping TG-rich patterns."
        marker_refs:
          - "hba1c"
    evidence_against_rules: []
    missing_data_markers:
