hypotheses:
  - hypothesis_id: "tg_hepatic_vldl_output_context_v1"
    title: "Hepatic VLDL–triglyceride output context"
    safety_class: "monitoring"
    evidence_strength: "strong"
    summary_template: "Triglycerides are elevated with a pattern consistent with increased hepatic VLDL–TG output on this panel."
    required_markers:
      - "triglycerides"
    confirmatory_markers:
      - "ggt"
      - "alt"
    differentiator_markers:
      - "hdl_cholesterol"
    evidence_for_rules:
      - rule_id: "tg_signal_fired"
        signals_any:
          - "signal_triglycerides_high"
        direction: "fired"
        evidence_for_item: "A triglycerides-high signal fired, anchoring hypertriglyceridaemia interpretation."
        marker_refs:
          - "triglycerides"
      - rule_id: "triglyceride_high_support"
        markers_all:
          - "triglycerides"
        direction: "high"
        evidence_for_item: "Triglycerides are elevated relative to range, supporting sustained TG burden framing."
        marker_refs:
          - "triglycerides"
    evidence_against_rules:
      - rule_id: "triglyceride_clearly_normal"
        markers_all:
          - "triglycerides"
        direction: "clearly_normal"
        evidence_against_item: "Triglycerides appear clearly within range, arguing against a hypertriglyceridaemia pattern."
        marker_refs:
          - "triglycerides"
    missing_data_markers:
      - marker_id: "non_hdl_cholesterol"
        reason: "Non-HDL contextualises atherogenic burden alongside TG elevation."
    confirmatory_tests:
      - "test_liver_ggt_alt_ast_v1"
      - "test_ty_g_component_markers_panel_v1"

