schema_version: "v1"
asset_id: "lipid_transport_dysfunction_hypotheses_v1"
updated_at: "2026-04-04"
primary_signal_id: "signal_lipid_transport_dysfunction"
primary_metric: "non_hdl_cholesterol"
notes:
  - "KB-S48 governed root-cause asset for lipid transport dysfunction (non-HDL–anchored context)."
  - "No diagnosis language, medication advice, dosing, or intervention instructions."
