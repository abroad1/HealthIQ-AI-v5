hypotheses:
  - hypothesis_id: "ldl_classic_atherogenic_elevation_v1"
    title: "Classic LDL-cholesterol elevation pattern"
    safety_class: "monitoring"
    evidence_strength: "strong"
    summary_template: "LDL cholesterol is elevated with a pattern consistent with atherogenic LDL-C burden on this panel."
    required_markers:
      - "ldl_cholesterol"
    confirmatory_markers:
      - "total_cholesterol"
      - "non_hdl_cholesterol"
    differentiator_markers:
      - "hdl_cholesterol"
    evidence_for_rules:
      - rule_id: "ldl_signal_fired"
        signals_any:
          - "signal_ldl_cholesterol_high"
        direction: "fired"
        evidence_for_item: "An LDL-cholesterol-high signal fired, anchoring atherogenic LDL-C interpretation."
        marker_refs:
          - "ldl_cholesterol"
      - rule_id: "ldl_high_support"
        markers_all:
          - "ldl_cholesterol"
        direction: "high"
        evidence_for_item: "LDL cholesterol is elevated relative to range, supporting classic LDL-C burden framing."
        marker_refs:
          - "ldl_cholesterol"
    evidence_against_rules:
      - rule_id: "ldl_clearly_normal"
        markers_all:
          - "ldl_cholesterol"
        direction: "clearly_normal"
        evidence_against_item: "LDL cholesterol appears clearly within range, arguing against a sustained LDL-C elevation pattern."
        marker_refs:
          - "ldl_cholesterol"
    missing_data_markers:
      - marker_id: "non_hdl_cholesterol"
        reason: "Non-HDL refines atherogenic burden beyond LDL-C alone."
    confirmatory_tests:
      - "test_thyroid_tsh_ft4_v1"
      - "test_hba1c_repeat_v1"

  - hypothesis_id: "ldl_thyroid_linked_context_v1"
