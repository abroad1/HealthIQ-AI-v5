    safety_class: "monitoring"
    evidence_strength: "moderate"
    summary_template: "LDL elevation co-occurs with thyroid-axis markers that can influence lipid clearance interpretation."
    required_markers:
      - "ldl_cholesterol"
    confirmatory_markers:
      - "tsh"
    differentiator_markers: []
    evidence_for_rules:
      - rule_id: "tsh_high_with_ldl"
        markers_any:
          - "tsh"
        direction: "high"
        evidence_for_item: "TSH is elevated, supporting thyroid-slowing context that often associates with higher LDL-C."
        marker_refs:
          - "tsh"
    evidence_against_rules: []
    missing_data_markers:
      - marker_id: "free_t4"
        reason: "Free T4 clarifies thyroid state when TSH is borderline."
    confirmatory_tests:
      - "test_thyroid_tsh_ft4_v1"

  - hypothesis_id: "ldl_inflammatory_companion_v1"
    title: "Inflammatory companion context with LDL elevation"
