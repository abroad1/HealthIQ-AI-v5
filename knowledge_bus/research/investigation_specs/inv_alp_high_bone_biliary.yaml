spec_id: inv_alp_high_bone_biliary
signal_id: signal_alp_high
research_domain: hepatic
primary_marker:
  biomarker_id: alp
  rationale: Alkaline Phosphatase is found in liver and bone. High levels indicate
    either biliary obstruction or increased bone turnover.
  signal_system: hepatic
trigger_direction: high
activation:
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
states:
  baseline_state: suboptimal
  escalation_state: at_risk
supporting_markers:
- biomarker_id: ggt
  expected_direction: high
  role: differential_marker
  availability: common
  rationale: If GGT is high, ALP is likely from the liver; if GGT is normal, ALP is
    likely from bone.
- biomarker_id: bilirubin
  expected_direction: high
  role: mechanism_marker
  availability: common
  rationale: Co-elevation confirms cholestasis (bile duct blockage).
- biomarker_id: calcium
  expected_direction: either
  role: corroborator
  availability: common
  rationale: Abnormal calcium + high ALP (with normal GGT) points toward bone pathology.
override_rules:
- rule_id: or_alp_biliary_obstruction
  resulting_state: at_risk
  description: Escalate if high ALP is accompanied by high GGT and high Bilirubin.
  conditions:
  - metric_id: ggt
    operator: '>'
    condition_type: all_of
    comparator_type: lab_range_boundary
    lab_range_boundary: above_max
  - metric_id: bilirubin
    operator: '>'
    condition_type: all_of
    comparator_type: lab_range_boundary
    lab_range_boundary: above_max
  source_refs:
  - source_ref_7
confounders:
- confounder: Pregnancy
  effect: interpretation_shift
  mitigation_note: Placental ALP can significantly elevate total ALP in the 3rd trimester.
- confounder: Adolescence
  effect: interpretation_shift
  mitigation_note: Rapid bone growth in teenagers leads to naturally high ALP levels.
evidence:
  evidence_strength: strong
  sources:
  - source_id: source_ref_7
    paper_title: Evaluation of abnormal ALP
    journal: BMJ
    year: 2021
  physiological_claim: ALP is localized to the canalicular membrane of hepatocytes
    and the osteoblasts of bone.
  threshold_notes: Lab-range breach trigger.
narrative:
  mechanism: Enzymatic cleavage of phosphate groups at alkaline pH.
  biological_pathway: Biliary excretion and bone mineralization.
  interpretation: Requires GGT 'de-biasing' to determine the tissue of origin.
  implications: Possible gallstones, primary biliary cholangitis, or Vitamin D deficiency
    (bone source).
  supporting_marker_roles:
    ggt: The definitive discriminator between liver and bone sources.
