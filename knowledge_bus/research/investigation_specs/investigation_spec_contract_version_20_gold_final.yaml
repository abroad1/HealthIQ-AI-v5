- "spec_id": "inv_fasting_glucose_high"
  "contract_version": "2.0"
  "status": "production"
  "signal_id": "signal_fasting_glucose_high"
  "research_domain": "metabolic"
  "primary_marker":
    "biomarker_id": "fasting_glucose"
    "rationale": "Fasting plasma glucose (FPG) is a primary marker for impaired glucose homeostasis. Levels >=5.6 mmol/L are associated with increased risk of cardiovascular disease (RR 1.13-1.30)."
    "signal_system": "metabolic"
  "trigger_direction": "high"
  "activation":
    "activation_logic": "lab_range_exceeded"
    "activation_config":
      "enable_upper_bound": true
      "upper_bound_state": "suboptimal"
      "enable_lower_bound": false
      "lower_bound_state": "suboptimal"
  "states":
    "baseline_state": "suboptimal"
    "escalation_state": "at_risk"
  "supporting_markers":
    - "biomarker_id": "hba1c"
      "expected_direction": "high"
      "role": "corroborator"
      "relationship_kind": "corroboration"
      "availability": "common"
      "rationale": "Chronic glycation status confirms if FPG elevation is a persistent metabolic state."
    - "biomarker_id": "fasting_insulin"
      "expected_direction": "high"
      "role": "mechanism_marker"
      "relationship_kind": "mechanism"
      "availability": "common"
      "rationale": "Elevated insulin alongside high glucose indicates compensated insulin resistance (HOMA-IR)."
    - "biomarker_id": "hs_crp"
      "expected_direction": "high"
      "role": "differential_marker"
      "relationship_kind": "differential"
      "availability": "common"
      "rationale": "Distinguishes between chronic metabolic inflammation and acute stress-induced hyperglycaemia."
  "hypotheses":
    - "hypothesis_id": "hyp_impaired_fasting_glucose"
      "rank": 1
      "physiological_claim": "Early-stage insulin resistance where hepatic glucose production exceeds peripheral clearance in the post-absorptive state."
      "evidence_strength": "strong"
      "caveats":
        - "Requires strict 8-hour fast."
        - "Acute stress or illness can cause transient hyperglycemia."
      "missing_data":
        "policy": "If HbA1c is normal, prioritize acute stress over chronic insulin resistance."
      "supporting_marker_refs":
        - "hba1c"
        - "fasting_insulin"
      "contradiction_markers":
        - "contradiction_id": "ctr_normal_hba1c"
          "marker_reference": "hba1c"
          "contradiction_rationale": "A normal HbA1c contradicts a state of chronic sustained hyperglycemia."
          "contradiction_strength": "moderate"
  "hypothesis_ranking":
    "ordered_hypothesis_ids":
      - "hyp_impaired_fasting_glucose"
  "confirmatory_tests":
    - "test_id": "ct_ogtt"
      "rationale": "Oral Glucose Tolerance Test is the gold standard for defining glucose tolerance when fasting levels are borderline."
  "override_rules":
    - "rule_id": "or_glucose_diabetes_threshold"
      "resulting_state": "at_risk"
      "description": "Escalate if FPG meets WHO diagnostic criteria for diabetes (>= 7.0 mmol/L)."
      "conditions":
        - "metric_id": "fasting_glucose"
          "operator": ">="
          "condition_type": "all_of"
          "comparator_type": "numeric_value"
          "numeric_value": 7.0
      "source_refs":
        - "source_who_2006"
  "evidence":
    "evidence_strength": "strong"
    "sources":
      - "source_id": "source_bmj_2016_meta"
        "paper_title": "Association between prediabetes and risk of cardiovascular disease: systematic review and meta-analysis"
        "journal": "BMJ"
        "year": 2016
      - "source_id": "source_who_2006"
        "paper_title": "Definition and diagnosis of diabetes mellitus and intermediate hyperglycaemia"
        "journal": "WHO/IDF Report"
        "year": 2006
    "physiological_claim": "Fasting glucose >5.6 mmol/L is an independent predictor of vascular events and progression to Type 2 Diabetes."
    "threshold_notes": "Lab-range breach is the primary trigger; 7.0 mmol/L is the diagnostic threshold for at-risk escalation."
  "narrative":
    "mechanism": "Insufficient insulin action to suppress hepatic gluconeogenesis during the fasting state."
    "biological_pathway": "Hepatic Glucose Metabolism / Insulin Signaling Axis."
    "interpretation": "Indicator of early metabolic dysfunction and impaired glucose tolerance."
    "implications": "Increased risk of microvascular and macrovascular complications."
    "supporting_marker_roles": "HbA1c provides chronicity context; Insulin identifies the degree of resistance."

- "spec_id": "inv_fasting_insulin_high"
  "contract_version": "2.0"
  "status": "production"
  "signal_id": "signal_fasting_insulin_high"
  "research_domain": "metabolic"
  "primary_marker":
    "biomarker_id": "fasting_insulin"
    "rationale": "Fasting insulin is a marker of pancreatic compensation for peripheral resistance. Levels in the highest quartile (e.g., >10 uIU/mL) are associated with 1.6x higher risk of hypertension."
    "signal_system": "metabolic"
  "trigger_direction": "high"
  "activation":
    "activation_logic": "lab_range_exceeded"
    "activation_config":
      "enable_upper_bound": true
      "upper_bound_state": "suboptimal"
      "enable_lower_bound": false
      "lower_bound_state": "suboptimal"
  "states":
    "baseline_state": "suboptimal"
    "escalation_state": "at_risk"
  "supporting_markers":
    - "biomarker_id": "fasting_glucose"
      "expected_direction": "high"
      "role": "corroborator"
      "relationship_kind": "corroboration"
      "availability": "common"
      "rationale": "High insulin with normal glucose indicates compensated resistance; both high indicates failure of compensation."
    - "biomarker_id": "triglycerides"
      "expected_direction": "high"
      "role": "mechanism_marker"
      "relationship_kind": "mechanism"
      "availability": "common"
      "rationale": "Hyperinsulinemia drives hepatic VLDL synthesis and hypertriglyceridemia."
  "hypotheses":
    - "hypothesis_id": "hyp_insulin_resistance"
      "rank": 1
      "physiological_claim": "Hyperinsulinemia is a compensatory response to reduced peripheral insulin sensitivity in muscle and liver tissues."
      "evidence_strength": "strong"
      "caveats":
        - "Reference ranges vary significantly by assay; levels >10 uIU/mL are often predictive of metabolic syndrome in prospective cohorts."
      "missing_data":
        "policy": "If triglycerides are high, escalate suspicion of metabolic syndrome."
      "supporting_marker_refs":
        - "fasting_glucose"
        - "triglycerides"
      "contradiction_markers": []
  "hypothesis_ranking":
    "ordered_hypothesis_ids":
      - "hyp_insulin_resistance"
  "confirmatory_tests":
    - "test_id": "ct_homa_ir"
      "rationale": "HOMA-IR (Glucose x Insulin / 22.5) provides a standardized assessment of resistance severity."
  "override_rules":
    - "rule_id": "or_insulin_resistance_pattern"
      "resulting_state": "at_risk"
      "description": "Escalate if high insulin is accompanied by elevated triglycerides."
      "conditions":
        - "metric_id": "triglycerides"
          "operator": ">"
          "condition_type": "all_of"
          "comparator_type": "lab_range_boundary"
          "boundary": "above_max"
      "source_refs":
        - "source_ajcn_2013_meta"
  "evidence":
    "evidence_strength": "strong"
    "sources":
      - "source_id": "source_ajcn_2013_meta"
        "paper_title": "Fasting insulin concentrations and incidence of hypertension, stroke, and coronary heart disease: a meta-analysis"
        "journal": "American Journal of Clinical Nutrition"
        "year": 2013
    "physiological_claim": "Hyperinsulinemia is an independent predictor of CHD and hypertension in non-diabetic adults."
    "threshold_notes": "Each 50 pmol/L increment increases CHD risk by approximately 16%."
  "narrative":
    "mechanism": "Pancreatic beta-cells increase insulin secretion to maintain euglycemia as peripheral insulin sensitivity declines."
    "biological_pathway": "Insulin Signaling / PI3K Pathway."
    "interpretation": "Early metabolic warning signal for insulin resistance."
    "implications": "Predictive of future metabolic syndrome, Type 2 Diabetes, and vascular injury."
    "supporting_marker_roles": "Glucose differentiates between compensated and overt metabolic failure; TG tracks hepatic impact."

- "spec_id": "inv_c_peptide_high"
  "contract_version": "2.0"
  "status": "production"
  "signal_id": "signal_c_peptide_high"
  "research_domain": "metabolic"
  "primary_marker":
    "biomarker_id": "c_peptide"
    "rationale": "C-peptide is released in a 1:1 ratio with insulin but has a longer half-life. It is an accurate marker of endogenous insulin secretion."
    "signal_system": "metabolic"
  "trigger_direction": "high"
  "activation":
    "activation_logic": "lab_range_exceeded"
    "activation_config":
      "enable_upper_bound": true
      "upper_bound_state": "suboptimal"
      "enable_lower_bound": false
      "lower_bound_state": "suboptimal"
  "states":
    "baseline_state": "suboptimal"
    "escalation_state": "at_risk"
  "supporting_markers":
    - "biomarker_id": "creatinine"
      "expected_direction": "high"
      "role": "differential_marker"
      "relationship_kind": "differential"
      "availability": "common"
      "rationale": "C-peptide is cleared by the kidneys; elevation can occur in renal impairment independently of insulin production."
    - "biomarker_id": "fasting_glucose"
      "expected_direction": "high"
      "role": "corroborator"
      "relationship_kind": "corroboration"
      "availability": "common"
      "rationale": "High C-peptide with high glucose confirms endogenous hyperinsulinism in metabolic syndrome."
  "hypotheses":
    - "hypothesis_id": "hyp_endogenous_hyperinsulinism"
      "rank": 1
      "physiological_claim": "Hypersecretion of insulin by pancreatic beta-cells to meet high metabolic demand or overcome resistance."
      "evidence_strength": "strong"
      "caveats":
        - "Required to exclude renal retention in patients with CKD."
      "missing_data":
        "policy": "Assume no renal interference if creatinine is normal."
      "supporting_marker_refs":
        - "fasting_glucose"
      "contradiction_markers":
        - "contradiction_id": "ctr_renal_failure"
          "marker_reference": "creatinine"
          "contradiction_rationale": "High creatinine suggests the C-peptide elevation may be due to poor clearance."
          "contradiction_strength": "strong"
  "hypothesis_ranking":
    "ordered_hypothesis_ids":
      - "hyp_endogenous_hyperinsulinism"
  "confirmatory_tests":
    - "test_id": "ct_ucpcr"
      "rationale": "Urinary C-peptide/creatinine ratio provides a validated integrated measure of daily insulin secretion."
  "override_rules":
    - "rule_id": "or_c_peptide_renal_exclusion"
      "resulting_state": "at_risk"
      "description": "Escalate if high C-peptide occurs with creatinine not above the laboratory upper bound, reducing likelihood of a renal-retention false positive."
      "conditions":
        - "metric_id": "creatinine"
          "operator": "<="
          "condition_type": "all_of"
          "comparator_type": "lab_range_boundary"
          "boundary": "above_max"
      "source_refs":
        - "source_diabetologia_2014_cohort"
  "evidence":
    "evidence_strength": "strong"
    "sources":
      - "source_id": "source_diabetologia_2014_cohort"
        "paper_title": "C-peptide predicts all-cause and cardiovascular death in a cohort of individuals with newly diagnosed type 2 diabetes"
        "journal": "Diabetologia"
        "year": 2014
    "physiological_claim": "Endogenous hyperinsulinemia, marked by high C-peptide, is an independent risk factor for cardiovascular mortality."
    "threshold_notes": "C-peptide >1.0 nmol/L is associated with significantly higher CV death risk in diabetic cohorts."
  "narrative":
    "mechanism": "Proinsulin cleavage in pancreatic beta-cells releases insulin and C-peptide into the bloodstream."
    "biological_pathway": "Insulin Secretory Pathway / Proinsulin Processing."
    "interpretation": "Reflects the integrated workload and output of the pancreas."
    "implications": "Persistent elevation suggests progressive metabolic stress and insulin resistance."
    "supporting_marker_roles": "Glucose identifies the demand state; Creatinine excludes clearance-driven false positives."

- "spec_id": "inv_fructosamine_high"
