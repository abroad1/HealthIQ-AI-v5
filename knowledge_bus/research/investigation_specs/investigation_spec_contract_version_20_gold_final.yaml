  "research_domain": "hepatic"
  "primary_marker":
    "biomarker_id": "ast_alt_ratio"
    "rationale": "The AST/ALT ratio (De Ritis ratio) is a validated predictor of all-cause mortality and advanced liver fibrosis. Ratio >=1.40 is an independent prognostic factor in CAD cohorts (HR 2.93)."
    "signal_system": "hepatic"
  "trigger_direction": "high"
  "activation":
    "activation_logic": "lab_range_exceeded"
    "activation_config":
      "enable_upper_bound": true
