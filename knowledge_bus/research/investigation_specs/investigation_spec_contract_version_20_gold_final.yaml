      "enable_lower_bound": false
      "lower_bound_state": "suboptimal"
  "states":
    "baseline_state": "suboptimal"
    "escalation_state": "at_risk"
  "supporting_markers":
    - "biomarker_id": "alt"
      "expected_direction": "high"
      "role": "differential_marker"
      "relationship_kind": "differential"
      "availability": "common"
      "rationale": "ALT is more liver-specific; isolated AST elevation suggests extra-hepatic origin (muscle)."
    - "biomarker_id": "ggt"
      "expected_direction": "high"
      "role": "corroborator"
      "relationship_kind": "corroboration"
      "availability": "common"
      "rationale": "Co-elevation confirms that transaminase rises are likely hepatic."
  "hypotheses":
    - "hypothesis_id": "hyp_advanced_liver_fibrosis"
      "rank": 1
      "physiological_claim": "Decreased clearance of AST by hepatic sinusoidal cells in cirrhosis, leading to ratio elevation."
      "evidence_strength": "strong"
      "caveats":
        - "AST/ALT ratio >2.0 is highly suggestive of alcoholic liver disease."
      "missing_data":
        "policy": "If GGT is normal, investigate non-hepatic sources."
      "supporting_marker_refs":
        - "alt"
        - "ggt"
      "contradiction_markers": []
  "hypothesis_ranking":
    "ordered_hypothesis_ids":
      - "hyp_advanced_liver_fibrosis"
  "confirmatory_tests":
    - "test_id": "ct_liver_us"
      "rationale": "Essential for evaluating structural changes in suspected cirrhosis."
  "override_rules":
    - "rule_id": "or_ast_alt_fibrosis_risk"
      "resulting_state": "at_risk"
      "description": "Escalate if ratio >=1.40, associated with significant cirrhosis risk (HR 2.77) and ACM."
      "conditions":
        - "metric_id": "ast_alt_ratio"
          "operator": ">="
          "condition_type": "all_of"
          "comparator_type": "numeric_value"
          "numeric_value": 1.4
      "source_refs":
        - "source_sci_rep_2022_ratio"
  "evidence":
    "evidence_strength": "strong"
    "sources":
      - "source_id": "source_sci_rep_2022_ratio"
        "paper_title": "Elevated AST/ALT ratio is associated with all-cause mortality in patients with stable coronary artery disease"
        "journal": "Scientific Reports"
        "year": 2022
    "physiological_claim": "AST/ALT ratio predicts mortality independently of classical cardiovascular risk factors."
    "threshold_notes": "1.40 is the optimal threshold for predicting mortality in longitudinal analysis."
  "narrative":
    "mechanism": "Loss of AST clearance in cirrhosis or direct AST release from damaged myocytes."
    "biological_pathway": "Hepatocellular Integrity / Fibrogenesis."
    "interpretation": "Marker of disease severity in chronic liver or heart conditions."
    "implications": "Requires assessment for cirrhosis, NAFLD, or muscle damage."
    "supporting_marker_roles": "ALT/GGT localize to liver; isolated AST suggests muscle origin."

