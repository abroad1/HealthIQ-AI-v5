        "journal": "Circulation"
        "year": 2015
    "physiological_claim": "Fructosamine levels are strongly associated with future risk of retinopathy, nephropathy, and cardiovascular mortality."
    "threshold_notes": "230 umol/L corresponds to the top quartile risk in the ARIC cohort."
  "narrative":
    "mechanism": "Maillard reaction between glucose and serum proteins, predominantly albumin."
    "biological_pathway": "Protein Glycation / Advanced Glycation End-product Formation."
    "interpretation": "Valuable for bridging the gap between point-in-time glucose and long-term HbA1c."
    "implications": "Predictive of metabolic complications and short-to-intermediate term treatment failure."
    "supporting_marker_roles": "HbA1c tracks chronic history; Albumin ensures the validity of the glycation substrate."

- "spec_id": "inv_ast_alt_ratio_high"
