  "override_rules":
    - "rule_id": "or_fructosamine_mortality_risk"
      "resulting_state": "at_risk"
      "description": "Escalate for high fructosamine (>230 umol/L) linked to significantly higher all-cause mortality."
      "conditions":
        - "metric_id": "fructosamine"
          "operator": ">="
          "condition_type": "all_of"
          "comparator_type": "numeric_value"
