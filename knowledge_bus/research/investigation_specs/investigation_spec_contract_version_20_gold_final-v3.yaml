  threshold_notes: ">0.27 umol/L is the widely used clinical threshold."
narrative:
  mechanism: "B12 cofactor deficiency causes metabolic backup of acids into the blood."
  biological_pathway: "Propionate Metabolism Pathway within the mitochondria."
  interpretation: "Detects B12 deficiency at the cellular and tissue level."
  implications: "If left untreated, leads to irreversible neurological damage."
  supporting_marker_roles: "Creatinine rules out false positives; B12 identifies nutrient lack."

