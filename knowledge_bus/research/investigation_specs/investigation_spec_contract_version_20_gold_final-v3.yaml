investigation_spec_contract_version: "3.0.0"
spec_id: "inv_tibc_high"
signal_id: "signal_tibc_high"
research_domain: "hematologic"
primary_marker:
  biomarker_id: "tibc"
  rationale: "TIBC measures transferrin capacity; increases in iron deficiency."
  signal_system: "hematologic"
trigger_direction: "high"
activation:
  activation_logic: "lab_range_exceeded"
  activation_config:
    enable_upper_bound: true
    upper_bound_state: "suboptimal"
    enable_lower_bound: false
    lower_bound_state: "suboptimal"
states:
  baseline_state: "suboptimal"
  escalation_state: "at_risk"
supporting_markers:
  - biomarker_id: "alt"
    expected_direction: "high"
    role: "differential_marker"
    relationship_kind: "differential"
    availability: "common"
    rationale: "Rules out liver synthesis artifact; distinguishes true deficiency from hepatic failure."
  - biomarker_id: "ferritin"
    expected_direction: "low"
    role: "corroborator"
    relationship_kind: "corroboration"
    availability: "common"
    rationale: "Low ferritin + high TIBC pathognomonic for absolute iron deficiency."
hypotheses:
  - hypothesis_id: "hyp_iron_depletion_drive"
    rank: 1
    physiological_claim: "Hepatic up-regulation of transferrin in response to low stores."
    evidence_strength: "strong"
    caveats: ["Falsely elevated by pregnancy or oral contraceptive use."]
    missing_data:
      policy: "Requires ferritin to confirm depletion of total body stores."
    supporting_marker_refs: ["ferritin"]
    contradiction_markers:
      - contradiction_id: "ctr_high_ferritin"
        marker_reference: "ferritin"
        contradiction_rationale: "High ferritin suggests sequestration or inflammation rather than deficiency."
        contradiction_strength: "strong"
  - hypothesis_id: "hyp_estrogen_induced_synthesis"
    rank: 2
    physiological_claim: "Non-iron related increase in transferrin driven by hormone status."
    evidence_strength: "strong"
    caveats: ["Standard in the second/third trimester of pregnancy."]
    missing_data:
      policy: "Determine if the patient is pregnant or on estrogen therapy."
    supporting_marker_refs: ["alt"]
    contradiction_markers: []
hypothesis_ranking:
  ordered_hypothesis_ids: ["hyp_iron_depletion_drive", "hyp_estrogen_induced_synthesis"]
confirmatory_tests:
  - test_id: "ct_stfr_assay"
    rationale: "Soluble Transferrin Receptor Assay validates iron-starved erythropoiesis."
override_rules:
  - rule_id: "or_tibc_iron_def_atrisk"
    resulting_state: "at_risk"
    description: "Escalate if high TIBC + low ferritin (<30 ug/L)."
    conditions:
      - metric_id: "ferritin"
        operator: "<"
        condition_type: "all_of"
        comparator_type: "numeric_value"
        numeric_value: 30
    source_refs: ["source_nice_2021_iron"]
evidence:
  evidence_strength: "strong"
  sources:
    - source_id: "source_nice_2021_iron"
      paper_title: "Iron deficiency anaemia identification and management"
      journal: "NICE"
      year: 2021
  physiological_claim: "TIBC has high diagnostic sensitivity for absolute iron deficiency."
  threshold_notes: "30 ug/L ferritin is the clinical threshold for definitive diagnosis."
narrative:
  mechanism: "Liver increases transport protein production to optimize iron delivery to marrow."
  biological_pathway: "Iron Homeostasis Pathway managed by the IRP/IRE system."
  interpretation: "Highly specific marker for depleted iron stores in non-inflamed patients."
  implications: "Associated with symptoms of fatigue, restless legs, and anemia."
  supporting_marker_roles: "ALT rules out hepatic artifact; Ferritin defines storage level."

