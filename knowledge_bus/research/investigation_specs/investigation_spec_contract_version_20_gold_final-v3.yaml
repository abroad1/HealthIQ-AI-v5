signal_id: "signal_fasting_insulin_high"
research_domain: "metabolic"
primary_marker:
  biomarker_id: "fasting_insulin"
  rationale: "Fasting insulin is a marker of pancreatic compensation for peripheral resistance. Levels >10 uIU/mL increase risk."
  signal_system: "metabolic"
trigger_direction: "high"
activation:
  activation_logic: "lab_range_exceeded"
  activation_config:
    enable_upper_bound: true
    upper_bound_state: "suboptimal"
    enable_lower_bound: false
    lower_bound_state: "suboptimal"
states:
  baseline_state: "suboptimal"
  escalation_state: "at_risk"
supporting_markers:
  - biomarker_id: "triglycerides"
    expected_direction: "high"
    role: "mechanism_marker"
    relationship_kind: "mechanism"
    availability: "common"
    rationale: "Hyperinsulinemia drives hepatic VLDL synthesis and hypertriglyceridemia."
  - biomarker_id: "c_peptide"
    expected_direction: "high"
    role: "differential_marker"
    relationship_kind: "differential"
    availability: "common"
    rationale: "Rules out exogenous insulin use; high C-peptide confirms the insulin is endogenously produced."
hypotheses:
  - hypothesis_id: "hyp_insulin_resistance"
    rank: 1
    physiological_claim: "Hyperinsulinemia is a compensatory response to reduced peripheral insulin sensitivity."
    evidence_strength: "strong"
    caveats: ["Reference ranges vary significantly by assay; levels >10 uIU/mL are often predictive."]
    missing_data:
      policy: "If triglycerides are high, escalate suspicion of metabolic syndrome."
    supporting_marker_refs: ["triglycerides"]
    contradiction_markers: []
  - hypothesis_id: "hyp_exogenous_insulin_artifact"
    rank: 2
    physiological_claim: "Measured insulin elevation due to medical injection rather than pancreatic secretion."
    evidence_strength: "strong"
    caveats: ["Requires C-peptide validation to rule out endogenous source."]
    missing_data:
      policy: "Prioritize patient medical history check for insulin use."
    supporting_marker_refs: ["c_peptide"]
    contradiction_markers: []
hypothesis_ranking:
  ordered_hypothesis_ids: ["hyp_insulin_resistance", "hyp_exogenous_insulin_artifact"]
confirmatory_tests:
  - test_id: "ct_homa_ir"
    rationale: "HOMA-IR (Glucose x Insulin / 22.5) provides a standardized assessment of resistance severity."
override_rules:
  - rule_id: "or_insulin_resistance_pattern"
    resulting_state: "at_risk"
    description: "Escalate if high insulin is accompanied by elevated triglycerides."
    conditions:
      - metric_id: "triglycerides"
        operator: ">"
        condition_type: "all_of"
        comparator_type: "lab_range_boundary"
        boundary: "above_max"
    source_refs: ["source_ajcn_2013_meta"]
evidence:
  evidence_strength: "strong"
  sources:
    - source_id: "source_ajcn_2013_meta"
      paper_title: "Fasting insulin concentrations and incidence of hypertension, stroke, and CHD"
      journal: "AJCN"
      year: 2013
  physiological_claim: "Hyperinsulinemia is an independent predictor of CHD and hypertension in non-diabetic adults."
  threshold_notes: "Each 50 pmol/L increment increases CHD risk by approximately 16%."
narrative:
  mechanism: "Pancreatic beta-cells increase insulin secretion to maintain euglycemia as peripheral sensitivity declines."
  biological_pathway: "Insulin Signaling / PI3K Pathway regulating glucose uptake in skeletal muscle."
  interpretation: "Early metabolic warning signal for insulin resistance preceding glucose elevation."
  implications: "Predictive of future metabolic syndrome, Type 2 Diabetes, and vascular injury."
  supporting_marker_roles: "TG tracks hepatic impact; C-peptide differentiates endogenous vs exogenous sources."

