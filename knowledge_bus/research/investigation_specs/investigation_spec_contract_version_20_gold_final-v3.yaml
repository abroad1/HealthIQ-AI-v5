investigation_spec_contract_version: "3.0.0"
spec_id: "inv_bicarbonate_low"
signal_id: "signal_bicarbonate_low"
research_domain: "renal"
primary_marker:
  biomarker_id: "bicarbonate"
  rationale: "Bicarbonate is the primary buffer; low levels suggest acidosis."
  signal_system: "renal"
trigger_direction: "low"
activation:
  activation_logic: "lab_range_exceeded"
  activation_config:
    enable_upper_bound: false
    upper_bound_state: "suboptimal"
