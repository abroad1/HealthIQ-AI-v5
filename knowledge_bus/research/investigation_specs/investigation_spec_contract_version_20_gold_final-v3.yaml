    relationship_kind: "differential"
    availability: "common"
    rationale: "Rules out renal retention; C-peptide elevation can occur in CKD independently of pancreatic output."
  - biomarker_id: "fasting_glucose"
    expected_direction: "high"
    role: "corroborator"
    relationship_kind: "corroboration"
    availability: "common"
    rationale: "High C-peptide with high glucose confirms endogenous hyperinsulinism in metabolic syndrome."
hypotheses:
  - hypothesis_id: "hyp_endogenous_hyperinsulinism"
    rank: 1
    physiological_claim: "Hypersecretion of insulin by pancreatic beta-cells to meet high metabolic demand."
    evidence_strength: "strong"
    caveats: ["Requires exclusion of renal retention in patients with CKD."]
    missing_data:
      policy: "Assume no renal interference if creatinine is normal."
    supporting_marker_refs: ["fasting_glucose"]
    contradiction_markers:
      - contradiction_id: "ctr_renal_failure"
        marker_reference: "creatinine"
        contradiction_rationale: "High creatinine suggests the C-peptide elevation may be due to poor clearance."
        contradiction_strength: "strong"
  - hypothesis_id: "hyp_renal_clearance_failure"
    rank: 2
    physiological_claim: "C-peptide elevation driven by decreased glomerular filtration and tubular degradation."
    evidence_strength: "strong"
    caveats: ["Common in patients with Stage 3 or higher CKD."]
    missing_data:
      policy: "Review eGFR calculations to determine clearance rate."
    supporting_marker_refs: ["creatinine"]
    contradiction_markers: []
hypothesis_ranking:
  ordered_hypothesis_ids: ["hyp_endogenous_hyperinsulinism", "hyp_renal_clearance_failure"]
confirmatory_tests:
  - test_id: "ct_ucpcr"
    rationale: "Urinary C-peptide/creatinine ratio provides a validated integrated measure of daily insulin secretion."
override_rules:
  - rule_id: "or_c_peptide_renal_exclusion"
    resulting_state: "at_risk"
    description: "Escalate if high C-peptide occurs with creatinine not above the laboratory upper bound."
    conditions:
      - metric_id: "creatinine"
        operator: "<="
        condition_type: "all_of"
        comparator_type: "lab_range_boundary"
        boundary: "above_max"
    source_refs: ["source_diabetologia_2014_cohort"]
evidence:
  evidence_strength: "strong"
  sources:
    - source_id: "source_diabetologia_2014_cohort"
      paper_title: "C-peptide predicts all-cause and cardiovascular death in a cohort"
      journal: "Diabetologia"
      year: 2014
  physiological_claim: "Endogenous hyperinsulinemia, marked by high C-peptide, is an independent risk factor for death."
  threshold_notes: "C-peptide >1.0 nmol/L is associated with significantly higher CV death risk."
narrative:
  mechanism: "Proinsulin cleavage in pancreatic beta-cells releases insulin and C-peptide into the bloodstream."
  biological_pathway: "Insulin Secretory Pathway / Proinsulin Processing within the Golgi apparatus."
  interpretation: "Reflects the integrated workload and output of the pancreas over time."
  implications: "Persistent elevation suggests progressive metabolic stress and chronic insulin resistance."
  supporting_marker_roles: "Glucose identifies the demand state; Creatinine rules out clearance false positives."

