  rationale: "Phosphate associated with all-cause mortality; promotes arterial calcification."
  signal_system: "renal"
trigger_direction: "high"
activation:
  activation_logic: "lab_range_exceeded"
  activation_config:
    enable_upper_bound: true
    upper_bound_state: "suboptimal"
    enable_lower_bound: false
    lower_bound_state: "suboptimal"
states:
  baseline_state: "suboptimal"
  escalation_state: "at_risk"
supporting_markers:
  - biomarker_id: "pth"
    expected_direction: "high"
    role: "differential_marker"
    relationship_kind: "differential"
    availability: "common"
    rationale: "Rules out parathyroid handling; distinguishes dietary load from hormonal mismanagement."
  - biomarker_id: "creatinine"
    expected_direction: "high"
    role: "mechanism_marker"
    relationship_kind: "mechanism"
    availability: "common"
    rationale: "Reduced filtration leads to phosphate retention (CKD-MBD)."
hypotheses:
  - hypothesis_id: "hyp_mineral_stress_retention"
    rank: 1
    physiological_claim: "Accumulation promoting arterial medial calcification and stress."
    evidence_strength: "strong"
    caveats: ["Risk linear even at the higher end of the normal lab range."]
    missing_data:
      policy: "Assume renal cause if eGFR falls below range."
    supporting_marker_refs: ["creatinine"]
    contradiction_markers: []
  - hypothesis_id: "hyp_endocrine_calcium_mismatch"
    rank: 2
    physiological_claim: "Phosphate elevation driven by primary parathyroid failure or bone turnover."
    evidence_strength: "strong"
    caveats: ["Requires assessment of serum calcium for verification."]
    missing_data:
      policy: "Check for symptoms of muscle cramping or neurological irritability."
    supporting_marker_refs: ["pth"]
    contradiction_markers: []
hypothesis_ranking:
  ordered_hypothesis_ids: ["hyp_mineral_stress_retention", "hyp_endocrine_calcium_mismatch"]
confirmatory_tests:
  - test_id: "ct_egfr_calc"
    rationale: "Standard assessment of renal filtration capacity and phosphate clearance."
override_rules:
  - rule_id: "or_phosphate_high_risk"
    resulting_state: "at_risk"
    description: "Escalate for phosphate >1.25 mmol/L, 1.36x CV risk increase."
    conditions:
      - metric_id: "phosphate"
        operator: ">"
        condition_type: "all_of"
        comparator_type: "numeric_value"
        numeric_value: 1.25
    source_refs: ["source_rotterdam_2018_phosphate"]
evidence:
  evidence_strength: "strong"
  sources:
    - source_id: "source_rotterdam_2018_phosphate"
      paper_title: "Serum phosphate levels and all-cause mortality"
      journal: "EJE"
      year: 2018
  physiological_claim: "Phosphate is a direct driver of vascular calcification and endothelial injury."
  threshold_notes: "1.25 mmol/L identifies the risk transition in general cohorts."
narrative:
  mechanism: "Filtered freely by glomerulus; retention stimulates systemic damage to endothelium."
  biological_pathway: "Renal Mineral Metabolism Pathway involving FGF-23 and PTH signaling."
  interpretation: "Indicator of metabolic health and renal stability."
  implications: "High levels predict CV mortality and progressive vascular stiffness."
  supporting_marker_roles: "PTH rules out hormonal mismanagement; Creatinine identifies renal failure."

