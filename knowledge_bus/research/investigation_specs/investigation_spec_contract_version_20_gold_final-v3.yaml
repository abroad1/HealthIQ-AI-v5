    lower_bound_state: "suboptimal"
states:
  baseline_state: "suboptimal"
  escalation_state: "at_risk"
supporting_markers:
  - biomarker_id: "chloride"
    expected_direction: "high"
    role: "differential_marker"
    relationship_kind: "differential"
    availability: "common"
    rationale: "Rules out high-gap acidosis; chloride helps calculate the anion gap."
  - biomarker_id: "creatinine"
    expected_direction: "high"
    role: "mechanism_marker"
    relationship_kind: "mechanism"
    availability: "common"
    rationale: "Failure of renal reabsorption leads to metabolic acidosis."
hypotheses:
  - hypothesis_id: "hyp_metabolic_acidosis_load"
    rank: 1
    physiological_claim: "Accumulation of organic acids or failure of renal buffering capacity."
    evidence_strength: "strong"
    caveats: ["Can be acute (sepsis) or chronic (renal tubular acidosis)."]
    missing_data:
      policy: "Prioritize acute illness evaluation if levels are severely low."
    supporting_marker_refs: ["creatinine"]
    contradiction_markers: []
  - hypothesis_id: "hyp_hyperchloremic_shift"
    rank: 2
    physiological_claim: "Normal anion gap acidosis driven by reciprocal chloride elevation."
    evidence_strength: "strong"
    caveats: ["Common in GI loss or specific renal tubular defects."]
    missing_data:
      policy: "Assess for history of chronic diarrhea or laxative use."
    supporting_marker_refs: ["chloride"]
    contradiction_markers: []
hypothesis_ranking:
  ordered_hypothesis_ids: ["hyp_metabolic_acidosis_load", "hyp_hyperchloremic_shift"]
confirmatory_tests:
  - test_id: "ct_abg_ph"
    rationale: "Definitive quantification of pH and compensatory response via blood gas."
override_rules:
  - rule_id: "or_bicarb_severe_risk"
    resulting_state: "at_risk"
    description: "Escalate for bicarbonate <=19.0 mEq/L, high mortality risk."
    conditions:
      - metric_id: "bicarbonate"
        operator: "<="
        condition_type: "all_of"
        comparator_type: "numeric_value"
        numeric_value: 19
    source_refs: ["source_frontiers_2025_bicarb"]
evidence:
  evidence_strength: "strong"
  sources:
    - source_id: "source_frontiers_2025_bicarb"
      paper_title: "Association between bicarbonate levels and mortality"
      journal: "Frontiers Medicine"
      year: 2025
  physiological_claim: "Low bicarbonate is a marker of tissue hypoperfusion and exhaustion."
  threshold_notes: "19 mEq/L validated as a risk threshold for mortality."
narrative:
  mechanism: "Alkali component of bicarbonate buffer system neutralized by acid accumulation."
  biological_pathway: "Acid-Base Homeostasis Pathway regulated by lungs and kidneys."
  interpretation: "Marker of systemic stress and buffering capacity exhaustion."
  implications: "Associated with higher short-term mortality and organ failure risk."
  supporting_marker_roles: "Chloride rules out high-gap causes; Creatinine identifies renal capacity."

