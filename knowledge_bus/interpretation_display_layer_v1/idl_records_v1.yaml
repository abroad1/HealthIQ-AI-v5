    clinical_display_label: Dysglycaemic metabolic stress
    retail_display_label: Blood Sugar Stress State
    subtitle: A pattern suggesting sustained blood-sugar strain on the body
    why_it_matters: Sustained glycaemic strain raises long-term metabolic and vascular risk.
    frontend_allowed_term: clinical_only
    display_order_priority: 2
    enabled_for_frontend: true

  - internal_id: ph_vascular_hcy_inflammation_v1
    scientific_class: risk_construct
    clinical_display_label: Vascular inflammation risk (homocysteine-linked)
    retail_display_label: Vascular Inflammation Risk
    subtitle: A pattern combining inflammation and homocysteine signals associated with vascular risk
    why_it_matters: Accumulating vascular-risk signals warrant cardiometabolic review and lifestyle action.
    frontend_allowed_term: clinical_only
    display_order_priority: 3
    enabled_for_frontend: true

  - internal_id: ph_hepatic_alt_inflammatory_v1
    scientific_class: organ_pattern
    clinical_display_label: Hepatic inflammatory pattern
    retail_display_label: Liver Stress Pattern
    subtitle: A pattern suggesting metabolic or inflammatory strain in the liver
    why_it_matters: Early liver-strain patterns are a key lane toward MASLD/fibrosis risk if ignored.
    frontend_allowed_term: clinical_only
    display_order_priority: 4
    enabled_for_frontend: true

  - internal_id: ph_renal_stress_v1
