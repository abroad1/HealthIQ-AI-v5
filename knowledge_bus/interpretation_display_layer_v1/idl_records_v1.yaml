    retail_display_label: Thyroid–Lipid Pattern
    subtitle: A pattern where thyroid-axis signals are accompanied by lipid disturbance
    why_it_matters: Thyroid axis changes can drive lipid disturbance and warrant joint review.
    frontend_allowed_term: clinical_only
