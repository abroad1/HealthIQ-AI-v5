# Governed Interpretation Display Layer (IDL) v1 — static display authority.
# Dynamic fields (severity_state, supporting_biomarkers_summary) are filled at publish time.
# Source: docs/strategy/Interpretation_Display_Layer_Design_Lock.md §4

schema_version: "1.0.0"

records:
  - internal_id: ph_metabolic_early_ir_v1
    scientific_class: phenotype
    clinical_display_label: Early insulin-resistance phenotype
    retail_display_label: Insulin Resistance Phenotype
    subtitle: A pattern suggesting early impaired sugar and lipid handling
    why_it_matters: Left unaddressed, early insulin resistance progresses toward prediabetes and cardiometabolic risk.
    frontend_allowed_term: phenotype_allowed
    display_order_priority: 1
    enabled_for_frontend: true

  - internal_id: ph_hba1c_metabolic_stress_v1
