    clinical_display_label: Renal stress pattern
    retail_display_label: Kidney Stress Pattern
    subtitle: A pattern suggesting the kidneys are under strain in this snapshot
    why_it_matters: Kidney strain is common, expensive, and highly actionable when caught early.
    frontend_allowed_term: clinical_only
    display_order_priority: 5
    enabled_for_frontend: true

  - internal_id: ph_thyroid_lipid_disturbance_v1
