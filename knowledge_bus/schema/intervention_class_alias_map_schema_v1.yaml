# Intervention class alias map — Schema v1
# Maps normalized user-entered strings to canonical intervention_class_id values.
# Unknown strings must NOT invent rich classes; resolve outside this map or omit.

schema_name: "HealthIQ Intervention Class Alias Map"
schema_version: "1.0.0"
status: "LOCKED"

root_required_fields:
  - alias_map_schema_version
  - registry_id
  - allowed_target_class_ids
  - unknown_name_handling
  - aliases

alias_map_schema_version:
  allowed: ["1.0.0"]

# KB-S48c: governed rule for strings not present in aliases — no fallback class ID.
unknown_name_handling_required_keys:
  - resolution

unknown_name_resolution_allowed:
  - unmapped

aliases_item_required_fields:
  - alias_normalized
  - intervention_class_id

validator_output_contract:
  audit_file: intervention_class_alias_map_audit.md
