schema_name: "HealthIQ Knowledge Package Manifest"
schema_version: "1.0.0"
status: "LOCKED"

description: >
  Deterministic schema defining the structure of Knowledge Bus
  promotion packages.

required_fields:
  - package_id
  - package_version
  - research_brief
  - signal_library

field_rules:

  package_id:
    type: string
    pattern: "^pkg_[a-z0-9_]+$"

  package_version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"

  research_brief:
    type: string

  signal_library:
    type: string

optional_fields:

  intelligence_model:
    type: string
    description: >
      Optional relative path to intelligence_model.yaml (target schema v1).
      When present, validate_intelligence_model.py is run by validate_knowledge_package.py.

  promoted_signal_intelligence:
    type: string
    description: >
      Optional relative path to promoted_signal_intelligence.yaml (KB-S47d contract v1).
      When present, validate_promoted_signal_intelligence.py is run by validate_knowledge_package.py.
      Legacy packages omit this field and remain on the three-file contract only.

  description:
    type: string

  author:
    type: string

  created_at:
    type: string

  behavioural_impact:
    type: string
    enum:
      - NONE
      - LOW
      - HIGH
      - SIGNAL_RUNTIME_ACTIVATION

  engine_compatibility:
    type: string
    pattern: "^v[0-9]+\\.x$"

forward_requirements:
  behavioural_impact:
    required_for_new_packages: true
  engine_compatibility:
    required_for_new_packages: false
    authoritative_value: "v5.x"
