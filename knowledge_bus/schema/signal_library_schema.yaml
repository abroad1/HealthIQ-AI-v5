schema_name: "HealthIQ Signal Library Schema"
schema_version: "1.0.0"
status: "LOCKED"
description: >
  Deterministic architecture contract for Knowledge Bus signal_library.yaml.
  Defines the allowed structure for physiological signal declarations that may
  be promoted to implementation. This schema is enforced by
  validate_signal_library.py.

root_required_fields:
  - library
  - signals

library_required_fields:
  - schema_version
  - package_id
  - library_name
  - description

library_field_rules:
  schema_version:
    type: string
    pattern: '^\d+\.\d+\.\d+$'
  package_id:
    type: string
    pattern: '^KBP-\d{4}$'
  library_name:
    type: string
    min_length: 1
  description:
    type: string
    min_length: 1

signals_rules:
  type: list
  min_items: 1
  unique_by: signal_id

signal_required_fields:
  - signal_id
  - name
  - description
  - system
  - primary_metric
  - supporting_metrics
  - dependencies
  - thresholds
  - activation_logic
  - output

signal_field_rules:
  signal_id:
    type: string
    pattern: '^signal_[a-z0-9_]+$'
  name:
    type: string
    min_length: 1
  description:
    type: string
    min_length: 1
  system:
    type: string
    allowed:
      - metabolic
      - lipid_transport
      - hepatic
      - inflammatory
      - renal
      - vascular
      - hematologic
      - hormonal
      - mitochondrial
      - other
  primary_metric:
    type: string
    min_length: 1
  supporting_metrics:
    type: list
  dependencies:
    type: map
    required_fields:
      - biomarkers
      - derived_metrics
      - signals
  optional_dependencies:
    type: map
    required: false
    required_fields:
      - biomarkers
      - derived_metrics
      - signals
  thresholds:
    type: list
    min_items: 0
  activation_logic:
    type: string
    allowed:
      - deterministic_threshold
      - lab_range_exceeded
  activation_config:
    type: map
    required: false
    required_fields:
      - upper_bound_state
      - enable_lower_bound
      - lower_bound_state
  override_rules:
    type: list
    required: false
  bundle_consumers:
    type: list
    required: false
  output:
    type: map
    required_fields:
      - signal_value
      - signal_state
      - confidence

dependency_map_rules:
  biomarkers:
    type: list
    item_pattern: '^[a-z0-9_]+$'
  derived_metrics:
    type: list
    item_pattern: '^[a-z0-9_\.]+$'
  signals:
    type: list
    item_pattern: '^signal_[a-z0-9_]+$'

threshold_required_fields:
  - threshold_id
  - metric_id
  - operator
  - severity

threshold_field_rules:
  threshold_id:
    type: string
    pattern: '^[a-z0-9_]+$'
  metric_id:
    type: string
    min_length: 1
  operator:
    type: string
    allowed:
      - "<"
      - "<="
      - ">"
      - ">="
      - "=="
      - "range"
  value:
    type: number
    required_if:
      operator:
        not_equals: "range"
  min_value:
    type: number
    required_if:
      operator: "range"
  max_value:
    type: number
    required_if:
      operator: "range"
  unit:
    type: string
    required: false
  severity:
    type: string
    allowed:
      - optimal
      - suboptimal
      - at_risk
      - critical
  description:
    type: string
    required: false

override_rule_required_fields:
  - rule_id
  - description
  - conditions
  - resulting_state

override_rule_field_rules:
  rule_id:
    type: string
    pattern: '^[a-z0-9_]+$'
  description:
    type: string
    min_length: 1
  conditions:
    type: list
    min_items: 1
  resulting_state:
    type: string
    allowed:
      - optimal
      - suboptimal
      - at_risk
      - critical

override_condition_required_fields:
  - metric_id
  - operator
  - value
  - condition_type

override_condition_field_rules:
  metric_id:
    type: string
    min_length: 1
  operator:
    type: string
    allowed:
      - "<"
      - "<="
      - ">"
      - ">="
      - "=="
  value:
    type: number
  condition_type:
    type: string
    allowed:
      - any_of
      - all_of

output_field_rules:
  signal_value:
    type: string
    min_length: 1
    description: >
      Primary metric or deterministic signal value identifier used to represent
      the signal output.
  signal_state:
    type: string
    allowed:
      - optimal
      - suboptimal
      - at_risk
      - critical
  confidence:
    type: string
    min_length: 1
    description: >
      Confidence source identifier or confidence field mapping. Confidence
      values themselves are produced by runtime, not hardcoded in the schema.
  primary_metric:
    type: string
    required: false
  supporting_markers:
    type: list
    required: false

forbidden_patterns:
  activation_logic:
    - weighted
    - majority_rule
    - probabilistic
    - heuristic
  forbidden_fields:
    - signal_strength
    - score
    - weighted_score
    - probability
    - fallback_threshold
    - raw_expression
    - arithmetic_expression

policy_rules:
  no_weighted_scoring_models: true
  no_probabilistic_activation: true
  no_implicit_thresholds: true
  no_fallback_logic: true
  no_raw_biomarker_arithmetic: true
  no_duplicate_signal_ids: true
  lab_range_activation_allowed: true

ssot_alignment_rules:
  biomarker_dependencies_must_exist_in_canonical_registry: true
  derived_metric_dependencies_must_exist_in_metric_registry: true
  signal_dependencies_must_exist_in_same_library: true

validator_output_contract:
  audit_file: "architecture_audit.md"
  status_file: "knowledge_status.json"
  required_status_fields:
    - package_id
    - status
    - validator_status
    - ready_for_implementation
    - validated_utc
    - errors
    - warnings