edges:
  # Pathway 1: metabolic -> hepatic -> inflammatory -> vascular
  - from_signal: signal_triglycerides_high
    to_signal: signal_lipid_transport_dysfunction
    relationship_type: driver
    evidence_strength: exploratory
    rationale: Elevated triglycerides often accompany triglyceride-rich lipoprotein and atherogenic particle stress, supporting lipid transport dysfunction as a linked upstream driver pattern.
  - from_signal: signal_triglycerides_high
    to_signal: signal_ggt_high
    relationship_type: consequence
    evidence_strength: moderate
    rationale: Elevated triglyceride burden often tracks hepatic lipid-processing strain, aligning metabolic dysregulation with hepatic stress signaling.
  - from_signal: signal_hba1c_high
    to_signal: signal_ggt_high
    relationship_type: driver
    evidence_strength: strong
    rationale: Elevated glycaemic burden is frequently accompanied by hepatic metabolic stress, linking dysglycaemia to hepatocellular strain.
  - from_signal: signal_hba1c_high
    to_signal: signal_alt_high
    relationship_type: consequence
    evidence_strength: moderate
    rationale: Chronic glucose dysregulation frequently co-occurs with hepatocellular stress signals, including ALT elevation in metabolic contexts.
  - from_signal: signal_alt_high
    to_signal: signal_crp_high
    relationship_type: co_occurrence
    evidence_strength: moderate
    rationale: Hepatocellular injury and systemic inflammatory signaling often co-present, supporting ALT-to-CRP linkage in a deterministic chain.
  - from_signal: signal_ggt_high
    to_signal: signal_crp_high
    relationship_type: consequence
    evidence_strength: moderate
    rationale: Hepatic stress and oxidative burden commonly co-occur with heightened inflammatory activity reflected by CRP elevation.
  - from_signal: signal_crp_high
    to_signal: signal_homocysteine_high
    relationship_type: driver
    evidence_strength: moderate
    rationale: Inflammatory states can amplify vascular risk signalling, where homocysteine elevation often appears within the same adverse context.
  - from_signal: signal_crp_high
    to_signal: signal_homocysteine_elevation_context
    relationship_type: co_occurrence
    evidence_strength: exploratory
    rationale: Higher inflammatory burden can contextualize homocysteine risk interpretation and reinforce vascular stress pattern detection.
  - from_signal: signal_homocysteine_high
    to_signal: signal_homocysteine_elevation_context
    relationship_type: co_occurrence
    evidence_strength: strong
    rationale: Both signals are homocysteine manifestations where one is threshold-based and the other is a context wrapper on the same primary metric.
  - from_signal: signal_systemic_inflammation
    to_signal: signal_homocysteine_elevation_context
    relationship_type: co_occurrence
    evidence_strength: exploratory
    rationale: Inflammation context can co-occur with vascular homocysteine interpretation patterns in AB and VR synthesis panels.

  # Pathway 2: iron -> hematologic with inflammatory modulation
  - from_signal: signal_crp_high
    to_signal: signal_iron_deficiency_context
    relationship_type: co_occurrence
    evidence_strength: moderate
    rationale: Inflammatory burden can co-occur with iron deficiency context on the same panel, supporting governed interpretation linkage without implying a single mechanism.
  - from_signal: signal_ferritin_low
    to_signal: signal_hemoglobin_low
    relationship_type: driver
    evidence_strength: consensus
    rationale: Iron store depletion precedes and drives anemia progression, making ferritin-low to hemoglobin-low a canonical hematologic cascade.
  - from_signal: signal_hemoglobin_low
    to_signal: signal_mcv_high
    relationship_type: co_occurrence
    evidence_strength: strong
    rationale: Erythrocyte morphology shifts can emerge alongside anemia severity, linking low hemoglobin with abnormal corpuscular-volume context.
  - from_signal: signal_ferritin_low
    to_signal: signal_mcv_high
    relationship_type: consequence
    evidence_strength: moderate
    rationale: Iron-restricted erythropoiesis can alter red-cell morphology trajectories, supporting ferritin-low progression toward MCV abnormalities.
  - from_signal: signal_crp_high
    to_signal: signal_ferritin_low
    relationship_type: co_occurrence
    evidence_strength: exploratory
    rationale: Inflammatory burden can modulate iron biology and interpretation, so CRP-high may contextualize ferritin-low hematologic patterns.

  # Pathway 3: thyroid -> lipid -> metabolic
  - from_signal: signal_thyroid_tsh_context
    to_signal: signal_ldl_cholesterol_high
    relationship_type: driver
    evidence_strength: moderate
    rationale: Thyroid-context disturbance often informs impaired lipid handling patterns, supporting LDL elevation as a linked downstream signal.
  - from_signal: signal_tsh_high
    to_signal: signal_ldl_cholesterol_high
    relationship_type: driver
    evidence_strength: strong
    rationale: Hypothyroid-pattern signalling commonly associates with reduced lipid clearance and downstream LDL-cholesterol elevation.
  - from_signal: signal_tsh_high
    to_signal: signal_hdl_cholesterol_low
    relationship_type: consequence
    evidence_strength: moderate
    rationale: Thyroid slowing can accompany an adverse lipid signature, including lower HDL-cholesterol in cardiometabolic risk contexts.
  - from_signal: signal_hdl_cholesterol_low
    to_signal: signal_hba1c_high
    relationship_type: co_occurrence
    evidence_strength: moderate
    rationale: Low HDL and glycaemic dysregulation frequently cluster in insulin-resistant physiology, supporting lipid-to-metabolic chain continuity.
  - from_signal: signal_ldl_cholesterol_high
    to_signal: signal_hba1c_high
    relationship_type: co_occurrence
    evidence_strength: moderate
    rationale: Atherogenic dyslipidaemia frequently clusters with impaired glucose regulation, supporting a linked cardiometabolic interaction chain.

  # Pathway 4: renal stress (KB-S56B) — creatinine–urea coupling governed in phenotype_map_v1 ph_renal_stress_v1
  - from_signal: signal_creatinine_high
    to_signal: signal_urea_high
    relationship_type: co_occurrence
    evidence_strength: strong
    rationale: Elevated creatinine and urea often rise together when renal excretory capacity is stressed, supporting a governed co-occurrence link aligned with promoted renal phenotype evidence.
