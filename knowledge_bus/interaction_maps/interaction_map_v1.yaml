    system: metabolic
  - signal_id: signal_triglycerides_high
    system: metabolic
  - signal_id: signal_lipid_transport_dysfunction
    system: lipid_transport
  - signal_id: signal_ggt_high
    system: hepatic
  - signal_id: signal_alt_high
    system: hepatic
  - signal_id: signal_crp_high
    system: inflammatory
  - signal_id: signal_systemic_inflammation
    system: inflammatory
  - signal_id: signal_homocysteine_high
    system: vascular
  - signal_id: signal_homocysteine_elevation_context
    system: vascular
  - signal_id: signal_ferritin_low
    system: hematologic
  - signal_id: signal_hemoglobin_low
    system: hematologic
  - signal_id: signal_mcv_high
    system: other
  - signal_id: signal_iron_deficiency_context
    system: hematologic
  - signal_id: signal_iron_overload_context
    system: hepatic
