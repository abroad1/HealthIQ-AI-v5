schema_version: 1.0.0
runtime_consumed: false
status: active
work_id: BETA-READINESS-SPRINT-2_runtime_gate_consistency_and_active_signal_reachability
description: >
  Policy registry for active runtime signal context gate reachability. Distinguishes
  safe-missing states, cited suppress-until-answered gates, and evaluator translation rules.
questionnaire_absent_context_keys:
  pregnancy_status:
    reason: pregnancy_status is not captured in backend/ssot/questionnaire.json
    safe_missing_states:
      - not_answered
      - not_applicable
    suppressive_states:
      - answered_yes
lifestyle_sourced_context_keys:
  calorie_restriction_status:
    lifestyle_field: calorie_restriction
    note: Derived from lifestyle_factors, not questionnaire.json
  fasting_status:
    lifestyle_field: fasting
    note: Derived from lifestyle_factors, not questionnaire.json
questionnaire_field_mappings:
  symptoms_status:
    low_testosterone_symptoms:
      package_scope: pkg_kb47_free_testosterone_low_androgen_deficiency_context
      note: Maps governed male symptom dropdown to symptoms_status disclosure primitive
evaluator_translation_rules:
  aas_exposure_status:
    rule: AAS-specific supplement detection only; generic supplement use must not set answered_yes
    implementation: backend/core/analytics/runtime_context_evaluator.py _aas_exposure_state_from_supplements
symptoms_gate_authority_decisions:
  pkg_kb47_fai_high_biochemical_hyperandrogenism:
    signal_id: signal_fai_high
    decision: downgrade_not_suppress
    authority_citation: docs/Medical Research Documents/Batch_2_Thyroid_Androgen_Context_Authority_Review.md — Androgen excess symptoms REQUIRED_DISCLOSURE_ONLY (FAI high section)
    runtime_action: symptoms_status removed from required_context; limitation_note on output
  pkg_kb47_free_testosterone_high_androgen_excess_context:
    signal_id: signal_free_testosterone_high
    decision: downgrade_not_suppress
    authority_citation: docs/Medical Research Documents/Batch_2_Thyroid_Androgen_Context_Authority_Review.md — Androgen excess symptoms REQUIRED_DISCLOSURE_ONLY (free testosterone high section)
    runtime_action: symptoms_status removed from required_context; limitation_note on output
  pkg_kb47_free_testosterone_low_androgen_deficiency_context:
    signal_id: signal_free_testosterone_low
    decision: required_gate_with_questionnaire_mapping
    authority_citation: docs/Medical Research Documents/Batch_2_Thyroid_Androgen_Context_Authority_Review.md — Androgen deficiency symptoms REQUIRED_GATE (free testosterone low section); fail-closed rule do not emit if symptoms not answered
    runtime_action: symptoms_status remains required; low_testosterone_symptoms mapped in runtime_context_evaluator
suppress_until_answered_gates:
  - package_id: pkg_kb47_free_t3_low_low_t3_syndrome
    signal_id: signal_free_t3_low
    context_type: clinical_context
    key: calorie_restriction_status
    medical_justification: >
      FT3 low activation requires energy-intake context disclosure per Batch 2 thyroid
      authority (REQUIRED_GATE); analysis pipeline must supply lifestyle_factors.
    authority_citation: Batch_2_Thyroid_Androgen_Context_Authority_Review.md — calorie restriction REQUIRED_GATE (FT3 low)
  - package_id: pkg_kb47_free_t3_low_low_t3_syndrome
    signal_id: signal_free_t3_low
    context_type: clinical_context
    key: fasting_status
    medical_justification: >
      FT3 low activation requires fasting context disclosure per Batch 2 thyroid authority.
    authority_citation: Batch_2_Thyroid_Androgen_Context_Authority_Review.md — fasting REQUIRED_GATE (FT3 low)
  - package_id: pkg_kb47_free_testosterone_low_androgen_deficiency_context
    signal_id: signal_free_testosterone_low
    context_type: clinical_context
    key: calorie_restriction_status
    medical_justification: >
      Free testosterone low requires energy-intake context per adult male activation scope.
    authority_citation: Batch_2_Thyroid_Androgen_Context_Authority_Review.md — calorie restriction REQUIRED_GATE (FT low)
