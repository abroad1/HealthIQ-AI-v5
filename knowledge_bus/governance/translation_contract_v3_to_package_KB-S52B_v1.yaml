primary_authority_signal_intelligence_translation:
  file: knowledge_bus/schema/signal_intelligence_translation_rules_v1.yaml
  status: LOCKED
  scope: >
    Defines deterministic translation from investigation_spec v3 to promoted_signal_intelligence v1
    (implemented by backend/core/knowledge/investigation_spec_to_promoted_signal.py).
  cursor_constraint: MUST NOT be edited in KB-S52B; reference only.

governed_remap_authority:
  file: knowledge_bus/governance/translation_remap_contract_KB-S52B_v1.yaml
  description: Single source for APPROVED/DEFERRED upstream biomarker token remaps.

ingestion_consumer_requirement: >
  Future ingestion sprints must load both YAML authorities above. Baseline package
  assets (research_brief, signal_library) follow their own schemas; when reducing v3
  specs to promoted signal intelligence, obey signal_intelligence_translation_rules_v1.yaml.
  When normalising upstream biomarker_id/metric_id strings before SSOT resolution, apply
  only APPROVED rows from translation_remap_contract_KB-S52B_v1.yaml.

# KB-S52B explicit clarifications (no silent omission)
construct_handling:

  hypotheses:
    downstream_rule: NOT_TRANSLATED_TO_PROMOTED_SIGNAL
    authority: knowledge_bus/schema/signal_intelligence_translation_rules_v1.yaml
    authority_section: explicit_non_translation (hypotheses)
    note: >
      Full hypothesis objects stay in adjacent hypothesis assets; promoted signal carries
      derived summaries only where the locked rules specify (e.g. missing_data.policies).

  hypothesis_ranking:
    downstream_rule: NOT_TRANSLATED_TO_PROMOTED_SIGNAL
    authority: knowledge_bus/schema/signal_intelligence_translation_rules_v1.yaml
    authority_section: explicit_non_translation (hypothesis_ranking)

  contradiction_markers:
    downstream_rule: TRANSLATED_AGGREGATED_TO_SIGNAL
    authority: knowledge_bus/schema/signal_intelligence_translation_rules_v1.yaml
    authority_section: translated_with_derivation → signals[].contradiction_markers
    kb_s52b_note: >
      Aggregated contradiction_markers must reference marker IDs that resolve in SSOT or
      are explicitly handled by a future translator guard. Non-analyte marker_reference values
      (e.g. repeat_bilirubin) remain BLOCKED for naive promotion until Wave C policy lands.

  confirmatory_tests:
    downstream_rule: TRANSLATED_TO_SIGNAL_REFS
    authority: knowledge_bus/schema/signal_intelligence_translation_rules_v1.yaml
    authority_section: translated_with_derivation → signals[].confirmatory_test_refs

  supporting_markers_top_level:
    downstream_rule: TRANSLATED_DIRECT_COPY
    authority: knowledge_bus/schema/signal_intelligence_translation_rules_v1.yaml
    authority_section: direct_translation (supporting_markers)

  supporting_marker_refs_within_hypotheses:
    downstream_rule: NOT_TRANSLATED_TO_PROMOTED_SIGNAL
    rationale: >
      Field hypotheses[*].supporting_marker_refs is part of the hypothesis object.
      Because hypotheses are excluded from promoted_signal_intelligence, these refs are
      not separately promoted. Downstream hypothesis assets retain them.
    authority: knowledge_bus/schema/signal_intelligence_translation_rules_v1.yaml
    authority_section: explicit_non_translation (hypotheses)

  narrative:
    downstream_rule: NOT_TRANSLATED_TO_PROMOTED_SIGNAL
    authority: knowledge_bus/schema/signal_intelligence_translation_rules_v1.yaml
    authority_section: explicit_non_translation (narrative)

non_analyte_reference_classes:
  description: >
    KB-S52A boundary items; ingestion must not silently treat as chemistry CBC keys.
  classes:
  - class_id: NA-PROCEDURE
    examples:
    - serum_protein_electrophoresis
    policy: DEFERRED_PREREQUISITE
    handling: >
      Procedure/clinical context marker, not a standard SSOT analyte. Blocked from
      metric-level promotion until SSOT construct class exists or narrative-only policy is approved.

  - class_id: NA-GENETIC_SPECIALIST
    examples:
    - jak2_v617f
    policy: DEFERRED_PREREQUISITE
    handling: Specialist/genetic marker; SSOT expansion sprint.

  - class_id: NA-MORPHOLOGY
    examples:
    - smudge_cells
    policy: DEFERRED_PREREQUISITE
    handling: Morphology flag; not in baseline analyte registry.

  - class_id: NA-LOGICAL_REPEAT
    examples:
    - repeat_bilirubin
    policy: DEFERRED_PREREQUISITE
    handling: >
      Encodes repeat-testing semantics, not an analyte. Contradiction aggregation must not
      emit unmapped pipeline keys; translator guard or SSOT policy required.

