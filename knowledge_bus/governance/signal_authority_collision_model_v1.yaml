  hardcoding.
authority_groups:
- authority_group_id: renal_filtration_axis
  biological_axis: kidney_filtration_function
  status: adjudicated_governance_only
  primary_signal_family: signal_egfr_low
  supporting_signal_families:
  - signal_creatinine_high
  related_active_frames:
    primary_when_implemented:
    - frame_egfr_pass3_chronic_kidney_function_reduction
    - frame_egfr_pass3_hemodynamic_filtration_drop
    supporting_retained:
    - frame_creatinine_reduced_glomerular_filtration
    legacy_parallel_requires_runtime_resolution:
    - frame_creatinine_legacy_s24_egfr_escalation
  distinct_risk_layers:
  - layer_id: hyperkalemia_or_electrolyte_complication
    signal_family: signal_creatinine_high
    frame_id: frame_creatinine_legacy_s24_potassium_escalation
    notes: Medically distinct acute electrolyte layer; must remain parallel when medically
      distinct.
  collision_policy:
    no_duplicate_user_facing_signal: true
    suppress_supporting_when_primary_present: true
    consolidate_into_shared_interpretation: true
    allow_parallel_if_distinct_risk_layer: true
  authority_decision:
    egfr_low_is_distinct_signal_family: true
    egfr_low_stronger_filtration_evidence_when_present: true
    creatinine_high_remains_relevant_as_supporting_or_biochemical_abnormality: true
    egfr_low_should_suppress_duplicate_filtration_framing_from_creatinine_high: true
    creatinine_contributes_supporting_evidence_when_not_duplicate: true
    potassium_acute_risk_remains_separate_layer: true
  runtime_action: governance_only_pending_runtime_support
  requires_runtime_support: true
  proposed_runtime_pattern:
    authority_resolution:
      authority_group_id: renal_filtration_axis
      primary_when_present: signal_egfr_low
      supporting_when_primary_present:
      - signal_creatinine_high
      duplicate_surface_policy: consolidate
      distinct_risk_layers_allowed:
      - hyperkalemia_or_electrolyte_complication
  notes: First implementation case for reusable collision model. Activating signal_egfr_low
    without runtime anti-double-counting would present low eGFR + high creatinine as two
    independent renal-filtration problems. pkg_kb52c canonical creatinine and legacy s24
    eGFR escalation paths must be considered at runtime wiring.
