stage_1c_intelligence_preflight:
  runtime_consumers:
  - component: backend/core/analytics/signal_evaluator.py
    class: SignalRegistry
    behaviour: Iterates knowledge_bus/packages/*/signal_library.yaml (sorted), excludes
      pkg_example only. Merges signals by signal_id with lexicographic path tie-break.
      No branch on promoted_signal_intelligence, manifest tier, or schema_version.
  estate_tier_distinction_in_runtime: none_observed
  deterministic_manifest_and_files_for_classification:
  - 'package_manifest.yaml: promoted_signal_intelligence, translation_mode, source_document,
    behavioural_impact, intelligence_model'
  - 'signal_library.yaml: library.schema_version (defaults to 1.0.0 if absent per
    validate_knowledge_package)'
  - presence of promoted_signal_intelligence.yaml on disk
  validators_reused:
  - backend/scripts/validate_knowledge_package.py orchestrates manifest, research_brief,
    signal_library, optional intelligence_model, optional promoted_signal_intelligence
  if_policy_tightened_later: Runtime would need explicit gating or labelling when
    loading packages or emitting reasoning; not in KB-S49 scope.
classification_rulebook:
- rule_id: CR-01
  governed_tier: excluded_placeholder
  criteria: package_id == pkg_example (documentation / worked example only).
- rule_id: CR-02
  governed_tier: v3_grade_rich_governed
  criteria: package_id prefix pkg_kb47_ AND package_manifest lists promoted_signal_intelligence
    AND promoted_signal_intelligence.yaml exists (repo KB-S47 batch).
- rule_id: CR-03
  governed_tier: partially_uplifted_research_fidelity_no_psi
  criteria: package_id prefix pkg_kb45_ AND signal_library library.schema_version
    == 2.0.0 AND manifest omits promoted_signal_intelligence (KB-S45 regeneration
    batch).
- rule_id: CR-04
  governed_tier: structured_translation_batch_no_psi
  criteria: package_id prefix pkg_s24_ AND translation_mode == creation AND source_document
    references inv_*.yaml under investigation_specs (KB-S24 translation batch); no
    promoted PSI layer.
- rule_id: CR-05
  governed_tier: legacy_thin_pre_v3_context
  criteria: Not matched by CR-01..CR-04; remaining pkg_* with standard three-file
    package shape; typically signal_contract_v1_or_default and no promoted PSI.
- rule_id: CR-06
  governed_tier: unknown_requires_review
  criteria: Any pkg_* missing package_manifest.yaml OR research_brief.yaml OR signal_library.yaml
    (integrity / incomplete tree).
- rule_id: CR-07
  governed_tier: integrity_mixed_form
  criteria: 'promoted_signal_intelligence.yaml exists on disk XOR manifest promoted_signal_intelligence
    key set (not both aligned). Current estate: none (verified 2026-03-28).'
- rule_id: CR-08
  governed_tier: deprecated_or_superseded
  criteria: Reserved. No deterministic repo-only rule (e.g. explicit supersession
    pointer in manifest) is defined in this sprint; assign only when a future manifest
    field or registry marks replacement.
- rule_id: CR-09
  governed_tier: post_kb_s49_unreviewed_batch
  criteria: package_id prefix pkg_kb52c_, pkg_kb52d_, pkg_kb56_, pkg_kb58_, pkg_kb59_,
    pkg_kb60_, or pkg_kb61_ AND standard three-file package shape AND registered by
    LC-S18A with requires_review true; not runtime-approved until KB-WAVE validation.
policy_runtime_legacy_vs_v3:
  statement_type: descriptive_and_forward_looking
  immediately_enforceable_in_code: false
  decision:
  - Legacy-thin and translation-batch packages without a promoted signal intelligence
    layer MAY continue to participate in runtime signal activation unchanged, consistent
    with current SignalRegistry behaviour.
  - v3-grade (KB-S47) packages with promoted_signal_intelligence are the reference
    pattern for richest governed semantics; they coexist with thinner packages with
    no runtime distinction today.
  - No package-estate tier flagging or suppression is applied in backend/core in KB-S49;
    any future gating MUST be an explicit follow-on change.
  uplift_expectation: Thinner packages SHOULD be prioritised for uplift where clinical
    or reasoning risk is higher; see uplift_prioritisation.
minimum_acceptable_package_standard:
  floor_for_current_runtime_alignment:
  - package_manifest.yaml, research_brief.yaml, and signal_library.yaml present and
    passing validate_knowledge_package.py under default flags (as of inventory date).
  - signal_library.yaml parseable with signals list usable by SignalRegistry.
  aspirational_v3_grade_target:
  - promoted_signal_intelligence in manifest with on-disk promoted_signal_intelligence.yaml
    validating against promoted_signal_intelligence_schema_v1.yaml
  - Explicit translation_mode and source_document in manifest
  - signal library on contract v2.0.0 where research fidelity is required
  - behavioural_impact field present where mandated by manifest policy
uplift_prioritisation_framework:
  principles:
  - 'First: packages covering high-impact clinical domains with thin semantics (legacy
    context bundles) used in production-like flows.'
  - 'Second: pkg_s24_* batch (structured but no PSI) where overlap exists with richer
    packages or high-traffic biomarkers.'
  - 'Third: pkg_kb45_* (already v2 research fidelity) add promoted PSI layer to reach
    v3-grade parity.'
  - 'Fourth: extend v3-grade coverage for new biomarkers following KB-S47 patterns.'
  deterministic_priority_classes:
  - rank: 1
    class: legacy_thin_pre_v3_context
    rationale: Widest semantic gap vs v3_grade; v1 signal contract defaults.
  - rank: 2
    class: structured_translation_batch_no_psi
    rationale: Structured provenance but missing promoted reasoning layer.
  - rank: 3
    class: partially_uplifted_research_fidelity_no_psi
    rationale: Closest to v3; incremental PSI promotion work.
  - rank: 4
    class: v3_grade_rich_governed
    rationale: Maintain and extend pattern; not uplift-from-thin.
validator_commands:
  single_package: python backend/scripts/validate_knowledge_package.py --package-dir
    knowledge_bus/packages/<package_id>
  note: Aggregated JSON path is overwritten per run; use exit code and stdout ready_for_implementation
    for automation.
