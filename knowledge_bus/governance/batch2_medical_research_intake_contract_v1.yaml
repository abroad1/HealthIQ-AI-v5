androgen_shared_research_requirements:
  clinical_signoff_carry_forward: CF-BATCH2-010
  required_context_fields:
  - biological sex
  - age
  - hormone therapy / HRT disclosure
  - AAS / prohormone disclosure
  - prescribed steroid disclosure
  - supplement disclosure
  - relevant symptoms
  fail_closed_when:
  - required disclosure fields not answered
  - companion biomarkers missing where frame requires
  external_clinician_review_required: true
validation_rules:
- Research output must map each required_context_field to a primitive in reusable_runtime_context_primitive_model_v1.yaml
- Research output must not propose threshold changes without separate authority sprint
- Research output must not recommend activation without explicit fail_closed_conditions
- Research output with activation_recommendation ACTIVATE_WITH_GATES still requires human approval phrase in activation sprint
