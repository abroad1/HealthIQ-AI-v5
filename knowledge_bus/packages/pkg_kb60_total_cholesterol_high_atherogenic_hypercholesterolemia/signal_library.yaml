library:
  package_id: KBP-4822
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S60 Lipid / Derived — Total Cholesterol High Atherogenic Hypercholesterolemia
  description: Ingested from inv_total_cholesterol_high_atherogenic_hypercholesterolemia (lipid_derived_pass_3.json).
    KB-S60 lipid / derived tranche.
signals:
- signal_id: signal_total_cholesterol_high
  name: Total Cholesterol High Atherogenic Hypercholesterolemia
  description: High total cholesterol is most clinically meaningful when it reflects increased
    atherogenic lipoprotein burden rather than an isolated HDL-rich elevation.
  system: lipid_transport
  primary_metric: total_cholesterol
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: tc_hdl_ratio
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: A high TC:HDL ratio helps distinguish atherogenic cholesterol burden from isolated
      total-cholesterol elevation driven less by apoB-rich particles.
  - biomarker_id: ldl_cholesterol
    expected_direction: high
    role: corroborator
    availability: common
    rationale: High LDL cholesterol supports that elevated total cholesterol is being carried
      in a more atherogenic apoB-rich fraction.
  dependencies:
    biomarkers:
    - ldl_cholesterol
    - tc_hdl_ratio
    - total_cholesterol
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_total_cholesterol_high_lab_range_activation_placeholder
    metric_id: total_cholesterol
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_total_cholesterol_high_with_high_ratio
    resulting_state: at_risk
    description: Escalate when total cholesterol is high and TC:HDL ratio is also high, because
      this combination is more consistent with clinically relevant atherogenic dyslipidaemia
      than with an isolated cholesterol elevation.
    conditions:
    - metric_id: tc_hdl_ratio
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_tc_cvd_meta_2022
    - source_tc_hdl_aric_2019
    - source_nice_lipid_modification_2023
  output:
    signal_value: total_cholesterol
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: total_cholesterol
    supporting_markers:
    - tc_hdl_ratio
    - ldl_cholesterol
  explanation:
    mechanism: Total cholesterol rises when circulating cholesterol carried in lipoproteins
      increases, most importantly when non-HDL and LDL-rich particles contribute materially
      to the total burden.
    biological_pathway: Hepatic lipoprotein production, apoB-containing particle trafficking,
      reverse cholesterol transport, and atherosclerotic lipid retention pathways.
    interpretation: High total cholesterol is a useful entry-point lipid signal, but it gains
      much more meaning when paired with TC:HDL ratio or other particle-focused measures.
    implications: This pattern may justify full lipid review, assessment of secondary causes,
      and broader cardiovascular risk stratification rather than interpretation from total
      cholesterol alone.
    supporting_marker_roles: A high TC:HDL ratio acts as a differential marker that separates
      atherogenic cholesterol distribution from less unfavorable patterns, while high LDL
      cholesterol corroborates that the total cholesterol elevation is being carried in a
      more atherogenic fraction.
