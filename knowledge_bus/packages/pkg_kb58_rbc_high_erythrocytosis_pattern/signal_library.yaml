library:
  package_id: KBP-4816
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S58 CBC — Rbc High Erythrocytosis Pattern
  description: Ingested from inv_rbc_high_erythrocytosis_pattern (cbc_hematology_pass_3.json).
    KB-S58 CBC tranche.
signals:
- signal_id: signal_rbc_high
  name: Rbc High Erythrocytosis Pattern
  description: A high RBC count raises consideration of relative or absolute erythrocytosis
    and requires correlation with hemoglobin, hematocrit, and clinical context.
  system: hematologic
  primary_metric: rbc
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: neutrophil_pct
    expected_direction: high
    role: corroborator
    availability: common
    rationale: Concurrent neutrophil predominance can support a proliferative or strong physiologic-stress
      context rather than a trivial isolated count shift.
  - biomarker_id: mch
    expected_direction: low
    role: differential_marker
    availability: common
    rationale: Low MCH redirects interpretation toward microcytic high-count states such as
      thalassemia trait instead of true erythrocytosis.
  - biomarker_id: mchc
    expected_direction: low
    role: differential_marker
    availability: common
    rationale: Low MCHC further weakens a pure erythrocytosis interpretation by suggesting
      hypochromic microcytosis.
  dependencies:
    biomarkers:
    - mch
    - mchc
    - neutrophil_pct
    - rbc
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_rbc_high_lab_range_activation_placeholder
    metric_id: rbc
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_rbc_high_with_high_neutrophil_pct
    resulting_state: at_risk
    description: Escalate when RBC is high and neutrophil percentage is also high, because
      concurrent myeloid predominance can strengthen concern for a proliferative or clinically
      important erythrocytosis context.
    conditions:
    - metric_id: neutrophil_pct
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_erythrocytosis_review_2024
  output:
    signal_value: rbc
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: rbc
    supporting_markers:
    - neutrophil_pct
    - mch
    - mchc
  explanation:
    mechanism: RBC count rises when circulating red-cell mass increases genuinely or when
      plasma volume contracts enough to concentrate circulating erythrocytes.
    biological_pathway: Erythropoietin signaling, marrow erythroid expansion, and hemoconcentration
      pathways.
    interpretation: A high RBC count should prompt erythrocytosis evaluation, but competing
      microcytic carrier-state patterns must be excluded before overcalling true polycythemia.
    implications: This pattern commonly prompts hemoglobin, hematocrit, erythropoietin, and
      secondary-cause review rather than immediate disease labeling from the RBC count alone.
    supporting_marker_roles: High neutrophil_pct can support a proliferative context, while
      low MCH and low MCHC act as competing markers that redirect toward microcytic high-count
      carrier states.
