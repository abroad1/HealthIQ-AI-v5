library:
  package_id: KBP-4806
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S58 CBC — Monocytes Abs High Reactive Monocytosis
  description: Ingested from inv_monocytes_abs_high_reactive_monocytosis (cbc_hematology_pass_3.json).
    KB-S58 CBC tranche.
signals:
- signal_id: signal_monocytes_abs_high
  name: Monocytes Abs High Reactive Monocytosis
  description: A high absolute monocyte count indicates true monocytosis and is more clinically
    robust than monocyte percentage alone.
  system: hematologic
  primary_metric: monocytes_abs
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: monocyte_pct
    expected_direction: high
    role: corroborator
    availability: common
    rationale: A high monocyte percentage supports visible differential predominance accompanying
      true monocytosis.
  - biomarker_id: neutrophil_pct
    expected_direction: low
    role: differential_marker
    availability: common
    rationale: A relatively lower neutrophil percentage helps distinguish reactive monocytosis
      or recovery states from neutrophil-dominant acute stress responses.
  - biomarker_id: rbc
    expected_direction: low
    role: corroborator
    availability: common
    rationale: Concurrent anemia can support a broader chronic inflammatory or systemic disease
      context.
  dependencies:
    biomarkers:
    - monocyte_pct
    - monocytes_abs
    - neutrophil_pct
    - rbc
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_monocytes_abs_high_lab_range_activation_placeholder
    metric_id: monocytes_abs
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_monocytes_abs_high_with_high_percentage
    resulting_state: at_risk
    description: Escalate when monocytes_abs is high and monocyte_pct is also high, because
      that combination supports true monocytic predominance rather than an isolated borderline
      absolute elevation.
    conditions:
    - metric_id: monocyte_pct
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_monocytosis_review_2021
    - source_monocytosis_primarycare_2023
  output:
    signal_value: monocytes_abs
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: monocytes_abs
    supporting_markers:
    - monocyte_pct
    - neutrophil_pct
    - rbc
  explanation:
    mechanism: Absolute monocytosis appears when marrow output, recruitment, or survival of
      monocyte lineage cells increases during inflammatory, infectious, or reparative states.
    biological_pathway: Monocyte lineage production, inflammatory recruitment, and tissue-repair
      immune pathways.
    interpretation: A high monocyte count commonly supports a reactive immune pattern, but
      chronicity and associated features determine how far the differential should extend.
    implications: This result usually warrants repeat CBC trend review and targeted evaluation
      for chronic inflammatory, infectious, or autoimmune causes.
    supporting_marker_roles: High monocyte_pct corroborates true monocytic predominance, lower
      neutrophil_pct helps separate recovery-type patterns, and low RBC may support a broader
      systemic inflammatory context.
