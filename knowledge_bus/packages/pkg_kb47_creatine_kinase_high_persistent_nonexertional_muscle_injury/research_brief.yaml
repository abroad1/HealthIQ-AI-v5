physiological_claim: Persistent CK elevation increases the likelihood of clinically
  meaningful muscle pathology or exposure-related myotoxicity compared with a single
  transient rise.
evidence_strength: moderate
research_summary: No single universal CK threshold reliably separates benign from
  pathologic muscle injury across all populations, so persistence and corroboration
  remain central.
