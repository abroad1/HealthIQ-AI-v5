library:
  package_id: KBP-4702
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S47 Dhea High signal library
  description: Translated from inv_dhea_high_androgen_excess_context (Batch_2_Pass_3_Rev1.json).
signals:
- signal_id: signal_dhea_high
  name: Dhea High
  description: DHEA is an androgen precursor and high levels can support an adrenal
    or broader hyperandrogenic context, but isolated interpretation is assay-sensitive
    and non-specific.
  system: hormonal
  primary_metric: dhea
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: testosterone
    expected_direction: high
    role: corroborator
    availability: common
    rationale: Concurrent testosterone elevation corroborates that high DHEA is sitting
      within a broader biochemical hyperandrogenism pattern.
  - biomarker_id: dhea_s
    expected_direction: high
    role: differential_marker
    availability: specialist
    rationale: DHEA-S helps distinguish a persistent adrenal-weighted androgen source
      from isolated or assay-sensitive DHEA variation.
  dependencies:
    biomarkers:
    - dhea
    - testosterone
    - dhea_s
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: dhea_high_lab_range_activation_placeholder
    metric_id: dhea
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  runtime_context_requirements:
    missing_context_behaviour: suppress_signal
    required_context:
    - context_type: demographic
      key: sex
      requirement: present
    - context_type: demographic
      key: age
      requirement: present
    - context_type: symptom
      key: symptoms_present
      requirement: present
    - context_type: supplement
      key: supplements_disclosed
      requirement: present
    - context_type: medication
      key: hormone_therapy
      requirement: present
    - context_type: clinical_context
      key: aas_exposure
      requirement: present
  override_rules:
  - rule_id: or_dhea_high_with_testosterone_high
    resulting_state: at_risk
    description: Escalate when high DHEA coincides with high total testosterone, as
      this more strongly supports a broader biochemical hyperandrogenism pattern.
    conditions:
    - metric_id: testosterone
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_hyperandrogenism_review_2021
  output:
    signal_value: dhea
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: dhea
    supporting_markers:
    - testosterone
    - dhea_s
  explanation:
    mechanism: DHEA is an androgen precursor that can rise in states of increased
      adrenal or broader steroidogenic androgen production.
    biological_pathway: Adrenal and peripheral androgen precursor synthesis and downstream
      androgen metabolism.
    interpretation: This is best read as supportive evidence of androgen excess context
      rather than a stand-alone source-defining marker.
    implications: Further androgen profiling is usually more informative than relying
      on an isolated DHEA result.
    supporting_marker_roles: Total testosterone corroborates broader hyperandrogenism,
      while DHEA-S is the key differential marker for deciding whether the excess
      appears adrenal-weighted.
