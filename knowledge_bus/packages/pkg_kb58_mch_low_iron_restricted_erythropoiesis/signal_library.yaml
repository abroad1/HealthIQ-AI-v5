library:
  package_id: KBP-4796
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S58 CBC — Mch Low Iron Restricted Erythropoiesis
  description: Ingested from inv_mch_low_iron_restricted_erythropoiesis (cbc_hematology_pass_3.json).
    KB-S58 CBC tranche.
signals:
- signal_id: signal_mch_low
  name: Mch Low Iron Restricted Erythropoiesis
  description: Low MCH reflects reduced hemoglobin content per erythrocyte and is most useful
    in hypochromic microcytic anemia interpretation.
  system: hematologic
  primary_metric: mch
  trigger_direction: low
  supporting_metrics:
  - biomarker_id: mchc
    expected_direction: low
    role: mechanism_marker
    availability: common
    rationale: Concurrent low MCHC supports true hypochromia rather than an isolated index
      fluctuation.
  - biomarker_id: rdw_cv
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: Higher RDW-CV favors iron deficiency or evolving nutritional deficiency over
      a more uniform microcytic carrier state.
  - biomarker_id: rbc
    expected_direction: low
    role: corroborator
    availability: common
    rationale: A reduced RBC count supports an anemic iron-restricted pattern rather than
      compensated microcytosis.
  dependencies:
    biomarkers:
    - mch
    - mchc
    - rbc
    - rdw_cv
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_mch_low_lab_range_activation_placeholder
    metric_id: mch
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: false
    upper_bound_state: suboptimal
    enable_lower_bound: true
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_mch_low_with_hypochromia_and_anisocytosis
    resulting_state: at_risk
    description: Escalate when low MCH coexists with low MCHC and high RDW-CV, because this
      combination is more consistent with clinically relevant iron-restricted hypochromia
      than an isolated low index.
    conditions:
    - metric_id: mchc
      operator: <
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: below_min
    - metric_id: rdw_cv
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_rbc_indices_ida_vs_thal_2024
    - source_ida_vs_thal_review_2023
  output:
    signal_value: mch
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: mch
    supporting_markers:
    - mchc
    - rdw_cv
    - rbc
  explanation:
    mechanism: MCH falls when erythrocytes are produced with reduced hemoglobin content, most
      often because iron availability or hemoglobin synthesis is impaired.
    biological_pathway: Erythropoiesis, hemoglobin synthesis, and iron-dependent red cell
      maturation pathways.
    interpretation: A low MCH result is usually a supportive index within a broader hypochromic
      microcytic pattern rather than a stand-alone diagnosis.
    implications: This pattern commonly prompts iron studies and review of chronic blood loss,
      malabsorption, or inflammatory context.
    supporting_marker_roles: Low MCHC supports genuine hypochromia, high RDW-CV favors evolving
      nutritional deficiency, and low RBC count supports an anemic rather than compensated
      carrier pattern.
