library:
  package_id: pkg_kb52c_iron_high_iron_overload_context
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C — Iron High Iron Overload Context
  description: Ingested from inv_iron_high_iron_overload_context (Batch_3_Pass_3.json).
    MR-v2 iron overload context tranche.
signals:
- signal_id: signal_iron_high
  name: Iron High Iron Overload Context
  description: High serum iron can indicate increased circulating iron availability but requires
    discrimination between overload and transient release states.
  system: hematologic
  primary_metric: iron
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: transferrin_saturation
    expected_direction: high
    role: corroborator
    availability: common
    rationale: High directly reported transferrin saturation supports excessive circulating iron burden.
  - biomarker_id: ferritin
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: High ferritin can support increased iron stores, though it is not specific in inflammatory states.
  - biomarker_id: alt
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: Raised ALT helps distinguish hepatocellular release from a primary iron-loading pattern.
  dependencies:
    biomarkers:
    - alt
    - ferritin
    - iron
    - transferrin_saturation
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_iron_high_lab_range_activation_placeholder
    metric_id: iron
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  mandatory_pre_emission_gates:
  - gate_id: require_transferrin_saturation_present
    metric_id: transferrin_saturation
    comparator_type: biomarker_present
  - gate_id: require_transferrin_saturation_high
    metric_id: transferrin_saturation
    comparator_type: lab_range_boundary
    boundary: above_max
    condition_type: all_of
  - gate_id: require_ferritin_high
    metric_id: ferritin
    comparator_type: lab_range_boundary
    boundary: above_max
    condition_type: all_of
  override_rules:
  - rule_id: or_iron_high_with_transferrin_saturation_high
    resulting_state: at_risk
    description: Escalate when high serum iron coincides with high transferrin saturation, as this
      more strongly supports a genuine iron-loading pattern.
    conditions:
    - metric_id: transferrin_saturation
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_iron_overload_review_2024
  output:
    signal_value: iron
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: iron
    supporting_markers:
    - transferrin_saturation
    - ferritin
    - alt
  explanation:
    mechanism: High serum iron with concordant saturation and ferritin elevation supports increased
      circulating and stored iron availability.
    biological_pathway: Iron transport, transferrin saturation dynamics, and tissue iron storage pathways.
    interpretation: High serum iron is more consistent with a contextual iron overload pattern when
      directly reported transferrin saturation and ferritin are concordantly elevated.
    implications: Liver markers and persistence of the pattern should be reviewed before attributing
      high iron to durable tissue loading; hepatocellular release can weaken overload interpretation.
    supporting_marker_roles: Transferrin saturation corroborates circulating burden; ferritin supports
      store context; ALT helps redirect away from primary overload when liver injury dominates.
