library:
  package_id: KBP-4776
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C Wave A — Triglycerides High Insulin Resistant Hypertriglyceridemia
  description: Ingested from inv_triglycerides_high_insulin_resistant_hypertriglyceridemia
    (Batch_4_Pass_3.json). KB-S52C Wave A resolver-clean tranche.
signals:
- signal_id: signal_triglycerides_high
  name: Triglycerides High Insulin Resistant Hypertriglyceridemia
  description: High triglycerides commonly reflect insulin resistance, hepatic overproduction
    of triglyceride-rich lipoproteins, or impaired clearance.
  system: metabolic
  primary_metric: triglycerides
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: hdl_cholesterol
    expected_direction: low
    role: corroborator
    availability: common
    rationale: Low HDL commonly accompanies insulin-resistant hypertriglyceridemia.
  - biomarker_id: hba1c_pct
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: Higher HbA1c supports impaired glycemic regulation within a metabolic
      hypertriglyceridemic state.
  - biomarker_id: ldl_cholesterol
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: LDL helps distinguish mixed hyperlipidemia from a more classic triglyceride-predominant
      insulin-resistant phenotype.
  dependencies:
    biomarkers:
    - hba1c_pct
    - hdl_cholesterol
    - ldl_cholesterol
    - triglycerides
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_triglycerides_high_lab_range_activation_placeholder
    metric_id: triglycerides
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_triglycerides_high_with_hdl_low
    resulting_state: at_risk
    description: Escalate when high triglycerides coincide with low HDL, as this more
      strongly supports an insulin-resistant hypertriglyceridemic pattern.
    conditions:
    - metric_id: hdl_cholesterol
      operator: <
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: below_min
    source_refs:
    - source_esc_dyslipidaemia_2019
  output:
    signal_value: triglycerides
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: triglycerides
    supporting_markers:
    - hdl_cholesterol
    - hba1c_pct
    - ldl_cholesterol
  explanation:
    mechanism: Triglycerides rise when hepatic secretion of triglyceride-rich lipoproteins
      increases or peripheral clearance falls.
    biological_pathway: VLDL metabolism, insulin resistance, lipoprotein lipase activity,
      and triglyceride-rich lipoprotein handling.
    interpretation: This pattern is usually metabolic and syndromic rather than an
      isolated triglyceride disorder.
    implications: The main follow-on step is to determine whether the elevation is
      fasting and persistent and whether it belongs to a broader insulin-resistant
      phenotype.
    supporting_marker_roles: Low HDL corroborates the pattern, HbA1c supports metabolic
      mechanism, and LDL helps distinguish triglyceride-predominant from mixed dyslipidemia.
