library:
  package_id: "KBP-0020"
  schema_version: "1.0.0"
  package_version: "1.0.0"
  library_name: "Iron Overload Context Signal Library"
  description: >
    Investigation signal library for ferritin-high overload context.
signals:
  - signal_id: "signal_iron_overload_context"
    name: "Iron Overload Context"
    description: >
      Detects ferritin above lab range and escalates when iron and hepatic context markers
      support overload stress.
    system: "hepatic"
    primary_metric: "ferritin"
    supporting_metrics:
      - iron
      - alt
      - ast
    dependencies:
      biomarkers:
        - ferritin
        - iron
        - alt
        - ast
      derived_metrics: []
      signals: []
    optional_dependencies:
      biomarkers: []
      derived_metrics: []
      signals: []
    thresholds:
      - threshold_id: "signal_iron_overload_context_lab_range_activation_placeholder"
        metric_id: "ferritin"
        operator: ">="
        value: 9999.0
        severity: "at_risk"
        description: >
          Validator-compatibility placeholder. Runtime activation is controlled by
          activation_logic=lab_range_exceeded and lab reference ranges.
    activation_logic: "lab_range_exceeded"
    activation_config:
      upper_bound_state: "suboptimal"
      enable_lower_bound: false
      lower_bound_state: "suboptimal"
    override_rules:
      - rule_id: "iron_overload_high_iron"
        description: >
          Escalate when ferritin elevation coexists with high serum iron.
        conditions:
          - metric_id: "iron"
            operator: ">"
            value: 32.0
            condition_type: "any_of"
        resulting_state: "at_risk"
      - rule_id: "iron_overload_hepatic_stress"
        description: >
          Escalate when ferritin elevation coexists with elevated hepatic enzymes.
        conditions:
          - metric_id: "alt"
            operator: ">"
            value: 55.0
            condition_type: "any_of"
          - metric_id: "ast"
            operator: ">"
            value: 45.0
            condition_type: "any_of"
        resulting_state: "at_risk"
    output:
      signal_value: "ferritin"
      signal_state: "at_risk"
      confidence: "confidence_model_v1"
      primary_metric: "ferritin"
      supporting_markers:
        - iron
        - alt
        - ast
