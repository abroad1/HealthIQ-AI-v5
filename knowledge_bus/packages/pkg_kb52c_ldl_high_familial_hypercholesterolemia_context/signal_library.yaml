signals:
- signal_id: signal_ldl_high
  name: Ldl High Familial Hypercholesterolemia Context
  description: Markedly high LDL can raise suspicion for a familial or primary hypercholesterolemia
    context, particularly when discordant with secondary explanations.
  system: lipid_transport
  primary_metric: ldl_cholesterol
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: apob
    expected_direction: high
    role: corroborator
    availability: specialist
    rationale: High apoB can corroborate a sustained primary atherogenic lipoprotein
      excess phenotype.
  - biomarker_id: tsh
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: TSH helps distinguish primary LDL elevation from secondary hypothyroid-related
      hypercholesterolemia.
  - biomarker_id: triglycerides
    expected_direction: any
    role: mechanism_marker
    availability: optional
    rationale: Relatively normal triglycerides can fit an LDL-predominant phenotype
      more than a mixed dyslipidemia pattern.
  dependencies:
    biomarkers:
    - apob
    - ldl_cholesterol
    - triglycerides
    - tsh
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_ldl_high_lab_range_activation_placeholder
    metric_id: ldl_cholesterol
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_ldl_high_with_tsh_normal_apob_high
    resulting_state: at_risk
    description: Escalate when high LDL coincides with high apoB, because that more
      strongly supports a persistent atherogenic particle phenotype than a trivial
      or transient elevation.
    conditions:
    - metric_id: apob
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_esc_dyslipidaemia_2025
  output:
    signal_value: ldl_cholesterol
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: ldl_cholesterol
    supporting_markers:
    - apob
    - tsh
    - triglycerides
  explanation:
    mechanism: Sustained LDL elevation can result from inherited LDL receptor pathway
      impairment or from secondary metabolic conditions such as hypothyroidism.
    biological_pathway: LDL receptor-mediated clearance, apoB particle persistence,
      inherited lipoprotein disorders, and secondary endocrine contributors.
    interpretation: This frame separates primary persistent LDL excess from common
      secondary explanations rather than claiming genetic diagnosis from a single
      LDL result.
    implications: The key task is to decide whether the elevation is likely primary
      and persistent or secondary to a reversible cause such as hypothyroidism.
    supporting_marker_roles: ApoB corroborates persistent particle excess, TSH performs
      true differential work against hypothyroid dyslipidemia, and triglycerides help
      phenotype the pattern.
