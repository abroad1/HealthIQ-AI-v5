library:
  package_id: KBP-4732
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C — Iron Low Functional Iron Restriction Inflammation
  description: Ingested from inv_iron_low_functional_iron_restriction_inflammation (Batch_3_Pass_3.json).
    MR-v2 functional inflammatory iron restriction context tranche.
signals:
- signal_id: signal_iron_low
  name: Iron Low Functional Inflammatory Restriction Context
  description: Low serum iron commonly occurs in inflammation because iron is sequestered away
    from plasma despite variable total body stores.
  system: inflammatory
  primary_metric: iron
  trigger_direction: low
  supporting_metrics:
  - biomarker_id: crp
    expected_direction: high
    role: corroborator
    availability: common
    rationale: Raised CRP supports an inflammatory state capable of lowering circulating iron.
  - biomarker_id: ferritin
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: Normal or high ferritin in inflammatory settings supports iron sequestration rather
      than simple store depletion.
  - biomarker_id: transferrin_saturation
    expected_direction: low
    role: differential_marker
    availability: common
    rationale: Low directly reported transferrin saturation helps distinguish iron-restricted patterns
      from transient isolated iron fluctuation.
  dependencies:
    biomarkers:
    - crp
    - ferritin
    - iron
    - transferrin_saturation
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_iron_low_lab_range_activation_placeholder
    metric_id: iron
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: false
    upper_bound_state: suboptimal
    enable_lower_bound: true
    lower_bound_state: suboptimal
  mandatory_pre_emission_gates:
  - gate_id: require_transferrin_saturation_present
    metric_id: transferrin_saturation
    comparator_type: biomarker_present
  - gate_id: require_transferrin_saturation_low
    metric_id: transferrin_saturation
    comparator_type: lab_range_boundary
    boundary: below_min
    condition_type: all_of
  - gate_id: require_ferritin_not_low
    metric_id: ferritin
    comparator_type: lab_range_boundary
    boundary: not_below_min
    condition_type: all_of
  - gate_id: require_crp_high
    metric_id: crp
    comparator_type: lab_range_boundary
    boundary: above_max
    condition_type: all_of
  override_rules:
  - rule_id: or_iron_low_with_crp_high
    resulting_state: at_risk
    description: Escalate when low serum iron coincides with high CRP, as this more strongly supports
      inflammation-related hypoferremia or mixed iron restriction.
    conditions:
    - metric_id: crp
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_iron_lab_guideline_2024
  output:
    signal_value: iron
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: iron
    supporting_markers:
    - crp
    - ferritin
    - transferrin_saturation
  explanation:
    mechanism: Inflammation can lower circulating iron through sequestration and reduced availability.
    biological_pathway: Acute-phase inflammatory iron handling and reticuloendothelial iron redistribution.
    interpretation: Low serum iron with non-low ferritin and raised CRP is more consistent with a
      contextual inflammatory iron restriction pattern than absolute store depletion.
    implications: Ferritin and inflammatory markers should be reviewed before attributing low iron
      to depleted stores.
    supporting_marker_roles: CRP corroborates inflammation; ferritin helps distinguish sequestration
      from depletion; transferrin saturation grades circulating restriction.
