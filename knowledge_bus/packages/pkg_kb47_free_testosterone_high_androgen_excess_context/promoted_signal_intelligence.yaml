promoted_signal_intelligence_contract_version: 1.0.0
schema_version: 1.0.0
package_id: pkg_kb47_free_testosterone_high_androgen_excess_context
translation:
  source: investigation_spec_v3
  investigation_spec_contract_version: 3.0.0
  investigation_spec_id: inv_free_testosterone_high_androgen_excess_context
  signal_id: signal_free_testosterone_high
signals:
- signal_id: signal_free_testosterone_high
  research_domain: hormonal
  signal_system: hormonal
  primary_metric:
    biomarker_id: free_testosterone
    rationale: High free testosterone can support increased bioavailable androgen
      exposure and is a relevant biochemical marker of androgen excess when assay
      quality is adequate and interpreted alongside binding-protein context.
  trigger_direction: high
  activation:
    activation_logic: lab_range_exceeded
    activation_config:
      enable_upper_bound: true
      upper_bound_state: suboptimal
      enable_lower_bound: false
      lower_bound_state: suboptimal
  states:
    baseline_state: suboptimal
    escalation_state: at_risk
  supporting_markers:
  - biomarker_id: testosterone
    expected_direction: high
    role: corroborator
    relationship_kind: corroboration
    availability: common
    rationale: Raised total testosterone corroborates that high free testosterone
      reflects a genuine androgen-excess biochemical pattern.
  - biomarker_id: dhea_s
    expected_direction: high
    role: differential_marker
    relationship_kind: differential
    availability: specialist
    rationale: DHEA-S helps distinguish adrenal-weighted androgen excess from low-SHBG-mediated
      amplification of the free testosterone result.
  contradiction_markers:
  - contradiction_id: ctr_normal_total_testosterone_weakens_true_excess
    marker_reference: testosterone
    contradiction_rationale: A normal total testosterone alongside elevated free testosterone
      suggests that altered binding protein context rather than true androgen overproduction
      is driving the free fraction, weakening a straightforward biochemical androgen
      excess interpretation.
    contradiction_strength: moderate
  - contradiction_id: ctr_normal_total_testosterone
    marker_reference: testosterone
    contradiction_rationale: A normal total testosterone suggests that altered binding
      protein context may be contributing materially to the free testosterone result.
    contradiction_strength: moderate
  missing_data:
    policies:
    - Assess metabolic context and SHBG before attributing the pattern solely to marked
      androgen overproduction.
    - Review total testosterone, SHBG, menstrual or reproductive context, and adrenal-source
      markers before inferring etiology.
  confidence:
    evidence_strength: moderate
  override_rules:
  - rule_id: or_free_testosterone_high_with_total_testosterone_high
    resulting_state: at_risk
    description: Escalate when high free testosterone coincides with high total testosterone,
      as this more strongly supports true biochemical androgen excess.
    conditions:
    - metric_id: testosterone
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_pcos_guideline_2023
  evidence:
    evidence_strength: moderate
    physiological_claim: Free testosterone is a clinically relevant biochemical marker
      of androgen excess when measured or calculated using appropriate methods.
    threshold_notes: Interpretation should remain assay-aware and laboratory anchored,
      especially when SHBG is abnormal.
    sources:
    - source_id: source_pcos_guideline_2023
      paper_title: Recommendations from the 2023 International Evidence-based Guideline
        for the Assessment and Management of Polycystic Ovary Syndrome
      journal: European Journal of Endocrinology
      year: 2023
  confirmatory_test_refs:
  - test_id: ct_repeat_androgen_profile_with_dhea_s
    rationale: Repeat androgen testing with DHEA-S helps determine whether high free
      testosterone reflects reproducible androgen excess with adrenal contribution
      or primarily altered binding context.
