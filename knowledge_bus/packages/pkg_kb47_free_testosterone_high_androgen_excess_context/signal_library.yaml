library:
  package_id: KBP-4716
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S47 Free Testosterone High signal library
  description: Translated from inv_free_testosterone_high_androgen_excess_context
    (Batch_2_Pass_3_Rev1.json).
signals:
- signal_id: signal_free_testosterone_high
  name: Free Testosterone High
  description: High free testosterone can support increased bioavailable androgen
    exposure and is a relevant biochemical marker of androgen excess when assay quality
    is adequate and interpreted alongside binding-protein context.
  system: hormonal
  primary_metric: free_testosterone
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: testosterone
    expected_direction: high
    role: corroborator
    availability: common
    rationale: Raised total testosterone corroborates that high free testosterone
      reflects a genuine androgen-excess biochemical pattern.
  - biomarker_id: dhea_s
    expected_direction: high
    role: differential_marker
    availability: specialist
    rationale: DHEA-S helps distinguish adrenal-weighted androgen excess from low-SHBG-mediated
      amplification of the free testosterone result.
  dependencies:
    biomarkers:
    - free_testosterone
    - testosterone
    - dhea_s
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: free_testosterone_high_lab_range_activation_placeholder
    metric_id: free_testosterone
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_free_testosterone_high_with_total_testosterone_high
    resulting_state: at_risk
    description: Escalate when high free testosterone coincides with high total testosterone,
      as this more strongly supports true biochemical androgen excess.
    conditions:
    - metric_id: testosterone
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_pcos_guideline_2023
  output:
    signal_value: free_testosterone
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: free_testosterone
    supporting_markers:
    - testosterone
    - dhea_s
  explanation:
    mechanism: Free testosterone rises when androgen production increases, SHBG falls,
      or both occur together.
    biological_pathway: Androgen synthesis, SHBG binding, and circulating bioavailable
      androgen exposure.
    interpretation: This pattern can support biochemical androgen excess but still
      requires source identification and contextual clarification before stronger
      conclusions are drawn.
    implications: The main interpretive task is to distinguish true androgen overproduction
      from low-SHBG amplification of free androgen exposure.
    supporting_marker_roles: Total testosterone corroborates androgen excess, while
      DHEA-S is the differential marker that helps separate adrenal-weighted excess
      from low-SHBG amplification.
