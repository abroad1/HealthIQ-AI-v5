library:
  package_id: KBP-4743
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C Wave A — Creatinine Low Low Muscle Mass Or Low Generation
  description: Ingested from inv_creatinine_low_low_muscle_mass_or_low_generation
    (Batch_4_Pass_3.json). KB-S52C Wave A resolver-clean tranche.
signals:
- signal_id: signal_creatinine_low
  name: Creatinine Low Low Muscle Mass Or Low Generation
  description: Low creatinine commonly reflects reduced creatinine generation from
    low muscle mass or reduced intake rather than a primary renal disorder, though
    context is needed.
  system: metabolic
  primary_metric: creatinine
  trigger_direction: low
  supporting_metrics:
  - biomarker_id: egfr
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: Creatinine-based eGFR may appear higher when creatinine generation
      is low rather than filtration being truly increased.
  - biomarker_id: albumin
    expected_direction: low
    role: corroborator
    availability: common
    rationale: Low albumin can support a frailty, undernutrition, or chronic illness
      context when creatinine is low.
  - biomarker_id: cystatin_c
    expected_direction: any
    role: differential_marker
    availability: specialist
    rationale: Cystatin C helps distinguish low creatinine due to low generation from
      a genuinely preserved filtration state.
  dependencies:
    biomarkers:
    - albumin
    - creatinine
    - cystatin_c
    - egfr
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_creatinine_low_lab_range_activation_placeholder
    metric_id: creatinine
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: false
    upper_bound_state: suboptimal
    enable_lower_bound: true
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_creatinine_low_with_albumin_low
    resulting_state: at_risk
    description: Escalate when low creatinine coincides with low albumin, as this
      more strongly supports frailty, undernutrition, or low-generation context.
    conditions:
    - metric_id: albumin
      operator: <
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: below_min
    source_refs:
    - source_hypoalbuminemia_review_2024
  output:
    signal_value: creatinine
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: creatinine
    supporting_markers:
    - egfr
    - albumin
    - cystatin_c
  explanation:
    mechanism: Creatinine concentration falls when muscle-derived generation is reduced
      or when dilution lowers the measured circulating concentration.
    biological_pathway: Creatine turnover, muscle mass, nutritional state, and creatinine-based
      estimation of kidney function.
    interpretation: This is usually a context signal rather than a kidney disease
      signal and is most useful for recognizing low-generation states.
    implications: Further assessment should usually focus on body composition, nutrition,
      and whether cystatin C tells a different renal story.
    supporting_marker_roles: Albumin contributes frailty or nutrition context, eGFR
      highlights creatinine-based estimation effects, and cystatin C helps discriminate
      low generation from true filtration status.
