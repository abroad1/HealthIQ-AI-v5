library:
  package_id: KBP-4731
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C Wave A — Apob High Familial Combined Hyperlipidemia Pattern
  description: Ingested from inv_apob_high_familial_combined_hyperlipidemia_pattern
    (Batch_5_Pass_3.json). KB-S52C Wave A resolver-clean tranche.
signals:
- signal_id: signal_apob_high
  name: Apob High Familial Combined Hyperlipidemia Pattern
  description: High apoB with mixed lipid abnormality can support a familial combined
    hyperlipidaemia-type pattern, particularly when the phenotype is persistent and
    family history is compatible.
  system: lipid_transport
  primary_metric: apob
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: triglycerides
    expected_direction: high
    role: corroborator
    availability: common
    rationale: Raised triglycerides commonly accompany apoB excess in familial combined
      hyperlipidaemia-like patterns.
  - biomarker_id: ldl_cholesterol
    expected_direction: high
    role: corroborator
    availability: common
    rationale: Concurrent LDL-C elevation supports combined atherogenic lipoprotein
      excess rather than isolated hypertriglyceridaemia.
  - biomarker_id: hba1c
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: Hyperglycaemia supports secondary insulin-resistant dyslipidaemia and
      helps distinguish inherited combined dyslipidaemia from purely acquired metabolic
      patterns.
  dependencies:
    biomarkers:
    - apob
    - hba1c
    - ldl_cholesterol
    - triglycerides
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_apob_high_lab_range_activation_placeholder
    metric_id: apob
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_apob_high_with_mixed_lipid_pattern
    resulting_state: at_risk
    description: Escalate when apoB is high with combined triglyceride and LDL-related
      abnormalities, indicating a mixed atherogenic phenotype that merits inherited-versus-secondary
      review.
    conditions:
    - metric_id: triglycerides
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    - metric_id: ldl_cholesterol
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_fchl_overview
    - source_fchl_ir
  output:
    signal_value: apob
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: apob
    supporting_markers:
    - triglycerides
    - ldl_cholesterol
    - hba1c
  explanation:
    mechanism: Familial combined hyperlipidaemia-type states involve increased production
      and altered handling of apoB-containing lipoproteins, often with variable expression
      over time.
    biological_pathway: Overproduction of VLDL and apoB-containing particles can produce
      mixed elevation of triglycerides and LDL-related markers.
    interpretation: This frame is most useful when apoB is clearly high within a persistent
      mixed dyslipidaemic phenotype, not when the result is isolated or transient.
    implications: The pattern may justify longitudinal review and family-history assessment
      before an inherited label is applied.
    supporting_marker_roles: Triglycerides and LDL-C corroborate mixed apoB-rich dyslipidaemia,
      while HbA1c helps differentiate secondary insulin-resistant dyslipidaemia from
      a more inherited pattern.
