promoted_signal_intelligence_contract_version: 1.0.0
schema_version: 1.0.0
package_id: pkg_kb47_free_t4_low_thyroid_hormone_deficiency
translation:
  source: investigation_spec_v3
  investigation_spec_contract_version: 3.0.0
  investigation_spec_id: inv_free_t4_low_thyroid_hormone_deficiency
  signal_id: signal_free_t4_low
signals:
- signal_id: signal_free_t4_low
  research_domain: thyroid
  signal_system: hormonal
  primary_metric:
    biomarker_id: free_t4
    rationale: Free T4 directly reflects circulating thyroxine availability and low
      values are central to thyroid hormone deficiency assessment.
  trigger_direction: low
  activation:
    activation_logic: lab_range_exceeded
    activation_config:
      enable_upper_bound: false
      upper_bound_state: suboptimal
      enable_lower_bound: true
      lower_bound_state: suboptimal
  states:
    baseline_state: suboptimal
    escalation_state: at_risk
  supporting_markers:
  - biomarker_id: tsh
    expected_direction: high
    role: differential_marker
    relationship_kind: differential
    availability: common
    rationale: TSH is the key differential marker for distinguishing primary hypothyroid
      physiology from central or contextual patterns.
  - biomarker_id: free_t3
    expected_direction: low
    role: corroborator
    relationship_kind: corroboration
    availability: common
    rationale: Low free T3 can corroborate broader thyroid hormone deficiency when
      free T4 is low.
  contradiction_markers:
  - contradiction_id: ctr_nonthyroidal_illness_context
    marker_reference: tsh
    contradiction_rationale: A low or normal TSH in severe illness may reflect non-thyroidal
      illness rather than uncomplicated primary hypothyroidism.
    contradiction_strength: moderate
  - contradiction_id: ctr_preserved_free_t3_weakens_broad_deficiency
    marker_reference: free_t3
    contradiction_rationale: A preserved or high-normal free T3 weakens a broader
      thyroid hormone deficiency pattern, as maintained peripheral T3 availability
      suggests adequate conversion and a less biologically complete deficiency state.
    contradiction_strength: moderate
  missing_data:
    policies:
    - Confirm the panel and interpret alongside TSH rather than using free T4 alone
      to infer severity.
    - Interpret low free T4 with TSH before assigning primary versus central thyroid
      disease.
  confidence:
    evidence_strength: consensus
  override_rules:
  - rule_id: or_free_t4_low_with_tsh_high
    resulting_state: at_risk
    description: Escalate when low free T4 coincides with high TSH, as this more strongly
      supports primary thyroid hormone deficiency.
    conditions:
    - metric_id: tsh
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_hypothyroidism_guideline_2014
  evidence:
    evidence_strength: consensus
    physiological_claim: Low free T4 is a central laboratory feature of thyroid hormone
      deficiency and must be interpreted with TSH to classify the pattern accurately.
    threshold_notes: Free T4 should be interpreted using laboratory reference intervals
      and in combination with TSH rather than through ungoverned severity cutoffs.
    sources:
    - source_id: source_hypothyroidism_guideline_2014
      paper_title: 'Guidelines for the Treatment of Hypothyroidism: Prepared by the
        American Thyroid Association Task Force on Thyroid Hormone Replacement'
      journal: Thyroid
      year: 2014
  confirmatory_test_refs:
  - test_id: ct_repeat_free_t4_with_tsh
    rationale: Repeat free T4 with TSH helps confirm biochemical thyroid hormone deficiency
      and improve pattern classification.
