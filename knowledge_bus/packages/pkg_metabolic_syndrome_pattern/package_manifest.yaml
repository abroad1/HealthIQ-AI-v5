package_id: "pkg_metabolic_syndrome_pattern"
package_version: "1.0.0"
description: >
  KBP-0009 — Metabolic Syndrome Pattern Detection (signal_metabolic_syndrome_pattern).
  Creation package: detects metabolic syndrome (MetS) using the harmonised 2009
  IDF/NHLBI/AHA definition — ≥3 of 5 components (elevated TG, reduced HDL, elevated
  fasting glucose, elevated BP, central adiposity). Primary metric mets_component_count
  (integer 0–5) requires a new computation module beyond ratio_registry (see
  clinical_signoff.md). TG/HDL ratio (Li et al. 2008 direct mmol/L thresholds) exposed
  as supporting sub-signal. Thresholds in confirmed SSOT canonical units (mmol/L for
  lipids/glucose; mmHg for BP; cm for waist). Evidence: Mottillo 2010 (n=951,083
  meta-analysis, ~2× CVD risk at ≥3 components) and Alberti et al. 2009 (harmonised
  guideline). NOTE: pending architecture implementation — see clinical_signoff.md.
