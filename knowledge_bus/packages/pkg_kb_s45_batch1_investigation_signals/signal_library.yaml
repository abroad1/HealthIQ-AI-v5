    biological_pathway: >
      Bone marrow output links basophil counts to platelet and leukocyte production in
      proliferative disorders.
    interpretation: >
      True absolute basophilia is a focused clue toward marrow pathology when sustained.
    implications: >
      Concurrent thrombocytosis or leukocytosis increases concern for multi-lineage
      myeloproliferation.
    supporting_marker_roles: >
      Platelets and total white blood cells indicate whether basophilia sits within an
      isolated pattern or broader marrow stress.

- signal_id: signal_hyperbilirubinemia
