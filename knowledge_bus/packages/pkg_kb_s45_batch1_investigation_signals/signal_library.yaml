library:
  package_id: KBP-2432
  schema_version: 1.0.0
  package_version: 1.0.0
  library_name: KB-S45 Batch 1 Investigation Signal Library
  description: >
    Translated from investigation-spec-collection-batch1-10.json. Ten biomarker
    investigation signals with lab-range activation and lab_range_boundary override
    semantics (KB-S45a). Primary activation is reference-range driven; thresholds
    entries are validator placeholders only.

signals:
- signal_id: signal_active_b12_deficiency
  name: Active B12 deficiency context
  description: >
    Active B12 (holotranscobalamin) reflects the biologically available fraction of
    vitamin B12. Low levels indicate depletion before macrocytosis or overt symptoms.
  system: hematologic
  primary_metric: active_b12
  supporting_metrics: &sup_active_b12
  - homocysteine
  - mcv
  dependencies:
    biomarkers:
    - active_b12
    - homocysteine
    - mcv
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_active_b12_lab_range_activation_placeholder
    metric_id: active_b12
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    upper_bound_state: suboptimal
    enable_lower_bound: true
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_b12_functional_deficit
    description: Escalate if low active B12 is accompanied by homocysteine above the lab upper bound.
    conditions:
    - metric_id: homocysteine
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    resulting_state: at_risk
  output:
    signal_value: active_b12
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: active_b12
    supporting_markers: *sup_active_b12
  explanation:
    mechanism: >
      B12 is a required cofactor for DNA synthesis; holotranscobalamin reflects cobalamin
      available for tissue uptake.
    biological_pathway: >
      One-carbon metabolism links B12 status to homocysteine handling and erythroid
      precursor maturation.
    interpretation: >
      Low holotranscobalamin suggests inadequate B12 for cellular uptake relative to
      the laboratory reference interval.
    implications: >
      Untreated deficiency can progress to megaloblastic change and neurologic injury;
      homocysteine elevation supports functional deficit at the cellular level.
    supporting_marker_roles: >
      Homocysteine acts as a functional marker; MCV captures later-stage hematologic
      expression when present.

- signal_id: signal_apoa1_cardio_risk
  name: ApoA1 low cardiovascular context
  description: >
    Apolipoprotein A1 is the principal protein of HDL particles; lower levels reduce
    reverse cholesterol transport capacity and associate with higher vascular risk.
  system: lipid_transport
  primary_metric: apoa1
  supporting_metrics: &sup_apoa1
  - apob_apoa1_ratio
  dependencies:
    biomarkers:
    - apoa1
    - apob
    derived_metrics:
    - apob_apoa1_ratio
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_apoa1_lab_range_activation_placeholder
    metric_id: apoa1
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    upper_bound_state: suboptimal
    enable_lower_bound: true
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_apoa1_high_ratio
    description: Escalate if low ApoA1 is coupled with ApoB-to-ApoA1 ratio above the lab upper bound.
    conditions:
    - metric_id: apob_apoa1_ratio
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    resulting_state: at_risk
  output:
    signal_value: apoa1
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: apoa1
    supporting_markers: *sup_apoa1
  explanation:
    mechanism: >
      ApoA1 stabilizes HDL structure and participates in cholesterol efflux pathways
      from peripheral tissues.
    biological_pathway: >
      Reverse cholesterol transport moves cholesterol toward the liver for clearance
      and redistribution.
    interpretation: >
      Low ApoA1 indicates reduced HDL particle protein mass relative to the expected
      laboratory range for the assay context.
    implications: >
      Atherogenic balance worsens when ApoB-bearing particle burden is high relative
      to ApoA1-bearing HDL capacity.
    supporting_marker_roles: >
      The ApoB-to-ApoA1 ratio contextualizes whether low ApoA1 reflects an adverse
      pro-atherogenic particle balance.

- signal_id: signal_apob_atherogenic
  name: ApoB atherogenic burden
  description: >
    Apolipoprotein B counts atherogenic lipoprotein particles including LDL, VLDL, and
    IDL; higher levels indicate greater particle number and retained risk.
  system: lipid_transport
  primary_metric: apob
  supporting_metrics: &sup_apob
  - ldl_cholesterol
  dependencies:
    biomarkers:
    - apob
    - ldl_cholesterol
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_apob_lab_range_activation_placeholder
    metric_id: apob
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_apob_ldl_concordance
    description: Escalate if ApoB and LDL are both above their laboratory upper bounds.
    conditions:
    - metric_id: ldl_cholesterol
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    resulting_state: at_risk
  output:
    signal_value: apob
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: apob
    supporting_markers: *sup_apob
  explanation:
    mechanism: >
      Each atherogenic lipoprotein particle carries one ApoB molecule, so ApoB tracks
      total particle number more directly than cholesterol content alone.
    biological_pathway: >
      Hepatic and intestinal lipoprotein production and clearance set circulating ApoB
      particle load over time.
    interpretation: >
      Elevated ApoB indicates excess pro-atherogenic particle concentration relative
      to the assay reference interval.
    implications: >
      Concordant LDL elevation strengthens interpretation of higher total atherogenic
      burden rather than discordant remodeling alone.
    supporting_marker_roles: >
      LDL cholesterol helps describe how much of the ApoB signal is carried in classic
      LDL-range particles versus broader particle pools.

- signal_id: signal_lipid_imbalance
  name: ApoB-to-ApoA1 ratio imbalance
  description: >
    The ApoB-to-ApoA1 ratio contrasts pro-atherogenic particle load with HDL-related
    anti-atherogenic capacity in circulation.
  system: lipid_transport
  primary_metric: apob_apoa1_ratio
  supporting_metrics: &sup_ratio
  - crp
  dependencies:
    biomarkers:
    - crp
    - apob
    - apoa1
    derived_metrics:
    - apob_apoa1_ratio
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_apob_apoa1_ratio_lab_range_activation_placeholder
    metric_id: apob_apoa1_ratio
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_ratio_plus_inflammation
    description: Escalate if the ratio is high alongside CRP above the laboratory upper bound.
    conditions:
    - metric_id: crp
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    resulting_state: at_risk
  output:
    signal_value: apob_apoa1_ratio
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: apob_apoa1_ratio
    supporting_markers: *sup_ratio
  explanation:
    mechanism: >
      The ratio integrates particle number risk (ApoB) against reverse transport
      capacity (ApoA1-linked HDL).
    biological_pathway: >
      Lipoprotein metabolism couples hepatic production, peripheral exchange, and
      inflammatory states that modify particle composition.
    interpretation: >
      A higher ratio suggests atherogenic dominance relative to protective transport
      capacity for the measured assay context.
    implications: >
      Systemic inflammation can amplify vascular risk when combined with an adverse
      lipoprotein balance.
    supporting_marker_roles: >
      CRP marks inflammatory stress that can synergize with lipid imbalance to raise
      overall risk concern.

- signal_id: signal_basophilia_pct
  name: Basophil percentage elevation
  description: >
    Basophil fraction in the leukocyte differential; elevation can reflect allergic
    activation or marrow-related expansion depending on absolute counts.
  system: hematologic
  primary_metric: basophil_pct
  supporting_metrics: &sup_basopct
  - basophils_abs
  dependencies:
    biomarkers:
    - basophil_pct
    - basophils_abs
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_basophil_pct_lab_range_activation_placeholder
    metric_id: basophil_pct
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_absolute_basophilia_confirm
    description: Escalate if absolute basophil count is also above its laboratory upper bound.
    conditions:
    - metric_id: basophils_abs
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    resulting_state: at_risk
  output:
    signal_value: basophil_pct
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: basophil_pct
    supporting_markers: *sup_basopct
  explanation:
    mechanism: >
      Basophils release histamine and other mediators; differential shifts can be
      relative or reflect true cellular expansion.
    biological_pathway: >
      Myeloid lineage output from marrow sets circulating basophil mass and fraction.
    interpretation: >
      A high basophil percentage requires absolute count context to distinguish
      statistical effects from true basophilia.
    implications: >
      Sustained basophilia raises concern for marrow disorders and chronic allergic
      or inflammatory states depending on context.
    supporting_marker_roles: >
      Absolute basophil count confirms whether the fraction change represents a real
      increase in circulating basophils.

