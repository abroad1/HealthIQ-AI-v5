    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_myeloproliferative_marker
    description: Escalate if platelets or total white cells are above their laboratory upper bounds.
    conditions:
    - metric_id: platelets
      condition_type: any_of
      comparator_type: lab_range_boundary
      boundary: above_max
    - metric_id: white_blood_cells
      condition_type: any_of
      comparator_type: lab_range_boundary
      boundary: above_max
    resulting_state: at_risk
  output:
    signal_value: basophils_abs
