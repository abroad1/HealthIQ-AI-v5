  description: >
    Total bilirubin elevation reflects hepatocellular dysfunction, cholestasis, or
    pre-hepatic hemolysis depending on the overall liver panel pattern.
  system: hepatic
  primary_metric: bilirubin
  supporting_metrics: &sup_bili
  - alt
  - alp
  dependencies:
    biomarkers:
    - bilirubin
    - alt
    - alp
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_bilirubin_lab_range_activation_placeholder
    metric_id: bilirubin
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_liver_injury_pattern
    description: Escalate if ALT or ALP is above the laboratory upper bound alongside high bilirubin.
    conditions:
    - metric_id: alt
      condition_type: any_of
      comparator_type: lab_range_boundary
      boundary: above_max
    - metric_id: alp
      condition_type: any_of
      comparator_type: lab_range_boundary
      boundary: above_max
    resulting_state: at_risk
  output:
    signal_value: bilirubin
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: bilirubin
    supporting_markers: *sup_bili
  explanation:
    mechanism: >
      Bilirubin accumulates when hepatic uptake, conjugation, or biliary excretion is
      impaired, or when hemolysis increases production.
    biological_pathway: >
      Hepatocyte injury and cholestasis change transaminase and alkaline phosphatase
      patterns alongside pigment levels.
    interpretation: >
      Elevated bilirubin with discordant enzyme patterns points toward different
      anatomic levels of liver and biliary disease.
    implications: >
      Combined hepatocellular and cholestatic enzyme abnormalities raise urgency for
      structured hepatobiliary evaluation.
    supporting_marker_roles: >
      ALT emphasizes cytosolic injury while ALP highlights bile flow limitation when
      elevated relative to reference.

- signal_id: signal_hyperchloremia
  name: Hyperchloremia
  description: >
    Chloride is the principal extracellular anion; elevation often tracks sodium and
    water balance and acid-base compensation.
  system: renal
  primary_metric: chloride
  supporting_metrics: &sup_chloride
  - sodium
  dependencies:
    biomarkers:
    - chloride
    - sodium
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_chloride_lab_range_activation_placeholder
    metric_id: chloride
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_acidosis_pattern
    description: Escalate if chloride is high while sodium is below the laboratory lower bound.
    conditions:
    - metric_id: sodium
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: below_min
    resulting_state: at_risk
  output:
    signal_value: chloride
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: chloride
    supporting_markers: *sup_chloride
  explanation:
    mechanism: >
      Chloride shifts with sodium to preserve electroneutrality and participates in
      renal acid-base regulation.
    biological_pathway: >
      Tubular handling of chloride couples to bicarbonate handling during metabolic
      compensation.
    interpretation: >
      Isolated chloride elevation should be read with sodium and bicarbonate context
      to classify disturbance.
    implications: >
      Concurrent hyponatremia with hyperchloremia can indicate specific saline or
      renal water handling patterns.
    supporting_marker_roles: >
      Sodium anchors whether chloride changes reflect broader electrolyte disturbance
      versus isolated analytic variation.

