  explanation:
    mechanism: >
      Cortisol influences gluconeogenesis, vascular tone, and mineralocorticoid-like
      effects at high sustained exposure.
    biological_pathway: >
      The hypothalamic-pituitary-adrenal axis sets diurnal cortisol rhythm and stress
      responsiveness.
    interpretation: >
      Isolated morning elevations are nonspecific; metabolic corroboration increases
      clinical concern for sustained excess.
    implications: >
      Hypokalemia with hypercortisolism can reflect mineralocorticoid activity or
      renal losses in severe states.
    supporting_marker_roles: >
      Hemoglobin A1c tracks longer-term glycemic stress that can accompany chronic
      glucocorticoid excess.
