    primary_metric: corrected_calcium
    supporting_markers: *sup_calcium
  explanation:
    mechanism: >
      Parathyroid hormone and vitamin D tightly regulate calcium flux between bone,
      kidney, and intestine.
    biological_pathway: >
      Vitamin D availability shifts intestinal calcium absorption and interacts with
      PTH-driven bone resorption.
    interpretation: >
      Elevated corrected calcium with high vitamin D suggests vitamin-D-mediated
