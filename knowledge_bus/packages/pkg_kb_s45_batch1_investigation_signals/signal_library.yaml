  primary_metric: basophils_abs
  supporting_metrics: &sup_basophabs
  - platelets
  - white_blood_cells
  dependencies:
    biomarkers:
    - basophils_abs
    - platelets
    - white_blood_cells
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
