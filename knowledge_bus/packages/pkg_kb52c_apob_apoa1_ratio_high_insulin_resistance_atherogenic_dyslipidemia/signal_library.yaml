library:
  package_id: KBP-4729
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C Wave A — Apob Apoa1 Ratio High Insulin Resistance Atherogenic
    Dyslipidemia
  description: Ingested from inv_apob_apoa1_ratio_high_insulin_resistance_atherogenic_dyslipidemia
    (Batch_5_Pass_3.json). KB-S52C Wave A resolver-clean tranche.
signals:
- signal_id: signal_apob_apoa1_ratio_high
  name: Apob Apoa1 Ratio High Insulin Resistance Atherogenic Dyslipidemia
  description: A high apoB to apoA1 ratio often occurs in insulin-resistant atherogenic
    dyslipidaemia, where triglyceride-rich lipoprotein excess and lower apoA1 coexist.
  system: lipid_transport
  primary_metric: apob_apoa1_ratio
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: triglycerides
    expected_direction: high
    role: corroborator
    availability: common
    rationale: High triglycerides commonly accompany insulin-resistant dyslipidaemia
      and support a remnant-rich atherogenic pattern.
  - biomarker_id: hba1c
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: Dysglycaemia supports an insulin-resistant metabolic context that can
      drive high apoB/apoA1 ratio.
  - biomarker_id: ldl_cholesterol
    expected_direction: any
    role: differential_marker
    availability: common
    rationale: Normal LDL-C helps show that the adverse ratio may reflect qualitative
      dyslipidaemia not obvious from LDL-C alone.
  dependencies:
    biomarkers:
    - apob_apoa1_ratio
    - hba1c
    - ldl_cholesterol
    - triglycerides
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_apob_apoa1_ratio_high_lab_range_activation_placeholder
    metric_id: apob_apoa1_ratio
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_ratio_high_with_metabolic_support
    resulting_state: at_risk
    description: Escalate when a high apoB/apoA1 ratio is accompanied by metabolic
      markers consistent with insulin-resistant dyslipidaemia.
    conditions:
    - metric_id: triglycerides
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    - metric_id: hba1c
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_apob_ratio_longterm
    - source_ratio_predictor
  output:
    signal_value: apob_apoa1_ratio
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: apob_apoa1_ratio
    supporting_markers:
    - triglycerides
    - hba1c
    - ldl_cholesterol
  explanation:
    mechanism: Insulin resistance promotes overproduction of triglyceride-rich apoB-containing
      particles and unfavorable HDL remodelling, increasing the ratio.
    biological_pathway: Hepatic VLDL overproduction, remnant accumulation, and reduced
      HDL-related protective balance drive the adverse apolipoprotein ratio.
    interpretation: The ratio is particularly informative when conventional LDL-C
      appears modest but metabolic dyslipidaemia is present.
    implications: This pattern may justify broader cardiometabolic review rather than
      relying on LDL-C alone for risk framing.
    supporting_marker_roles: Triglycerides corroborate remnant-rich dyslipidaemia,
      HbA1c supports insulin-resistant mechanism, and LDL-C helps differentiate ratio-based
      discordance from overt LDL elevation.
