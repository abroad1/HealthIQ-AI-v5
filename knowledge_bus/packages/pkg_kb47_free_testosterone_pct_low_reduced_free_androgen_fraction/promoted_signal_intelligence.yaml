promoted_signal_intelligence_contract_version: 1.0.0
schema_version: 1.0.0
package_id: pkg_kb47_free_testosterone_pct_low_reduced_free_androgen_fraction
translation:
  source: investigation_spec_v3
  investigation_spec_contract_version: 3.0.0
  investigation_spec_id: inv_free_testosterone_pct_low_reduced_free_androgen_fraction
  signal_id: signal_free_testosterone_pct_low
signals:
- signal_id: signal_free_testosterone_pct_low
  research_domain: hormonal
  signal_system: hormonal
  primary_metric:
    biomarker_id: free_testosterone_pct
    rationale: Free testosterone percentage reflects the proportion of circulating
      testosterone that is unbound or bioavailable and can fall when SHBG is elevated
      or androgen production is reduced.
  trigger_direction: low
  activation:
    activation_logic: lab_range_exceeded
    activation_config:
      enable_upper_bound: false
      upper_bound_state: suboptimal
      enable_lower_bound: true
      lower_bound_state: suboptimal
  states:
    baseline_state: suboptimal
    escalation_state: at_risk
  supporting_markers:
  - biomarker_id: shbg
    expected_direction: high
    role: mechanism_marker
    relationship_kind: mechanism
    availability: common
    rationale: High SHBG can directly reduce the proportion of circulating testosterone
      that remains bioavailable.
  - biomarker_id: free_testosterone
    expected_direction: low
    role: differential_marker
    relationship_kind: differential
    availability: specialist
    rationale: Measured free testosterone helps distinguish a clinically important
      low bioavailable androgen state from a percentage-only shift driven by binding
      arithmetic.
  contradiction_markers:
  - contradiction_id: ctr_normal_or_low_shbg_weakens_binding_frame
    marker_reference: shbg
    contradiction_rationale: A normal or low SHBG directly contradicts an SHBG-mediated
      reduction interpretation for low free testosterone percentage, redirecting attention
      toward other explanations such as reduced androgen supply.
    contradiction_strength: strong
  - contradiction_id: ctr_preserved_free_testosterone_absolute
    marker_reference: free_testosterone
    contradiction_rationale: A preserved absolute free testosterone weakens a strong
      biological-deficiency interpretation from the percentage metric alone.
    contradiction_strength: moderate
  missing_data:
    policies:
    - Review SHBG and total testosterone together before inferring biologically meaningful
      androgen deficiency.
    - Use repeat androgen testing and SHBG context before drawing stronger conclusions
      from the percentage alone.
  confidence:
    evidence_strength: moderate
  override_rules:
  - rule_id: or_free_testosterone_pct_low_with_shbg_high
    resulting_state: at_risk
    description: Escalate when low free testosterone percentage coincides with high
      SHBG, as this more strongly supports a binding-mediated reduction in free androgen
      fraction.
    conditions:
    - metric_id: shbg
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_testosterone_guideline_2018
  evidence:
    evidence_strength: moderate
    physiological_claim: Free testosterone interpretation depends on the interaction
      between testosterone concentration and SHBG, not on the percentage metric alone.
    threshold_notes: Percentage-based androgen metrics should remain assay-aware and
      laboratory anchored and should not be used as universal stand-alone diagnostic
      cutoffs.
    sources:
    - source_id: source_testosterone_guideline_2018
      paper_title: 'Testosterone Therapy in Men With Hypogonadism: An Endocrine Society
        Clinical Practice Guideline'
      journal: Journal of Clinical Endocrinology and Metabolism
      year: 2018
  confirmatory_test_refs:
  - test_id: ct_repeat_free_fraction_with_measured_free_testosterone
    rationale: Repeating the free-fraction assessment with measured free testosterone
      helps determine whether the percentage abnormality reflects true androgen underexposure
      or only binding-related arithmetic distortion.
