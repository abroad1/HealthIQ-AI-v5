library:
  package_id: KBP-4797
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S58 CBC — Mch Low Thalassemia Trait Pattern
  description: Ingested from inv_mch_low_thalassemia_trait_pattern (cbc_hematology_pass_3.json).
    KB-S58 CBC tranche.
signals:
- signal_id: signal_mch_low
  name: Mch Low Thalassemia Trait Pattern
  description: Low MCH can also mark uniform microcytic hypochromia in hemoglobin synthesis
    disorders such as thalassemia trait.
  system: hematologic
  primary_metric: mch
  trigger_direction: low
  supporting_metrics:
  - biomarker_id: rbc
    expected_direction: high
    role: corroborator
    availability: common
    rationale: A relatively preserved or elevated RBC count supports compensated microcytosis,
      which is typical of thalassemia trait.
  - biomarker_id: mchc
    expected_direction: low
    role: mechanism_marker
    availability: common
    rationale: Low MCHC supports reduced hemoglobin content per cell in a microcytic carrier
      pattern.
  - biomarker_id: rdw_cv
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: Marked RDW-CV elevation shifts suspicion toward iron deficiency or mixed deficiency
      rather than a uniform carrier state.
  dependencies:
    biomarkers:
    - mch
    - mchc
    - rbc
    - rdw_cv
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_mch_low_lab_range_activation_placeholder
    metric_id: mch
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: false
    upper_bound_state: suboptimal
    enable_lower_bound: true
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_mch_low_with_high_rbc_pattern
    resulting_state: at_risk
    description: Escalate when low MCH coexists with high RBC count and low MCHC, because
      this combination is more consistent with compensated microcytic carrier-state physiology
      than isolated nutritional deficiency.
    conditions:
    - metric_id: rbc
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    - metric_id: mchc
      operator: <
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: below_min
    source_refs:
    - source_rbc_indices_ida_vs_thal_2024
    - source_ida_vs_thal_review_2023
  output:
    signal_value: mch
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: mch
    supporting_markers:
    - rbc
    - mchc
    - rdw_cv
  explanation:
    mechanism: In thalassemia trait, impaired globin-chain synthesis produces chronically
      small hypochromic erythrocytes, but overall RBC production may remain relatively preserved.
    biological_pathway: Globin synthesis, marrow compensation, and chronic microcytic erythropoiesis.
    interpretation: This pattern is clinically useful mainly for differential diagnosis between
      iron deficiency and compensated hemoglobinopathy-related microcytosis.
    implications: A confirmed carrier pattern changes further work-up, reduces unnecessary
      iron therapy, and may justify family or genetic counseling.
    supporting_marker_roles: High RBC count supports compensation, low MCHC supports hypochromia,
      and marked RDW-CV elevation acts as a competing marker that redirects toward iron deficiency.
