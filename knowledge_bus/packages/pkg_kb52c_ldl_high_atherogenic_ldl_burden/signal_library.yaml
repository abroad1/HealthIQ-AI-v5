  explanation:
    mechanism: Excess LDL reflects increased circulating apoB-containing lipoprotein
      burden available for arterial retention.
    biological_pathway: ApoB lipoprotein production, LDL receptor clearance, arterial
      retention, and atherosclerotic plaque biology.
    interpretation: This is a well-established cardiovascular-risk signal, and concern
      is justified when the elevation is persistent and corroborated by apoB burden.
    implications: The main next step is usually to determine whether the phenotype
      is predominantly LDL-driven or part of broader mixed dyslipidemia.
    supporting_marker_roles: ApoB corroborates particle burden, non-HDL provides mechanism-level
      burden context, and triglycerides help distinguish LDL-predominant from mixed
      dyslipidemia.
