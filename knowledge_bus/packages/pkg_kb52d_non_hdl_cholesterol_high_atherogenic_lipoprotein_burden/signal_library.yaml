library:
  package_id: KBP-4789
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52D Wave B — Non Hdl Cholesterol High Atherogenic Lipoprotein Burden
  description: Ingested from inv_non_hdl_high_atherogenic_lipoprotein_burden (Batch_7_Pass_3.json).
    KB-S52D Wave B remap-governed tranche; non_hdl→non_hdl_cholesterol per KB-S52B remap contract.
signals:
- signal_id: signal_non_hdl_high
  name: Non Hdl Cholesterol High Atherogenic Lipoprotein Burden
  description: Non-HDL cholesterol captures cholesterol carried by atherogenic apoB-containing particles
    and can support cardiovascular risk interpretation beyond LDL cholesterol alone.
  system: vascular
  primary_metric: non_hdl_cholesterol
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: apob
    expected_direction: high
    role: corroborator
    availability: common
    rationale: ApoB elevation corroborates increased atherogenic particle burden and strengthens interpretation
      of non-HDL cholesterol as a particle-rich risk pattern.
  - biomarker_id: ldl_cholesterol
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: Elevated LDL cholesterol supports a cholesterol-rich atherogenic pathway contributing to
      high non-HDL cholesterol.
  - biomarker_id: triglycerides
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: High triglycerides suggest a more mixed remnant-rich dyslipidaemia rather than predominantly
      LDL-driven elevation.
  dependencies:
    biomarkers:
    - apob
    - ldl_cholesterol
    - non_hdl_cholesterol
    - triglycerides
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_non_hdl_high_lab_range_activation_placeholder
    metric_id: non_hdl_cholesterol
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_non_hdl_high_with_high_apob
    resulting_state: at_risk
    description: Escalate when high non-HDL cholesterol is accompanied by elevated apoB, as combined
      cholesterol and particle burden strengthens atherogenic risk interpretation.
    conditions:
    - metric_id: apob
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_non_hdl_guideline_2024
  output:
    signal_value: non_hdl_cholesterol
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: non_hdl_cholesterol
    supporting_markers:
    - apob
    - ldl_cholesterol
    - triglycerides
  explanation:
    mechanism: Non-HDL cholesterol aggregates the cholesterol content of LDL, VLDL, remnant particles,
      and other apoB-containing lipoproteins that contribute to atherogenesis.
    biological_pathway: Atherogenic lipoprotein transport, arterial retention of apoB particles, and cholesterol
      delivery into vascular wall inflammatory pathways.
    interpretation: High non-HDL supports an atherogenic lipid pattern, with apoB and triglycerides helping
      distinguish particle-rich burden from mixed remnant-rich dyslipidaemia.
    implications: This pattern may justify broader cardiovascular risk review and refinement of lipid
      phenotype rather than reliance on LDL cholesterol alone.
    supporting_marker_roles: ApoB corroborates particle burden, LDL cholesterol supports a cholesterol-rich
      atherogenic mechanism, and triglycerides help differentiate mixed remnant-rich dyslipidaemia from a
      more LDL-predominant pattern.
