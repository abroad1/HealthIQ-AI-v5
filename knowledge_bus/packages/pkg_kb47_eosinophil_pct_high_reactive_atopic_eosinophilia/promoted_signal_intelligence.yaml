promoted_signal_intelligence_contract_version: 1.0.0
schema_version: 1.0.0
package_id: pkg_kb47_eosinophil_pct_high_reactive_atopic_eosinophilia
translation:
  source: investigation_spec_v3
  investigation_spec_contract_version: 3.0.0
  investigation_spec_id: inv_eosinophil_pct_high_reactive_atopic_eosinophilia
  signal_id: signal_eosinophil_pct_high
signals:
- signal_id: signal_eosinophil_pct_high
  research_domain: immunologic
  signal_system: inflammatory
  primary_metric:
    biomarker_id: eosinophil_pct
    rationale: Eosinophil percentage can support eosinophilic immune activation but
      should be interpreted with the absolute eosinophil count and total leukocyte
      context.
  trigger_direction: high
  activation:
    activation_logic: lab_range_exceeded
    activation_config:
      enable_upper_bound: true
      upper_bound_state: suboptimal
      enable_lower_bound: false
      lower_bound_state: suboptimal
  states:
    baseline_state: suboptimal
    escalation_state: at_risk
  supporting_markers:
  - biomarker_id: eosinophils_abs
    expected_direction: high
    role: differential_marker
    relationship_kind: differential
    availability: common
    rationale: Absolute eosinophils determine whether a high eosinophil percentage
      reflects true eosinophilia or only a relative shift in the leukocyte differential.
  - biomarker_id: total_ige
    expected_direction: high
    role: contextual_marker
    relationship_kind: mechanism
    availability: optional
    rationale: Elevated IgE supports an atopic or allergic immune context once true
      eosinophilia has been confirmed.
  contradiction_markers:
  - contradiction_id: ctr_relative_only_pattern
    marker_reference: eosinophils_abs
    contradiction_rationale: A normal absolute eosinophil count weakens a true eosinophilia
      interpretation and may indicate a relative differential shift instead.
    contradiction_strength: strong
  - contradiction_id: ctr_markedly_elevated_ige_challenges_mild_frame
    marker_reference: total_ige
    contradiction_rationale: A markedly elevated total IgE challenges a purely mild
      reactive immune activation interpretation and supports a more established atopic
      or allergic eosinophilic process warranting further evaluation.
    contradiction_strength: moderate
  missing_data:
    policies:
    - Confirm with the absolute eosinophil count and review clinical allergy or atopy
      context before drawing stronger conclusions.
    - Repeat the differential and review medication, infection, and atopic history
      before escalating beyond a reactive frame.
  confidence:
    evidence_strength: moderate
  override_rules:
  - rule_id: or_eosinophil_pct_high_with_abs_high
    resulting_state: at_risk
    description: Escalate when high eosinophil percentage coincides with high absolute
      eosinophils, as this confirms a true eosinophilic pattern rather than a relative
      shift.
    conditions:
    - metric_id: eosinophils_abs
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_eosinophilia_review_2020
  evidence:
    evidence_strength: moderate
    physiological_claim: Eosinophilia commonly arises in reactive allergic and atopic
      conditions, but differential-count interpretation should prioritize the absolute
      eosinophil count.
    threshold_notes: Percentage-based eosinophil abnormalities are best interpreted
      with the absolute count rather than as stand-alone severity markers.
    sources:
    - source_id: source_eosinophilia_review_2020
      paper_title: Approach to the patient with eosinophilia
      journal: Medical Clinics of North America
      year: 2020
  confirmatory_test_refs:
  - test_id: ct_repeat_cbc_with_absolute_eosinophils
    rationale: Repeating the CBC with confirmation of the absolute eosinophil count
      helps distinguish true eosinophilia from a relative differential change.
