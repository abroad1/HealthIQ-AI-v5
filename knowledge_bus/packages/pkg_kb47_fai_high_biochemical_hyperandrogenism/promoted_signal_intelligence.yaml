promoted_signal_intelligence_contract_version: 1.0.0
schema_version: 1.0.0
package_id: pkg_kb47_fai_high_biochemical_hyperandrogenism
translation:
  source: investigation_spec_v3
  investigation_spec_contract_version: 3.0.0
  investigation_spec_id: inv_fai_high_biochemical_hyperandrogenism
  signal_id: signal_fai_high
signals:
- signal_id: signal_fai_high
  research_domain: hormonal
  signal_system: hormonal
  primary_metric:
    biomarker_id: fai
    rationale: Free androgen index estimates androgen bioavailability from total testosterone
      and SHBG and can support biochemical hyperandrogenism when assay context is
      appropriate.
  trigger_direction: high
  activation:
    activation_logic: lab_range_exceeded
    activation_config:
      enable_upper_bound: true
      upper_bound_state: suboptimal
      enable_lower_bound: false
      lower_bound_state: suboptimal
  states:
    baseline_state: suboptimal
    escalation_state: at_risk
  supporting_markers:
  - biomarker_id: testosterone
    expected_direction: high
    role: corroborator
    relationship_kind: corroboration
    availability: common
    rationale: Raised total testosterone corroborates that the high FAI is tracking
      with a genuine hyperandrogenic biochemical pattern.
  - biomarker_id: dhea_s
    expected_direction: high
    role: differential_marker
    relationship_kind: differential
    availability: specialist
    rationale: DHEA-S helps distinguish adrenal-weighted hyperandrogenism from a low-SHBG-driven
      FAI rise without clear adrenal contribution.
  contradiction_markers:
  - contradiction_id: ctr_normal_reference_androgen_profile
    marker_reference: testosterone
    contradiction_rationale: A normal broader androgen profile weakens strong attribution
      of clinically meaningful androgen excess to an isolated FAI rise.
    contradiction_strength: moderate
  - contradiction_id: ctr_elevated_dhea_s_challenges_shbg_only_frame
    marker_reference: dhea_s
    contradiction_rationale: An elevated DHEA-S challenges a purely SHBG-mediated
      free androgen amplification interpretation by introducing a separate adrenal
      androgen production signal that suggests true biochemical androgen excess beyond
      binding-protein effects.
    contradiction_strength: moderate
  missing_data:
    policies:
    - Assess SHBG drivers and metabolic context before prioritising intrinsic androgen
      overproduction.
    - Review total testosterone assay quality, SHBG, and phenotype before inferring
      clinically significant androgen excess.
  confidence:
    evidence_strength: moderate
  override_rules:
  - rule_id: or_fai_high_with_testosterone_high
    resulting_state: at_risk
    description: Escalate when high FAI coincides with high total testosterone, as
      this more strongly supports true biochemical hyperandrogenism.
    conditions:
    - metric_id: testosterone
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_pcos_guideline_2023
  evidence:
    evidence_strength: moderate
    physiological_claim: FAI can support assessment of biochemical hyperandrogenism
      when calculated and interpreted appropriately alongside testosterone and SHBG.
    threshold_notes: Interpretation should remain assay-aware and lab-range anchored
      because calculation methods and SHBG variation materially affect meaning.
    sources:
    - source_id: source_pcos_guideline_2023
      paper_title: Recommendations from the 2023 International Evidence-based Guideline
        for the Assessment and Management of Polycystic Ovary Syndrome
      journal: European Journal of Endocrinology
      year: 2023
  confirmatory_test_refs:
  - test_id: ct_repeat_androgen_panel_with_shbg_and_dhea_s
    rationale: Repeat androgen testing with SHBG and DHEA-S helps determine whether
      high FAI reflects true hyperandrogenism, adrenal contribution, or primarily
      low-SHBG amplification.
