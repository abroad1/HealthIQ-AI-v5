library:
  package_id: KBP-4701
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S47 Fai High signal library
  description: Translated from inv_fai_high_biochemical_hyperandrogenism (Batch_2_Pass_3_Rev1.json).
signals:
- signal_id: signal_fai_high
  name: Fai High
  description: Free androgen index estimates androgen bioavailability from total testosterone
    and SHBG and can support biochemical hyperandrogenism when assay context is appropriate.
  system: hormonal
  primary_metric: fai
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: testosterone
    expected_direction: high
    role: corroborator
    availability: common
    rationale: Raised total testosterone corroborates that the high FAI is tracking
      with a genuine hyperandrogenic biochemical pattern.
  - biomarker_id: dhea
    expected_direction: high
    role: differential_marker
    availability: specialist
    rationale: DHEA-S helps distinguish adrenal-weighted hyperandrogenism from a low-SHBG-driven
      FAI rise without clear adrenal contribution.
  dependencies:
    biomarkers:
    - fai
    - testosterone
    - dhea
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: fai_high_lab_range_activation_placeholder
    metric_id: fai
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_fai_high_with_testosterone_high
    resulting_state: at_risk
    description: Escalate when high FAI coincides with high total testosterone, as
      this more strongly supports true biochemical hyperandrogenism.
    conditions:
    - metric_id: testosterone
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_pcos_guideline_2023
  output:
    signal_value: fai
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: fai
    supporting_markers:
    - testosterone
    - dhea
  explanation:
    mechanism: FAI increases when total testosterone rises, SHBG falls, or both occur
      together.
    biological_pathway: Androgen production, binding to SHBG, and calculated bioavailable
      androgen fraction.
    interpretation: A high FAI can support a biochemical androgen excess context but
      requires SHBG-aware and assay-aware interpretation before stronger conclusions
      are drawn.
    implications: The key distinction is between true androgen overproduction and
      low-SHBG amplification of calculated free androgen availability.
    supporting_marker_roles: Total testosterone corroborates hyperandrogenism, while
      DHEA-S is the differential marker that helps separate adrenal-weighted androgen
      excess from low-SHBG amplification.
