    - ldl_cholesterol
  explanation:
    mechanism: HDL falls in insulin-resistant and triglyceride-rich states where lipoprotein
      exchange and catabolism alter HDL concentration.
    biological_pathway: Reverse cholesterol transport, triglyceride-rich lipoprotein
      metabolism, and atherogenic particle interactions.
    interpretation: This pattern supports cardiometabolic dyslipidemia most strongly
      when other atherogenic markers are also unfavorable.
    implications: The next step is usually to determine whether low HDL reflects a
      broader apoB-rich phenotype rather than treating HDL alone as the primary problem.
    supporting_marker_roles: Triglycerides support the mechanism, apoB corroborates
      atherogenic burden, and LDL helps differentiate isolated low HDL from broader
      mixed dyslipidemia.
