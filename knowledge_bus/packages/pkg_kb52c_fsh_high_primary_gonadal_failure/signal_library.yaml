library:
  package_id: KBP-4747
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C Wave A — Fsh High Primary Gonadal Failure
  description: Ingested from inv_fsh_high_primary_gonadal_failure (Batch_3_Pass_3.json).
    KB-S52C Wave A resolver-clean tranche.
signals:
- signal_id: signal_fsh_high
  name: Fsh High Primary Gonadal Failure
  description: High FSH usually reflects reduced gonadal negative feedback and is
    most informative when interpreted with sex steroids and related gonadotropins.
  system: hormonal
  primary_metric: fsh
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: oestradiol
    expected_direction: low
    role: corroborator
    availability: common
    rationale: Low estradiol supports ovarian insufficiency when FSH is raised in
      an appropriate female reproductive context.
  - biomarker_id: lh
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: Concurrent LH elevation supports loss of gonadal negative feedback
      across the reproductive axis.
  - biomarker_id: prolactin
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: High prolactin would favor central suppression or mixed pituitary dysfunction
      rather than isolated primary gonadal failure.
  dependencies:
    biomarkers:
    - fsh
    - lh
    - oestradiol
    - prolactin
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_fsh_high_lab_range_activation_placeholder
    metric_id: fsh
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_fsh_high_with_estradiol_low
    resulting_state: at_risk
    description: Escalate when high FSH coincides with low estradiol, as this more
      strongly supports reduced ovarian feedback.
    conditions:
    - metric_id: oestradiol
      operator: <
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: below_min
    source_refs:
    - source_poi_guideline_2024
  output:
    signal_value: fsh
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: fsh
    supporting_markers:
    - oestradiol
    - lh
    - prolactin
  explanation:
    mechanism: FSH rises when gonadal peptide and sex-steroid feedback to the pituitary
      is reduced.
    biological_pathway: Hypothalamic-pituitary-gonadal axis feedback regulation involving
      gonadotropin secretion and gonadal steroidogenesis.
    interpretation: A raised FSH is generally a feedback-loss signal rather than a
      stand-alone diagnosis and becomes more informative when paired with estradiol,
      LH, and prolactin.
    implications: The main task is to distinguish primary gonadal failure from central
      or transient causes of cycle disturbance.
    supporting_marker_roles: Estradiol corroborates reduced ovarian output, LH supports
      axis-level loss of feedback, and prolactin helps distinguish primary gonadal
      failure from central suppression.
