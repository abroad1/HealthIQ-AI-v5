library:
  package_id: KBP-4775
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C Wave A — Plt Low Peripheral Consumption Or Immune Destruction
  description: Ingested from inv_plt_low_peripheral_consumption_or_immune_destruction
    (Batch_7_Pass_3.json). KB-S52C Wave A resolver-clean tranche.
signals:
- signal_id: signal_plt_low
  name: Plt Low Peripheral Consumption Or Immune Destruction
  description: Thrombocytopenia may reflect peripheral platelet destruction or consumption
    as well as reduced marrow production, and the distinction matters clinically.
  system: hematologic
  primary_metric: platelets
  trigger_direction: low
  supporting_metrics:
  - biomarker_id: hemoglobin
    expected_direction: low
    role: differential_marker
    availability: common
    rationale: Anaemia alongside thrombocytopenia raises concern for broader consumption,
      blood loss, or marrow processes rather than isolated platelet destruction.
  - biomarker_id: white_blood_cells
    expected_direction: any
    role: differential_marker
    availability: common
    rationale: A relatively isolated platelet reduction with preserved white cell
      count can fit immune thrombocytopenia better than global marrow suppression.
  - biomarker_id: bilirubin
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: Elevated bilirubin can support haemolytic or consumptive microangiopathic
      context when thrombocytopenia is not isolated.
  dependencies:
    biomarkers:
    - bilirubin
    - hemoglobin
    - platelets
    - white_blood_cells
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_plt_low_lab_range_activation_placeholder
    metric_id: platelets
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: false
    upper_bound_state: suboptimal
    enable_lower_bound: true
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_plt_low_with_low_hgb
    resulting_state: at_risk
    description: Escalate when thrombocytopenia is accompanied by anaemia, as combined
      cytopenia increases concern for consumption, bleeding, or marrow pathology rather
      than isolated platelet destruction.
    conditions:
    - metric_id: hemoglobin
      operator: <
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: below_min
    source_refs:
    - source_thrombocytopenia_review_2024
  output:
    signal_value: platelets
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: platelets
    supporting_markers:
    - hemoglobin
    - white_blood_cells
    - bilirubin
  explanation:
    mechanism: Platelet counts fall through immune destruction, peripheral consumption,
      sequestration, or reduced marrow production, with very different clinical implications.
    biological_pathway: Platelet survival, immune clearance, thrombotic consumption,
      marrow megakaryocyte output, and haemolysis-associated microvascular injury.
    interpretation: Low platelets may represent isolated peripheral destruction or
      a broader consumptive process, depending on whether anaemia and haemolytic context
      are present.
    implications: This finding may justify urgent review when thrombocytopenia is
      not isolated, especially if anaemia or haemolytic markers coexist.
    supporting_marker_roles: Haemoglobin helps distinguish isolated thrombocytopenia
      from broader pathology, white cell context helps identify isolated patterns,
      and bilirubin supports possible haemolytic or consumptive mechanisms.
