library:
  package_id: KBP-4821
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S59 Thyroid Abs — Tgab High Euthyroid Autoimmune Risk
  description: Ingested from inv_tgab_high_euthyroid_autoimmune_risk (thyroid_antibodies_pass_3.json).
    KB-S59 thyroid antibody tranche.
signals:
- signal_id: signal_tgab_high
  name: Tgab High Euthyroid Autoimmune Risk
  description: TgAb is a marker of thyroid autoimmunity that is usually interpreted as supportive
    context, especially when current thyroid function is still preserved.
  system: endocrine
  primary_metric: tgab
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: tpo_ab
    expected_direction: high
    role: corroborator
    availability: common
    rationale: Concurrent TPO antibody positivity makes an autoimmune thyroid interpretation
      more secure when current thyroid function remains preserved.
  - biomarker_id: tsh
    expected_direction: any
    role: differential_marker
    availability: common
    rationale: TSH distinguishes preserved-function thyroid autoimmunity from already active
      biochemical hypothyroidism.
  - biomarker_id: free_t4
    expected_direction: any
    role: differential_marker
    availability: common
    rationale: Free T4 separates euthyroid autoimmune context from overt thyroid hormone deficiency
      or excess.
  dependencies:
    biomarkers:
    - free_t4
    - tgab
    - tpo_ab
    - tsh
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_tgab_high_lab_range_activation_placeholder
    metric_id: tgab
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_tgab_high_with_tpo_ab_and_preserved_function
    resulting_state: at_risk
    description: Escalate when high TgAb coexists with high TPO antibodies while TSH is not
      above the reference range and free T4 is not below the reference range, because this
      supports broader thyroid autoimmunity despite preserved current thyroid output.
    conditions:
    - metric_id: tpo_ab
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    - metric_id: tsh
      operator: <=
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: not_above_max
    - metric_id: free_t4
      operator: '>='
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: not_below_min
    source_refs:
    - source_tgab_review
    - source_tgab_ata_context
  output:
    signal_value: tgab
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: tgab
    supporting_markers:
    - tpo_ab
    - tsh
    - free_t4
  explanation:
    mechanism: TgAb elevation indicates immune recognition of thyroglobulin and can appear
      before overt changes in thyroid hormone production, but isolated positivity is less
      specific than TPOAb.
    biological_pathway: Early thyroid autoimmunity with preserved glandular reserve, potential
      progression to gland dysfunction over time, and stronger autoimmune inference when dual-antibody
      positivity is present.
    interpretation: High TgAb with normal current thyroid function is best interpreted as
      supportive autoimmune context rather than proof of active disease, especially if TPO
      antibodies are not also elevated.
    implications: This pattern may justify monitoring and corroboration rather than immediate
      disease labelling, with particular caution against over-interpreting isolated TgAb positivity.
    supporting_marker_roles: TPOAb provides corroborating autoimmune support, while TSH and
      free T4 are differential markers that separate preserved-function autoimmune context
      from already established thyroid dysfunction.
