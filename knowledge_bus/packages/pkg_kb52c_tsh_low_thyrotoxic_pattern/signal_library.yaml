  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C Wave A — Tsh Low Thyrotoxic Pattern
  description: Ingested from inv_tsh_low_thyrotoxic_pattern (Batch_4_Pass_3.json).
    KB-S52C Wave A resolver-clean tranche.
signals:
- signal_id: signal_tsh_low
  name: Tsh Low Thyrotoxic Pattern
  description: Low or suppressed TSH is a key biochemical marker of thyrotoxic physiology
    when interpreted with circulating thyroid hormones.
  system: hormonal
  primary_metric: tsh
  trigger_direction: low
  supporting_metrics:
  - biomarker_id: free_t4
    expected_direction: high
    role: corroborator
    availability: common
    rationale: High free T4 corroborates biologically significant thyrotoxic hormone
      excess.
  - biomarker_id: free_t3
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: High free T3 can support T3-predominant or broader thyrotoxic physiology.
  - biomarker_id: crp
    expected_direction: high
    role: differential_marker
    availability: optional
    rationale: Inflammatory markers can help raise alternate thyroiditis or inflammatory
      contexts when TSH is low.
  dependencies:
    biomarkers:
    - crp
    - free_t3
    - free_t4
    - tsh
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_tsh_low_lab_range_activation_placeholder
    metric_id: tsh
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: false
    upper_bound_state: suboptimal
    enable_lower_bound: true
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_tsh_low_with_free_t4_high
    resulting_state: at_risk
    description: Escalate when low TSH coincides with high free T4, as this more strongly
      supports overt thyrotoxic physiology.
    conditions:
    - metric_id: free_t4
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_ata_hyperthyroidism_2016
  output:
    signal_value: tsh
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: tsh
    supporting_markers:
    - free_t4
    - free_t3
    - crp
  explanation:
    mechanism: Pituitary TSH secretion is suppressed when circulating thyroid hormone
      signaling is excessive for physiologic demand.
    biological_pathway: Hypothalamic-pituitary-thyroid feedback suppression in overt,
      subclinical, or inflammatory thyroid hormone excess states.
    interpretation: This is a pattern-level thyroid abnormality whose significance
      depends on free hormone results and clinical context.
    implications: The next step is usually to classify the pattern as overt or subclinical
      and then investigate cause.
    supporting_marker_roles: Free T4 corroborates overt hormone excess, free T3 supports
      T3-predominant physiology, and CRP can help differentiate inflammatory thyroid
      contexts.
