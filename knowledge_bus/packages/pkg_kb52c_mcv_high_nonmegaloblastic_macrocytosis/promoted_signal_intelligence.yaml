promoted_signal_intelligence_contract_version: 1.0.0
schema_version: 1.0.0
package_id: pkg_kb52c_mcv_high_nonmegaloblastic_macrocytosis
translation:
  source: investigation_spec_v3_pass3_p1_11_batch_b
  investigation_spec_contract_version: 3.0.0
  investigation_spec_id: inv_mcv_high_nonmegaloblastic_macrocytosis
  signal_id: signal_mcv_high
  compiler_version: p1_11_batch_b_pass3_psi_compiler_v1.0.0
  work_id: P1-11
  cluster_id: mcv_morphology
signals:
- signal_id: signal_mcv_high
  research_domain: hematologic
  signal_system: hematologic
  primary_metric:
    biomarker_id: mcv
    rationale: High MCV can occur in non-megaloblastic states and should not automatically be equated with folate or B12 deficiency.
  trigger_direction: high
  activation:
    activation_logic: lab_range_exceeded
    activation_config:
      enable_upper_bound: true
      upper_bound_state: suboptimal
      enable_lower_bound: false
      lower_bound_state: suboptimal
  states:
    baseline_state: suboptimal
    escalation_state: at_risk
  supporting_markers:
  - biomarker_id: ggt
    expected_direction: high
    role: differential_marker
    relationship_kind: differential
    availability: common
    rationale: High GGT supports alcohol-related or hepatic macrocytosis as an alternative to megaloblastic deficiency.
  - biomarker_id: alt
    expected_direction: high
    role: corroborator
    relationship_kind: corroboration
    availability: common
    rationale: Elevated ALT can support concurrent hepatocellular injury or steatotic liver context.
  - biomarker_id: folate
    expected_direction: low
    role: differential_marker
    relationship_kind: differential
    availability: common
    rationale: Low folate supports a competing megaloblastic explanation and weakens a purely non-megaloblastic interpretation.
  contradiction_markers:
  - contradiction_id: ctr_low_folate_mcv_nonmeg
    marker_reference: folate
    contradiction_rationale: Low folate weakens a purely non-megaloblastic interpretation and raises a megaloblastic contribution.
    contradiction_strength: strong
  - contradiction_id: ctr_high_ggt_specificity
    marker_reference: ggt
    contradiction_rationale: A high GGT supports hepatic or alcohol-related context and weakens the need to prioritise other
      non-megaloblastic causes first.
    contradiction_strength: weak
  missing_data:
    policies:
    - If liver and hematinic markers are not explanatory, broaden the differential rather than forcing an alcohol-related
      interpretation.
    - Review liver enzymes, alcohol exposure, and hematinic markers before assigning a non-megaloblastic explanation.
  confidence:
    evidence_strength: strong
  override_rules:
  - rule_id: or_mcv_high_with_high_ggt
    resulting_state: at_risk
    description: Escalate when MCV is high and GGT is also high because the combination supports a persistent non-megaloblastic
      hepatic or alcohol-related context.
    conditions:
    - metric_id: ggt
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_macrocytosis_review
  evidence:
    evidence_strength: strong
    physiological_claim: High MCV with liver-enzyme or alcohol-related context may reflect non-megaloblastic macrocytosis
      rather than hematinic deficiency.
    threshold_notes: The trigger remains the laboratory abnormality rather than a disease-specific numeric threshold.
    sources:
    - source_id: source_macrocytosis_review
      paper_title: Macrocytosis evaluation and megaloblastic versus non-megaloblastic causes
      journal: Hematology review literature
      year: 2025
  confirmatory_test_refs:
  - test_id: ct_liver_panel_review
    rationale: Liver-pattern review helps clarify whether macrocytosis sits within a hepatic or alcohol-related context.
  - test_id: ct_b12_and_folate_panel
    rationale: Hematinic testing helps exclude a megaloblastic cause before non-megaloblastic frames are prioritised.
