  explanation:
    mechanism: Lipoprotein(a) contributes to atherogenic and prothrombotic vascular
      biology through an apoB-containing particle carrying apolipoprotein(a).
    biological_pathway: Atherogenic lipoprotein trafficking, arterial retention, inflammation,
      and thrombosis-related signaling.
    interpretation: A high Lp(a) value is primarily a long-term inherited risk signal
      rather than a marker of short-term disease activity.
    implications: The practical question is how strongly the result should influence
      broader cardiovascular risk management.
    supporting_marker_roles: LDL cholesterol and apoB contextualize combined atherogenic
