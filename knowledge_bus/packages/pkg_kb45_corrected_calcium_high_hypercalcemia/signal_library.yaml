library:
  package_id: KBP-2508
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S45d Corrected Calcium Investigation Signal Library
  description: 'Regenerated from investigation-spec-collection-batch1-10.json. KB-S45d regenerated package: corrected calcium
    high / hypercalcemia (inv_corrected_calcium_high, batch-1).'
signals:
- signal_id: signal_hypercalcemia
  name: Hypercalcemia (corrected calcium)
  description: 'Albumin-corrected calcium highlights physiologic calcium exposure; elevation warrants evaluation for parathyroid,
    vitamin D, and malignancy-related mechanisms.

    '
  system: metabolic
  primary_metric: corrected_calcium
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: vitamin_d
    expected_direction: high
    role: mechanism_marker
    availability: optional
    rationale: High Vitamin D can support a vitamin D-mediated hypercalcemia mechanism.
  - biomarker_id: creatinine
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: High creatinine provides renal-context risk when corrected calcium is elevated.
  dependencies:
    biomarkers:
    - corrected_calcium
    - vitamin_d
    - creatinine
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_corrected_calcium_lab_range_activation_placeholder
    metric_id: corrected_calcium
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_hyperparathyroid_confirm
    description: Escalate if corrected calcium is high alongside vitamin D above the laboratory upper bound.
    conditions:
    - metric_id: vitamin_d
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    resulting_state: at_risk
    source_refs:
    - source_bilezikian_2022
  output:
    signal_value: corrected_calcium
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: corrected_calcium
    supporting_markers:
    - vitamin_d
    - creatinine
  explanation:
    mechanism: 'Parathyroid hormone and vitamin D tightly regulate calcium flux between bone, kidney, and intestine.

      '
    biological_pathway: 'Vitamin D availability shifts intestinal calcium absorption and interacts with PTH-driven bone resorption.

      '
    interpretation: 'Elevated corrected calcium with high vitamin D suggests vitamin-D-mediated hypercalcemia as one plausible
      mechanism among several.

      '
    implications: 'Renal function contextualizes nephrocalcinuria risk when calcium is sustained above the reference interval.

      '
    supporting_marker_roles: 'Creatinine adds renal excretion context for calcium and vitamin D handling.

      '
