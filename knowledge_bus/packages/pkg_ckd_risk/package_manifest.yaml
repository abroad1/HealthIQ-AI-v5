description: >
  KBP-0006 — CKD Risk Detection (signal_ckd_risk).
  Creation package: defines signal_ckd_risk using the standard renal function panel
  (uACR, eGFR, urea, creatinine). Thresholds anchored to KDIGO 2024 clinical practice
  guidelines. uACR is the primary metric; eGFR enters as override rules.
  urea_creatinine_ratio overrides distinguish pre-renal, intrinsic renal, GI bleed,
  and liver disease patterns. All threshold values are in confirmed SSOT canonical units.
