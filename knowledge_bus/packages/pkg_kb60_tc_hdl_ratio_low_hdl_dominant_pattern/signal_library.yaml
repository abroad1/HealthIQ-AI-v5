library:
  package_id: KBP-4826
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S60 Lipid / Derived — Tc Hdl Ratio Low Hdl Dominant Pattern
  description: Ingested from inv_tc_hdl_ratio_low_hdl_dominant_pattern (lipid_derived_pass_3.json).
    KB-S60 lipid / derived tranche.
signals:
- signal_id: signal_tc_hdl_ratio_low
  name: Tc Hdl Ratio Low Hdl Dominant Pattern
  description: A low total cholesterol:HDL ratio generally suggests a more favorable cholesterol
    distribution, although it should be interpreted in context rather than as a stand-alone
    protective marker.
  system: lipid_transport
  primary_metric: tc_hdl_ratio
  trigger_direction: low
  supporting_metrics:
  - biomarker_id: total_cholesterol
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: High total cholesterol with a low ratio identifies a discordant HDL-rich profile
      and helps separate it from genuinely low overall cholesterol burden.
  - biomarker_id: ldl_cholesterol
    expected_direction: low
    role: corroborator
    availability: common
    rationale: Low LDL cholesterol supports that a low ratio sits within a broadly less atherogenic
      lipid pattern rather than reflecting HDL-rich discordance with preserved apoB burden.
  dependencies:
    biomarkers:
    - ldl_cholesterol
    - tc_hdl_ratio
    - total_cholesterol
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_tc_hdl_ratio_low_lab_range_activation_placeholder
    metric_id: tc_hdl_ratio
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: false
    upper_bound_state: suboptimal
    enable_lower_bound: true
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_tc_hdl_ratio_low_with_high_total_cholesterol
    resulting_state: at_risk
    description: Escalate for structured review when TC:HDL ratio is low but total cholesterol
      is high, because this discordant pattern needs fuller lipid interpretation rather than
      simple reassurance.
    conditions:
    - metric_id: total_cholesterol
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_tc_hdl_womens_followup_2021
    - source_tc_hdl_aric_2019
  output:
    signal_value: tc_hdl_ratio
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: tc_hdl_ratio
    supporting_markers:
    - total_cholesterol
    - ldl_cholesterol
  explanation:
    mechanism: The ratio falls when HDL contributes proportionally more to the cholesterol
      pool or when total atherogenic cholesterol burden is relatively lower.
    biological_pathway: Reverse cholesterol transport, lipoprotein balance, and discordance
      between total cholesterol concentration and atherogenic particle burden.
    interpretation: A low ratio can be helpful for refining risk interpretation, particularly
      when total cholesterol appears high but the lipid distribution is less unfavorable than
      expected.
    implications: This pattern may justify fuller lipid-context review rather than immediate
      treatment decisions based on ratio alone.
    supporting_marker_roles: High total cholesterol acts as a differential marker by identifying
      HDL-rich discordance, while low LDL cholesterol corroborates that the low ratio may
      sit within a broadly less atherogenic pattern.
