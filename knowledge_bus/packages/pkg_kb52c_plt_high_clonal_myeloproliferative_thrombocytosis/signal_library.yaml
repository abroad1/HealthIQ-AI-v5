library:
  package_id: KBP-4772
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C Wave A — Plt High Clonal Myeloproliferative Thrombocytosis
  description: Ingested from inv_plt_high_clonal_myeloproliferative_thrombocytosis
    (Batch_7_Pass_3.json). KB-S52C Wave A resolver-clean tranche.
signals:
- signal_id: signal_plt_high
  name: Plt High Clonal Myeloproliferative Thrombocytosis
  description: Persistent marked thrombocytosis can also reflect a clonal myeloproliferative
    process rather than a reactive platelet response.
  system: hematologic
  primary_metric: platelets
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: crp
    expected_direction: any
    role: differential_marker
    availability: common
    rationale: Absent inflammatory corroboration weakens a reactive explanation and
      can make clonal thrombocytosis relatively more plausible.
  - biomarker_id: ferritin
    expected_direction: any
    role: differential_marker
    availability: common
    rationale: A ferritin result that does not support iron deficiency weakens a common
      reactive cause of thrombocytosis.
  - biomarker_id: white_blood_cells
    expected_direction: high
    role: corroborator
    availability: common
    rationale: Concurrent leukocytosis can accompany myeloproliferative patterns,
      although it is not specific.
  dependencies:
    biomarkers:
    - crp
    - ferritin
    - platelets
    - white_blood_cells
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_plt_high_lab_range_activation_placeholder
    metric_id: platelets
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_plt_high_with_high_wbc
    resulting_state: at_risk
    description: Escalate when thrombocytosis is accompanied by leukocytosis, as combined
      myeloid elevation increases concern for a clonal hematologic process.
    conditions:
    - metric_id: white_blood_cells
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_mpn_thrombocytosis_review_2024
  output:
    signal_value: platelets
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: platelets
    supporting_markers:
    - crp
    - ferritin
    - white_blood_cells
  explanation:
    mechanism: Clonal thrombocytosis reflects dysregulated megakaryocyte proliferation
      rather than reactive thrombopoietin signalling alone.
    biological_pathway: Myeloproliferative hematopoiesis, megakaryocytic expansion,
      and possible parallel myeloid lineage activation.
    interpretation: A clonal frame becomes more plausible when inflammatory and iron-deficiency
      explanations are not supported and thrombocytosis persists.
    implications: This pattern may justify hematology-directed evaluation rather than
      repeated assumption of benign reactivity.
    supporting_marker_roles: CRP and ferritin help exclude common reactive causes,
      while WBC provides corroborating evidence for a broader myeloid proliferation
      pattern.
