physiological_claim: CRP is synthesized by hepatocytes under the influence of cytokines.
  Its short half-life (~19h) makes it a dynamic marker of the inflammatory state.
evidence_strength: strong
research_summary: A value of >100 mg/L is a common clinical threshold for significant
  bacterial infection or major systemic illness.
