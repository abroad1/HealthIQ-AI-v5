library:
  package_id: KBP-4730
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C Wave A — Apob High Atherogenic Particle Excess
  description: Ingested from inv_apob_high_atherogenic_particle_excess (Batch_5_Pass_3.json).
    KB-S52C Wave A resolver-clean tranche.
signals:
- signal_id: signal_apob_high
  name: Apob High Atherogenic Particle Excess
  description: High apolipoprotein B reflects increased concentration of atherogenic
    lipoprotein particles and is a direct marker of particle-number burden.
  system: lipid_transport
  primary_metric: apob
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: non_hdl_cholesterol
    expected_direction: high
    role: corroborator
    availability: common
    rationale: Raised non-HDL cholesterol commonly accompanies high apoB and supports
      increased atherogenic particle burden.
  - biomarker_id: triglycerides
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: Hypertriglyceridaemia can indicate triglyceride-rich remnant or VLDL
      particle excess contributing to elevated apoB.
  - biomarker_id: ldl_cholesterol
    expected_direction: any
    role: differential_marker
    availability: common
    rationale: A normal LDL-C does not exclude high apoB and helps distinguish particle-number
      excess from cholesterol-mass interpretation alone.
  dependencies:
    biomarkers:
    - apob
    - ldl_cholesterol
    - non_hdl_cholesterol
    - triglycerides
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_apob_high_lab_range_activation_placeholder
    metric_id: apob
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_apob_high_with_broad_atherogenic_pattern
    resulting_state: at_risk
    description: Escalate when apoB is high with corroborating atherogenic lipid abnormalities,
      indicating increased particle burden.
    conditions:
    - metric_id: non_hdl_cholesterol
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_apob_bridge
    - source_esc_2021
  output:
    signal_value: apob
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: apob
    supporting_markers:
    - non_hdl_cholesterol
    - triglycerides
    - ldl_cholesterol
  explanation:
    mechanism: Each atherogenic apoB-containing particle contributes one apoB molecule,
      making apoB a direct proxy for particle concentration.
    biological_pathway: Excess LDL, VLDL, IDL, and remnant particles increase arterial
      wall exposure to apoB-containing lipoproteins and promote atherogenesis.
    interpretation: High apoB indicates increased atherogenic particle burden even
      when conventional cholesterol measures understate risk.
    implications: This pattern may justify closer lipid-risk assessment and clarification
      of whether the excess is LDL-dominant, remnant-rich, or mixed.
    supporting_marker_roles: Non-HDL cholesterol corroborates total atherogenic burden,
      triglycerides support remnant-related mechanism, and LDL-C helps differentiate
      particle-number discordance from cholesterol-mass elevation.
