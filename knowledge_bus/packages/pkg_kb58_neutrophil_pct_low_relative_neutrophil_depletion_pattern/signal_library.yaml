library:
  package_id: KBP-4813
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S58 CBC — Neutrophil Pct Low Relative Neutrophil Depletion Pattern
  description: Ingested from inv_neutrophil_pct_low_relative_neutrophil_depletion_pattern
    (cbc_hematology_pass_3.json). KB-S58 CBC tranche.
signals:
- signal_id: signal_neutrophil_pct_low
  name: Neutrophil Pct Low Relative Neutrophil Depletion Pattern
  description: Low neutrophil percentage may represent either relative neutrophil depletion
    within the differential or true neutropenia, which requires absolute-count confirmation.
  system: hematologic
  primary_metric: neutrophil_pct
  trigger_direction: low
  supporting_metrics:
  - biomarker_id: monocyte_pct
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: Higher monocyte percentage supports a competing leukocyte pattern rather than
      isolated severe neutrophil-lineage loss.
  - biomarker_id: monocytes_abs
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: Absolute monocytosis can help explain a relative reduction in neutrophil percentage
      within the differential.
  - biomarker_id: rbc
    expected_direction: low
    role: corroborator
    availability: common
    rationale: Concurrent anemia can support a broader marrow or systemic illness context
      when low neutrophil percentage is genuine.
  dependencies:
    biomarkers:
    - monocyte_pct
    - monocytes_abs
    - neutrophil_pct
    - rbc
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_neutrophil_pct_low_lab_range_activation_placeholder
    metric_id: neutrophil_pct
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: false
    upper_bound_state: suboptimal
    enable_lower_bound: true
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_neutrophil_pct_low_with_high_monocyte_pct
    resulting_state: at_risk
    description: Escalate when neutrophil percentage is low and monocyte percentage is high,
      because that combination supports a substantial differential redistribution rather than
      a trivial isolated percentage change.
    conditions:
    - metric_id: monocyte_pct
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_neutropenia_review_2013
    - source_cbc_sepsis_review_2021
  output:
    signal_value: neutrophil_pct
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: neutrophil_pct
    supporting_markers:
    - monocyte_pct
    - monocytes_abs
    - rbc
  explanation:
    mechanism: Neutrophil percentage falls either because neutrophil numbers decrease or because
      another leukocyte fraction expands enough to dilute their representation.
    biological_pathway: Granulocyte production, immune-mediated depletion, and leukocyte differential
      redistribution pathways.
    interpretation: A low neutrophil percentage result should be interpreted cautiously until
      absolute counting distinguishes relative redistribution from true neutropenia.
    implications: This pattern may justify absolute-count confirmation, medication review,
      and evaluation for viral, autoimmune, or marrow-related contexts if true neutropenia
      is present.
    supporting_marker_roles: High monocyte_pct and high monocytes_abs support a competing
      differential pattern, while low RBC can suggest a broader marrow or systemic illness
      context.
