physiological_claim: Ferritin reflects total body iron stores. Depletion (low ferritin)
  precedes changes in red cell morphology and hemoglobin concentration.
evidence_strength: consensus
research_summary: A threshold of <15 ug/L is used for escalation as it is the WHO-defined
  cutoff for exhausted iron stores in adults.
