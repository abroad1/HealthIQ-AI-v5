library:
  package_id: KBP-4798
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S58 CBC — Mchc Low Hypochromic Iron Restriction
  description: Ingested from inv_mchc_low_hypochromic_iron_restriction (cbc_hematology_pass_3.json).
    KB-S58 CBC tranche.
signals:
- signal_id: signal_mchc_low
  name: Mchc Low Hypochromic Iron Restriction
  description: Low MCHC reflects reduced hemoglobin concentration within erythrocytes and
    is a classic hypochromic red-cell index.
  system: hematologic
  primary_metric: mchc
  trigger_direction: low
  supporting_metrics:
  - biomarker_id: mch
    expected_direction: low
    role: mechanism_marker
    availability: common
    rationale: Low MCH alongside low MCHC supports reduced hemoglobinization at both cell-content
      and concentration levels.
  - biomarker_id: rdw_cv
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: Higher RDW-CV favors iron deficiency or evolving combined deficiency over a
      more uniform carrier-state microcytosis.
  - biomarker_id: rbc
    expected_direction: low
    role: corroborator
    availability: common
    rationale: A low RBC count supports anemia from iron-restricted erythropoiesis rather
      than compensated microcytosis.
  dependencies:
    biomarkers:
    - mch
    - mchc
    - rbc
    - rdw_cv
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_mchc_low_lab_range_activation_placeholder
    metric_id: mchc
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: false
    upper_bound_state: suboptimal
    enable_lower_bound: true
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_mchc_low_with_low_mch_and_high_rdw
    resulting_state: at_risk
    description: Escalate when low MCHC coexists with low MCH and high RDW-CV, because this
      combination strengthens a clinically relevant hypochromic iron-restricted pattern.
    conditions:
    - metric_id: mch
      operator: <
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: below_min
    - metric_id: rdw_cv
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_rbc_indices_ida_vs_thal_2024
    - source_ida_vs_thal_review_2023
  output:
    signal_value: mchc
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: mchc
    supporting_markers:
    - mch
    - rdw_cv
    - rbc
  explanation:
    mechanism: MCHC decreases when erythrocytes carry a lower concentration of hemoglobin,
      usually because hemoglobin synthesis or iron availability is impaired during maturation.
    biological_pathway: Red-cell hemoglobinization, iron handling, and microcytic erythropoiesis.
    interpretation: Low MCHC supports hypochromia but does not distinguish absolute iron deficiency
      from other causes of iron-restricted red-cell production by itself.
    implications: This pattern commonly prompts iron assessment and evaluation for blood loss,
      malabsorption, or inflammatory iron sequestration.
    supporting_marker_roles: Low MCH reinforces reduced cell hemoglobinization, high RDW-CV
      helps separate iron deficiency from uniform carrier states, and low RBC count supports
      true anemia.
