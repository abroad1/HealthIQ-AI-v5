library:
  package_id: KBP-4705
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S47 Egfr Low signal library
  description: Translated from inv_egfr_low_hemodynamic_filtration_drop (Batch_2_Pass_3_Rev1.json).
signals:
- signal_id: signal_egfr_low
  name: Egfr Low
  description: Low eGFR can reflect acute or hemodynamic reduction in filtration as
    well as chronic kidney disease, so trajectory matters.
  system: renal
  primary_metric: egfr
  trigger_direction: low
  supporting_metrics:
  - biomarker_id: creatinine
    expected_direction: high
    role: corroborator
    availability: common
    rationale: Creatinine rise supports a real change in kidney filtration estimate
      rather than random variation.
  - biomarker_id: cystatin_c
    expected_direction: high
    role: differential_marker
    availability: specialist
    rationale: Cystatin C can help assess whether a creatinine-based eGFR reduction
      is biologically corroborated.
  dependencies:
    biomarkers:
    - egfr
    - creatinine
    - cystatin_c
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: egfr_low_lab_range_activation_placeholder
    metric_id: egfr
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    upper_bound_state: suboptimal
    enable_upper_bound: false
    enable_lower_bound: true
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_egfr_low_with_cystatin_c_high
    resulting_state: at_risk
    description: Escalate when low eGFR coincides with high cystatin C, as this provides
      independent support for a true reduction in kidney filtration.
    conditions:
    - metric_id: cystatin_c
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_kdigo_ckd_2024
  output:
    signal_value: egfr
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: egfr
    supporting_markers:
    - creatinine
    - cystatin_c
  explanation:
    mechanism: eGFR falls when effective filtration drops, whether from structural
      disease or acute hemodynamic stress.
    biological_pathway: Dynamic regulation of glomerular perfusion and filtration.
    interpretation: A low eGFR does not automatically imply fixed chronic kidney damage
      and should be read against recent trajectory and albuminuria context.
    implications: Repeat testing and clarification of recent illness or nephrotoxic
      exposure are often needed before settling on a chronic disease interpretation.
    supporting_marker_roles: Creatinine corroborates the filtration estimate, while
      cystatin C can help distinguish a true reduction from creatinine-related distortion.
