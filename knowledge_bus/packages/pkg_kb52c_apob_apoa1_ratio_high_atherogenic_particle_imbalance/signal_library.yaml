library:
  package_id: KBP-4728
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C Wave A — Apob Apoa1 Ratio High Atherogenic Particle Imbalance
  description: Ingested from inv_apob_apoa1_ratio_high_atherogenic_particle_imbalance
    (Batch_5_Pass_3.json). KB-S52C Wave A resolver-clean tranche.
signals:
- signal_id: signal_apob_apoa1_ratio_high
  name: Apob Apoa1 Ratio High Atherogenic Particle Imbalance
  description: A high apoB to apoA1 ratio reflects imbalance between atherogenic particle
    burden and protective HDL-associated apoprotein capacity.
  system: lipid_transport
  primary_metric: apob_apoa1_ratio
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: apob
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: High apoB increases the numerator of the ratio and supports atherogenic
      particle excess.
  - biomarker_id: apoa1
    expected_direction: low
    role: mechanism_marker
    availability: common
    rationale: Low apoA1 reduces the denominator of the ratio and supports reduced
      protective lipoprotein balance.
  - biomarker_id: ldl_cholesterol
    expected_direction: any
    role: differential_marker
    availability: common
    rationale: A normal LDL-C can help show that the ratio is identifying particle
      imbalance not fully captured by conventional cholesterol measures.
  dependencies:
    biomarkers:
    - apoa1
    - apob
    - apob_apoa1_ratio
    - ldl_cholesterol
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_apob_apoa1_ratio_high_lab_range_activation_placeholder
    metric_id: apob_apoa1_ratio
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_ratio_high_with_component_support
    resulting_state: at_risk
    description: Escalate when the apoB/apoA1 ratio is high with concordant component
      abnormalities indicating true atherogenic imbalance.
    conditions:
    - metric_id: apob
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_apob_ratio_longterm
    - source_2016_esc
  output:
    signal_value: apob_apoa1_ratio
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: apob_apoa1_ratio
    supporting_markers:
    - apob
    - apoa1
    - ldl_cholesterol
  explanation:
    mechanism: The ratio rises when apoB-containing particle burden increases, apoA1-related
      protective capacity falls, or both occur together.
    biological_pathway: Atherogenic particle exposure and reduced HDL-associated transport
      capacity jointly influence arterial lipid balance and long-term vascular risk.
    interpretation: A high ratio supports an unfavorable lipoprotein balance, especially
      when component measures confirm that the signal is biologically coherent.
    implications: This pattern may justify more careful risk interpretation when conventional
      LDL-C alone seems discordant with overall lipoprotein burden.
    supporting_marker_roles: ApoB and apoA1 provide direct mechanistic explanation
      of the ratio, while LDL-C helps differentiate particle-risk discordance from
      obvious cholesterol-mass elevation.
