library:
  package_id: KBP-4754
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C Wave A — Hdl Low Hypertriglyceridemic Insulin Resistance Pattern
  description: Ingested from inv_hdl_low_hypertriglyceridemic_insulin_resistance_pattern
    (Batch_4_Pass_3.json). KB-S52C Wave A resolver-clean tranche.
signals:
- signal_id: signal_hdl_low
  name: Hdl Low Hypertriglyceridemic Insulin Resistance Pattern
  description: Low HDL frequently appears within insulin-resistant metabolic patterns,
    particularly when paired with hypertriglyceridemia and adverse glycemia.
  system: metabolic
  primary_metric: hdl_cholesterol
  trigger_direction: low
  supporting_metrics:
  - biomarker_id: triglycerides
    expected_direction: high
    role: corroborator
    availability: common
    rationale: High triglycerides can corroborate an insulin-resistant low-HDL pattern
      when the broader metabolic context is consistent.
  - biomarker_id: hba1c_pct
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: Higher HbA1c can support impaired glycemic regulation within a low-HDL
      metabolic phenotype.
  - biomarker_id: ldl_cholesterol
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: LDL helps distinguish a mixed hyperlipidemic state from a more classic
      hypertriglyceridemic insulin-resistant low-HDL phenotype.
  dependencies:
    biomarkers:
    - hba1c_pct
    - hdl_cholesterol
    - ldl_cholesterol
    - triglycerides
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_hdl_low_lab_range_activation_placeholder
    metric_id: hdl_cholesterol
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: false
    upper_bound_state: suboptimal
    enable_lower_bound: true
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_hdl_low_with_hba1c_high
    resulting_state: at_risk
    description: Escalate when low HDL coincides with high HbA1c, as this more strongly
      supports a cardiometabolic low-HDL pattern with impaired glycemic context.
    conditions:
    - metric_id: hba1c_pct
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_esc_dyslipidaemia_2019
  output:
    signal_value: hdl_cholesterol
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: hdl_cholesterol
    supporting_markers:
    - triglycerides
    - hba1c_pct
    - ldl_cholesterol
  explanation:
    mechanism: Insulin resistance alters triglyceride-rich lipoprotein handling and
      HDL remodeling, often reducing circulating HDL concentration.
    biological_pathway: Triglyceride-rich lipoprotein exchange, hepatic lipase activity,
      HDL catabolism, and metabolic syndrome physiology.
    interpretation: This is a pattern-level metabolic interpretation that gains credibility
      when glycemia and triglycerides are concordantly abnormal.
    implications: Further interpretation should focus on whether the low HDL is part
      of a broader insulin-resistant phenotype rather than an isolated lipid finding.
    supporting_marker_roles: Triglycerides corroborate the pattern, HbA1c supports
      metabolic mechanism, and LDL helps differentiate mixed hyperlipidemia from classic
      low-HDL hypertriglyceridemia.
