library:
  package_id: KBP-4758
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C Wave A — Homocysteine High Renal Clearance Reduction
  description: Ingested from inv_homocysteine_high_renal_clearance_reduction (Batch_6_Pass_3.json).
    KB-S52C Wave A resolver-clean tranche.
signals:
- signal_id: signal_homocysteine_high
  name: Homocysteine High Renal Clearance Reduction
  description: Homocysteine is partly cleared by the kidney, so elevation can reflect
    renal impairment even without a primary hematinic defect.
  system: renal
  primary_metric: homocysteine
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: creatinine
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: Impaired renal function supports reduced homocysteine clearance as
      a contributor to elevation.
  - biomarker_id: folate
    expected_direction: low
    role: differential_marker
    availability: common
    rationale: Low folate supports a competing or combined nutritional explanation
      rather than pure renal accumulation.
  - biomarker_id: active_b12
    expected_direction: low
    role: corroborator
    availability: common
    rationale: Low active B12 suggests overlapping methylation impairment that may
      coexist with renal causes.
  dependencies:
    biomarkers:
    - active_b12
    - creatinine
    - folate
    - homocysteine
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_homocysteine_high_lab_range_activation_placeholder
    metric_id: homocysteine
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_homocysteine_high_with_high_creatinine
    resulting_state: at_risk
    description: Escalate when homocysteine is high and creatinine is high because
      the combination supports a clinically relevant renal contribution to the elevation.
    conditions:
    - metric_id: creatinine
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_homocysteine_renal_review
  output:
    signal_value: homocysteine
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: homocysteine
    supporting_markers:
    - creatinine
    - folate
    - active_b12
  explanation:
    mechanism: Homocysteine accumulates when renal filtration and metabolic handling
      are reduced.
    biological_pathway: Creatinine helps distinguish renal accumulation from a primarily
      folate- or B12-driven methylation defect.
    interpretation: High homocysteine in renal impairment is a contextual biochemical
      consequence and should not be over-interpreted as a vitamin deficiency by default.
    implications: This pattern may justify renal interpretation before assuming primary
      nutritional deficiency.
    supporting_marker_roles: Creatinine is the key mechanism marker, folate helps
      as a differential, and active B12 helps separate overlapping methylation deficiency.
