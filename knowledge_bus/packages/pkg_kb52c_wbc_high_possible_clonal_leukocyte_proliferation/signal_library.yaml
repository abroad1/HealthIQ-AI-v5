library:
  package_id: KBP-4786
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C Wave A — Wbc High Possible Clonal Leukocyte Proliferation
  description: Ingested from inv_wbc_high_possible_clonal_leukocyte_proliferation
    (Batch_7_Pass_3.json). KB-S52C Wave A resolver-clean tranche.
signals:
- signal_id: signal_wbc_high
  name: Wbc High Possible Clonal Leukocyte Proliferation
  description: A high white blood cell count can also reflect clonal hematologic proliferation,
    particularly when reactive explanations are not supported by accompanying data.
  system: hematologic
  primary_metric: white_blood_cells
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: crp
    expected_direction: any
    role: differential_marker
    availability: common
    rationale: Absent inflammatory corroboration weakens a reactive leukocytosis frame
      and can increase relative concern for clonal causes.
  - biomarker_id: neutrophils
    expected_direction: any
    role: corroborator
    availability: common
    rationale: An abnormal neutrophil pattern can accompany clonal myeloid proliferation,
      though it is not specific.
  - biomarker_id: platelets
    expected_direction: any
    role: corroborator
    availability: common
    rationale: Concurrent platelet abnormalities can support a broader marrow or myeloproliferative
      process rather than isolated reactive leukocytosis.
  dependencies:
    biomarkers:
    - crp
    - neutrophils
    - platelets
    - white_blood_cells
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_wbc_high_lab_range_activation_placeholder
    metric_id: white_blood_cells
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_wbc_high_with_abnormal_plt
    resulting_state: at_risk
    description: Escalate when leukocytosis is accompanied by an elevated platelet
      count, as concurrent myeloid and megakaryocytic expansion increases concern
      for a clonal myeloproliferative process rather than a purely reactive cause.
    conditions:
    - metric_id: platelets
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_clonal_leukocytosis_review_2024
  output:
    signal_value: white_blood_cells
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: white_blood_cells
    supporting_markers:
    - crp
    - neutrophils
    - platelets
  explanation:
    mechanism: Clonal leukocytosis reflects dysregulated expansion of marrow-derived
      white cell populations rather than purely reactive mobilisation.
    biological_pathway: Myeloid or lymphoid proliferation, marrow-driven cell-line
      expansion, and loss of normal reactive regulation of circulating leukocyte numbers.
    interpretation: A clonal frame becomes more plausible when inflammatory corroboration
      is lacking and platelet or differential-count abnormalities suggest broader
      marrow involvement.
    implications: This finding may justify repeat testing, blood film review, and
      hematology-directed assessment when reactive explanations remain weak.
    supporting_marker_roles: CRP helps exclude reactive inflammation, neutrophil pattern
      provides broader leukocyte context, and platelet abnormalities corroborate possible
      marrow involvement.
