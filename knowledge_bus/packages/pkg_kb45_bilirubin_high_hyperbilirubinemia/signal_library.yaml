library:
  package_id: KBP-2506
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S45d Bilirubin Investigation Signal Library
  description: 'Regenerated from investigation-spec-collection-batch1-10.json. KB-S45d regenerated package: bilirubin high
    / hyperbilirubinemia (inv_bilirubin_high, batch-1).'
signals:
- signal_id: signal_hyperbilirubinemia
  name: Hyperbilirubinemia
  description: 'Total bilirubin elevation reflects hepatocellular dysfunction, cholestasis, or pre-hepatic hemolysis depending
    on the overall liver panel pattern.

    '
  system: hepatic
  primary_metric: bilirubin
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: alt
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: ALT elevation suggests hepatocellular injury as the underlying driver of hyperbilirubinemia.
  - biomarker_id: alp
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: ALP elevation suggests cholestasis or mechanical obstruction of the biliary tree.
  dependencies:
    biomarkers:
    - bilirubin
    - alt
    - alp
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_bilirubin_lab_range_activation_placeholder
    metric_id: bilirubin
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_liver_injury_pattern
    description: Escalate if ALT or ALP is above the laboratory upper bound alongside high bilirubin.
    conditions:
    - metric_id: alt
      condition_type: any_of
      comparator_type: lab_range_boundary
      boundary: above_max
    - metric_id: alp
      condition_type: any_of
      comparator_type: lab_range_boundary
      boundary: above_max
    resulting_state: at_risk
    source_refs:
    - source_acg_liver_2017
  output:
    signal_value: bilirubin
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: bilirubin
    supporting_markers:
    - alt
    - alp
  explanation:
    mechanism: 'Bilirubin accumulates when hepatic uptake, conjugation, or biliary excretion is impaired, or when hemolysis
      increases production.

      '
    biological_pathway: 'Hepatocyte injury and cholestasis change transaminase and alkaline phosphatase patterns alongside
      pigment levels.

      '
    interpretation: 'Elevated bilirubin with discordant enzyme patterns points toward different anatomic levels of liver and
      biliary disease.

      '
    implications: 'Combined hepatocellular and cholestatic enzyme abnormalities raise urgency for structured hepatobiliary
      evaluation.

      '
    supporting_marker_roles: 'ALT emphasizes cytosolic injury while ALP highlights bile flow limitation when elevated relative
      to reference.

      '
