library:
  package_id: KBP-4825
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S60 Lipid / Derived — Tc Hdl Ratio High Atherogenic Discordance Pattern
  description: Ingested from inv_tc_hdl_ratio_high_atherogenic_discordance_pattern (lipid_derived_pass_3.json).
    KB-S60 lipid / derived tranche.
signals:
- signal_id: signal_tc_hdl_ratio_high
  name: Tc Hdl Ratio High Atherogenic Discordance Pattern
  description: A high total cholesterol:HDL ratio reflects an unfavorable cholesterol distribution
    and can reveal atherogenic discordance even when total cholesterol is not markedly elevated.
  system: lipid_transport
  primary_metric: tc_hdl_ratio
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: total_cholesterol
    expected_direction: high
    role: corroborator
    availability: common
    rationale: High total cholesterol strengthens the inference that a high ratio reflects
      clinically important cholesterol burden rather than a marginal ratio shift.
  - biomarker_id: ldl_cholesterol
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: High LDL cholesterol helps distinguish apoB-rich atherogenic burden from ratio
      elevation driven mainly by low HDL or broader cardiometabolic context.
  dependencies:
    biomarkers:
    - ldl_cholesterol
    - tc_hdl_ratio
    - total_cholesterol
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_tc_hdl_ratio_high_lab_range_activation_placeholder
    metric_id: tc_hdl_ratio
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_tc_hdl_ratio_high_with_high_total_cholesterol
    resulting_state: at_risk
    description: Escalate when TC:HDL ratio is high and total cholesterol is also high, because
      this combination is more consistent with clinically relevant atherogenic dyslipidaemia
      than with an isolated ratio disturbance.
    conditions:
    - metric_id: total_cholesterol
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_tc_hdl_aric_2019
    - source_tc_hdl_womens_followup_2021
    - source_nice_lipid_modification_2023
  output:
    signal_value: tc_hdl_ratio
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: tc_hdl_ratio
    supporting_markers:
    - total_cholesterol
    - ldl_cholesterol
  explanation:
    mechanism: The TC:HDL ratio rises when total cholesterol is high relative to HDL, signaling
      that protective reverse-cholesterol-transport capacity is not keeping pace with the
      overall cholesterol burden.
    biological_pathway: Lipoprotein balance, reverse cholesterol transport, insulin-resistant
      dyslipidaemia, and atherosclerotic particle exposure pathways.
    interpretation: A high ratio is best read as an unfavorable cholesterol-distribution signal
      rather than as a replacement for the rest of the lipid profile.
    implications: This pattern may justify fuller risk stratification and lifestyle or lipid-lowering
      intensification review, especially when cardiometabolic risk factors cluster.
    supporting_marker_roles: High total cholesterol corroborates greater overall cholesterol
      burden, while high LDL cholesterol acts as a differential marker that helps separate
      apoB-rich atherogenic dyslipidaemia from lower-HDL-predominant ratio elevation.
