library:
  package_id: KBP-4749
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C Wave A — Ggt High Alcohol Or Enzyme Induction Context
  description: Ingested from inv_ggt_high_alcohol_or_enzyme_induction_context (Batch_6_Pass_3.json).
    KB-S52C Wave A resolver-clean tranche.
signals:
- signal_id: signal_ggt_high
  name: Ggt High Alcohol Or Enzyme Induction Context
  description: GGT is inducible by alcohol and some medications, so isolated elevation
    often requires context rather than direct disease attribution.
  system: hepatic
  primary_metric: ggt
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: alp
    expected_direction: any
    role: differential_marker
    availability: common
    rationale: Normal ALP weakens a cholestatic explanation and makes isolated enzyme
      induction relatively more plausible.
  - biomarker_id: mcv
    expected_direction: high
    role: corroborator
    availability: common
    rationale: Higher MCV can support a chronic alcohol-related biochemical context,
      although it is not specific.
  - biomarker_id: alt
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: ALT helps assess whether there is concurrent hepatocellular injury
      rather than isolated GGT induction.
  dependencies:
    biomarkers:
    - alp
    - alt
    - ggt
    - mcv
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_ggt_high_lab_range_activation_placeholder
    metric_id: ggt
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_ggt_high_with_high_mcv
    resulting_state: at_risk
    description: Escalate when GGT is high and MCV is also high because the combination
      can support a more persistent exposure-related or chronic liver-stress context
      than an isolated GGT rise.
    conditions:
    - metric_id: mcv
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_ggt_induction_review
  output:
    signal_value: ggt
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: ggt
    supporting_markers:
    - alp
    - mcv
    - alt
  explanation:
    mechanism: GGT can rise through microsomal enzyme induction as well as hepatobiliary
      injury.
    biological_pathway: A normal ALP helps distinguish isolated induction from a stronger
      cholestatic pattern.
    interpretation: High GGT is non-specific and should not be treated as a stand-alone
      alcohol biomarker.
    implications: This pattern may justify review of alcohol exposure and medications
      before assuming structural liver disease.
    supporting_marker_roles: ALP is the key differential, ALT provides liver-pattern
      context, and MCV can offer supportive context in chronic alcohol-related biochemical
      patterns.
