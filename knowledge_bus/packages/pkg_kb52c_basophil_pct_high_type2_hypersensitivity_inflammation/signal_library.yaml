signals:
- signal_id: signal_basophil_pct_high
  name: Basophil Pct High Type2 Hypersensitivity Inflammation
  description: Raised basophil percentage values can support a type 2 inflammatory
    or hypersensitivity context when persistent and interpreted with other allergic
    markers.
  system: inflammatory
  primary_metric: basophil_pct
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: eosinophils_abs
    expected_direction: high
    role: corroborator
    availability: common
    rationale: Concurrent eosinophilia supports a type 2 inflammatory or allergic
      immune pattern.
  - biomarker_id: total_ige
    expected_direction: high
    role: mechanism_marker
    availability: optional
    rationale: Elevated IgE can support allergic sensitisation as a driver of persistent
      basophil elevation.
  - biomarker_id: white_blood_cells
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: A broader leukocytosis can indicate a hematologic proliferative process
      rather than isolated allergic inflammation.
  dependencies:
    biomarkers:
    - basophil_pct
    - eosinophils_abs
    - total_ige
    - white_blood_cells
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_basophil_pct_high_lab_range_activation_placeholder
    metric_id: basophil_pct
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_basophil_pct_high_with_type2_support
    resulting_state: at_risk
    description: Escalate when basophils are high with corroborating type 2 inflammatory
      markers rather than as an isolated transient change.
    conditions:
    - metric_id: eosinophils_abs
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_basophilia_statpearls
    - source_basophils_review
  output:
    signal_value: basophil_pct
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: basophil_pct
    supporting_markers:
    - eosinophils_abs
    - total_ige
    - white_blood_cells
  explanation:
    mechanism: Basophils participate in IgE-mediated and type 2 inflammatory responses
      through mediator release and cytokine signalling.
    biological_pathway: Allergic sensitisation, hypersensitivity activation, and some
      chronic inflammatory states can increase circulating basophil counts or proportions.
    interpretation: Basophil elevation is supportive rather than diagnostic and is
      most useful when persistent and accompanied by other type 2 inflammatory markers.
    implications: This pattern may justify review of allergic, parasitic, or chronic
      inflammatory context, while keeping hematologic differentials in view.
    supporting_marker_roles: Eosinophils corroborate a type 2 immune pattern, IgE
      supports allergic mechanism, and white cell count helps distinguish isolated
      immune activation from broader proliferative disorders.
