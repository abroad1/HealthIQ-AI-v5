library:
  package_id: KBP-4709
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S47 Eosinophils Abs High signal library
  description: Translated from inv_eosinophils_abs_high_reactive_eosinophilic_inflammation
    (Batch_2_Pass_3_Rev1.json).
signals:
- signal_id: signal_eosinophils_abs_high
  name: Eosinophils Abs High
  description: Absolute eosinophil count is the preferred laboratory measure for confirming
    true eosinophilia and is more informative than eosinophil percentage alone.
  system: inflammatory
  primary_metric: eosinophils_abs
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: total_ige
    expected_direction: high
    role: contextual_marker
    availability: optional
    rationale: High IgE supports an atopic or allergic mechanism for true eosinophilic
      expansion.
  - biomarker_id: tryptase
    expected_direction: high
    role: differential_marker
    availability: specialist
    rationale: Tryptase helps distinguish common reactive eosinophilia from a clonal
      or myeloid-associated eosinophilic process.
  dependencies:
    biomarkers:
    - eosinophils_abs
    - total_ige
    - tryptase
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: eosinophils_abs_high_lab_range_activation_placeholder
    metric_id: eosinophils_abs
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_eosinophils_abs_high_with_ige_high
    resulting_state: at_risk
    description: Escalate when high absolute eosinophils coincide with high total
      IgE, as this more strongly supports a type 2 or atopic eosinophilic context.
    conditions:
    - metric_id: total_ige
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_eosinophilia_review_2020
  output:
    signal_value: eosinophils_abs
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: eosinophils_abs
    supporting_markers:
    - total_ige
    - tryptase
  explanation:
    mechanism: Absolute eosinophilia reflects increased eosinophil production, survival,
      or recruitment under immune stimulation.
    biological_pathway: Bone marrow eosinophilopoiesis and peripheral eosinophil activation
      within type 2 and related immune pathways.
    interpretation: Confirmed absolute eosinophilia tends to carry more interpretive
      weight than an isolated eosinophil percentage change, though the etiology remains
      broad and requires structured review.
    implications: The main task is to determine whether the pattern is reactive and
      common or part of a more persistent eosinophilic disease process.
    supporting_marker_roles: Total IgE supports an atopic mechanism, while tryptase
      is the differential marker that helps separate common reactive eosinophilia
      from clonal eosinophilic disease.
