library:
  package_id: KBP-4711
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S47 Fai Low signal library
  description: Translated from inv_fai_low_reduced_free_androgen_availability (Batch_2_Pass_3_Rev1.json).
signals:
- signal_id: signal_fai_low
  name: Fai Low
  description: A low free androgen index can support reduced bioavailable androgen
    exposure but should be interpreted with sex, age, SHBG, and assay context.
  system: hormonal
  primary_metric: fai
  trigger_direction: low
  supporting_metrics:
  - biomarker_id: testosterone
    expected_direction: low
    role: corroborator
    availability: common
    rationale: Low total testosterone corroborates that a low FAI may reflect reduced
      overall androgen supply rather than isolated calculation noise.
  - biomarker_id: free_testosterone
    expected_direction: low
    role: differential_marker
    availability: specialist
    rationale: Measured free testosterone helps distinguish a clinically meaningful
      low-androgen state from an FAI reduction driven mainly by SHBG distortion.
  - biomarker_id: shbg
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: High SHBG directly reduces the calculated free androgen index by increasing
      the bound fraction of total testosterone.
  dependencies:
    biomarkers:
    - fai
    - testosterone
    - free_testosterone
    - shbg
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: fai_low_lab_range_activation_placeholder
    metric_id: fai
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_fai_low_with_shbg_high
    resulting_state: at_risk
    description: Escalate when low FAI coincides with high SHBG, as this more strongly
      supports a true reduction in calculated free androgen availability.
    conditions:
    - metric_id: shbg
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_testosterone_guideline_2018
  output:
    signal_value: fai
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: fai
    supporting_markers:
    - testosterone
    - free_testosterone
    - shbg
  explanation:
    mechanism: FAI falls when total testosterone drops, SHBG rises, or both occur
      together.
    biological_pathway: Androgen production, circulating binding to SHBG, and calculated
      free androgen availability.
    interpretation: A low FAI can support reduced androgen availability but is not
      sufficient on its own to define gonadal failure or clinically significant androgen
      deficiency.
    implications: The next step is to determine whether the index is being driven
      mainly by low androgen production or by altered SHBG.
    supporting_marker_roles: Total testosterone corroborates reduced androgen supply,
      while measured free testosterone is the differential marker that separates true
      low bioavailable androgen exposure from SHBG-driven FAI distortion.
