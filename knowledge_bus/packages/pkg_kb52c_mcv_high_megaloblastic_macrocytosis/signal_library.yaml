library:
  package_id: KBP-4770
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C Wave A — Mcv High Megaloblastic Macrocytosis
  description: Ingested from inv_mcv_high_megaloblastic_macrocytosis (Batch_6_Pass_3.json).
    KB-S52C Wave A resolver-clean tranche.
signals:
- signal_id: signal_mcv_high
  name: Mcv High Megaloblastic Macrocytosis
  description: MCV reflects average erythrocyte size and high values indicate macrocytosis,
    not a specific diagnosis by themselves.
  system: hematologic
  primary_metric: mcv
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: folate
    expected_direction: low
    role: mechanism_marker
    availability: common
    rationale: Low folate supports megaloblastic macrocytosis from impaired DNA synthesis.
  - biomarker_id: active_b12
    expected_direction: low
    role: corroborator
    availability: common
    rationale: Low active B12 supports a cobalamin-related megaloblastic contribution.
  - biomarker_id: ggt
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: High GGT supports an alcohol-related or hepatic non-megaloblastic alternative
      to hematinic deficiency.
  dependencies:
    biomarkers:
    - active_b12
    - folate
    - ggt
    - mcv
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_mcv_high_lab_range_activation_placeholder
    metric_id: mcv
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_mcv_high_with_low_active_b12
    resulting_state: at_risk
    description: Escalate when MCV is high and active B12 is low because the combination
      supports clinically relevant megaloblastic macrocytosis rather than isolated
      macrocytosis of uncertain cause.
    conditions:
    - metric_id: active_b12
      operator: <
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: below_min
    source_refs:
    - source_macrocytosis_review
  output:
    signal_value: mcv
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: mcv
    supporting_markers:
    - folate
    - active_b12
    - ggt
  explanation:
    mechanism: Macrocytosis arises from impaired DNA synthesis, altered membrane composition,
      reticulocytosis, or marrow dysplasia.
    biological_pathway: Folate and active B12 help identify megaloblastic causes,
      while GGT or liver enzymes help distinguish non-megaloblastic hepatic or alcohol-related
      macrocytosis.
    interpretation: High MCV is clinically useful because it narrows anemia interpretation
      even when hemoglobin remains normal.
    implications: This pattern may justify hematinic and liver review before assuming
      marrow disease.
    supporting_marker_roles: Folate and active B12 are the main mechanism markers,
      while GGT helps as a differential for non-megaloblastic macrocytosis.
