library:
  package_id: KBP-4829
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S61 Transferrin — Transferrin High Iron Deficiency Transport Upregulation
  description: Ingested from inv_transferrin_high_iron_deficiency_transport_upregulation (transferrin_pass_3.json).
    KB-S61 transferrin tranche.
signals:
- signal_id: signal_transferrin_high
  name: Transferrin High Iron Deficiency Transport Upregulation
  description: High transferrin frequently reflects compensatory upregulation of iron-transport
    capacity when body iron availability is reduced.
  system: hematologic
  primary_metric: transferrin
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: ferritin
    expected_direction: low
    role: corroborator
    availability: common
    rationale: Low ferritin supports depleted iron stores rather than a nonspecific isolated
      rise in transferrin.
  - biomarker_id: mch
    expected_direction: low
    role: mechanism_marker
    availability: common
    rationale: Low MCH supports that reduced iron availability is affecting erythrocyte hemoglobinization,
      consistent with functional iron deficiency downstream of the transport upregulation.
  - biomarker_id: transferrin_saturation
    expected_direction: low
    role: severity_marker
    availability: specialist
    rationale: Low transferrin saturation quantifies the degree to which available iron-binding
      capacity is unfilled, indicating the functional severity of iron-transport upregulation
      relative to actual iron supply.
  - biomarker_id: rdw_cv
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: High RDW-CV favors evolving iron deficiency or mixed deficiency over a non-deficiency
      cause of high transferrin, such as pregnancy or oestrogen effect, by indicating erythrocyte
      size heterogeneity from iron-restricted production.
  dependencies:
    biomarkers:
    - ferritin
    - mch
    - rdw_cv
    - transferrin
    - transferrin_saturation
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_transferrin_high_lab_range_activation_placeholder
    metric_id: transferrin
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_transferrin_high_with_low_ferritin_and_high_rdw_cv
    resulting_state: at_risk
    description: Escalate when transferrin is high with ferritin below the laboratory minimum
      and RDW-CV above the laboratory maximum, as this combination is consistent with clinically
      relevant iron deficiency.
    conditions:
    - metric_id: ferritin
      operator: <
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: below_min
    - metric_id: rdw_cv
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_biochemistry_transferrin_2025
    - source_iron_deficiency_adults_review_2025
  output:
    signal_value: transferrin
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: transferrin
    supporting_markers:
    - ferritin
    - mch
    - transferrin_saturation
    - rdw_cv
  explanation:
    mechanism: Transferrin rises when hepatic iron-transport protein production increases
      in response to reduced available iron, expanding circulating binding capacity to facilitate
      capture of dietary or recycled iron.
    biological_pathway: Hepatic transferrin synthesis, iron transport homeostasis, transferrin
      saturation dynamics, and iron-restricted erythropoiesis pathways.
    interpretation: A high transferrin result is consistent with an iron-deficiency-type transport
      response, but it yields greater clinical utility when ferritin, transferrin saturation,
      and CBC indices are reviewed alongside it to assess store depletion and functional erythropoietic
      impact.
    implications: This pattern may warrant a full iron-status assessment and a review of potential
      bleeding, malabsorption, or increased-demand contexts, rather than interpreting transferrin
      in isolation.
    supporting_marker_roles: Low ferritin corroborates depleted iron stores; low MCH supports
      erythropoietic impact from iron restriction; low transferrin saturation quantifies the
      severity of unfilled binding capacity; and high RDW-CV acts as a differential marker
      favoring evolving deficiency over a non-deficiency or physiological transferrin rise.
