library:
  package_id: KBP-4700
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S47 Eosinophil Pct High signal library
  description: Translated from inv_eosinophil_pct_high_secondary_or_systemic_eosinophilia
    (Batch_2_Pass_3_Rev1.json).
signals:
- signal_id: signal_eosinophil_pct_high
  name: Eosinophil Pct High
  description: Marked eosinophil percentage elevation can signal broader eosinophilic
    disease processes, but percentage alone is insufficient for attribution.
  system: inflammatory
  primary_metric: eosinophil_pct
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: eosinophils_abs
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: Absolute eosinophils are required to distinguish clinically meaningful
      eosinophilia from a percentage-only differential shift.
  - biomarker_id: crp
    expected_direction: high
    role: contextual_marker
    availability: common
    rationale: CRP can support a broader active inflammatory context once true eosinophilia
      has been confirmed.
  dependencies:
    biomarkers:
    - eosinophil_pct
    - eosinophils_abs
    - crp
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: eosinophil_pct_high_lab_range_activation_placeholder
    metric_id: eosinophil_pct
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_eosinophil_pct_high_with_crp_high
    resulting_state: at_risk
    description: Escalate when high eosinophil percentage coincides with high CRP,
      as this supports a more active systemic inflammatory context.
    conditions:
    - metric_id: crp
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_eosinophilia_review_2020
  output:
    signal_value: eosinophil_pct
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: eosinophil_pct
    supporting_markers:
    - eosinophils_abs
    - crp
  explanation:
    mechanism: Sustained eosinophilic expansion can occur in response to allergic,
      infectious, drug-related, or clonal immune stimuli.
    biological_pathway: Eosinophil production, recruitment, and activation within
      reactive and systemic eosinophilic inflammatory pathways.
    interpretation: A raised eosinophil percentage can justify broader review only
      when true eosinophilia is confirmed and the clinical pattern supports it.
    implications: The next step is usually focused confirmation and secondary-cause
      review rather than immediate assignment of a rare eosinophilic syndrome.
    supporting_marker_roles: Absolute eosinophils are the core differential marker
      that determines whether the percentage abnormality is real, while CRP supports
      a broader systemic inflammatory frame.
