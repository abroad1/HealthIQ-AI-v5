library:
  package_id: KBP-2509
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S45d Cortisol Investigation Signal Library
  description: 'Regenerated from investigation-spec-collection-batch1-10.json. KB-S45d regenerated package: cortisol high
    / hypercortisolism (inv_cortisol_high, batch-1).'
signals:
- signal_id: signal_hypercortisolism
  name: Morning cortisol elevation context
  description: 'Morning cortisol reflects HPA axis tone; high values can indicate sustained glucocorticoid excess or acute
    stress and require confirmatory testing in clinic.

    '
  system: hormonal
  primary_metric: cortisol
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: potassium
    expected_direction: low
    role: mechanism_marker
    availability: common
    rationale: Severe cortisol excess can exert mineralocorticoid effects, leading to clinical hypokalemia.
  - biomarker_id: hba1c
    expected_direction: high
    role: severity_marker
    availability: common
    rationale: Cortisol is a counter-regulatory hormone that increases blood glucose levels over sustained periods.
  dependencies:
    biomarkers:
    - cortisol
    - potassium
    - hba1c
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_cortisol_lab_range_activation_placeholder
    metric_id: cortisol
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_electrolyte_impact
    description: Escalate if cortisol is high while potassium is below the laboratory lower bound.
    conditions:
    - metric_id: potassium
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: below_min
    resulting_state: at_risk
    source_refs:
    - source_endocrine_cushing_2015
  output:
    signal_value: cortisol
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: cortisol
    supporting_markers:
    - potassium
    - hba1c
  explanation:
    mechanism: 'Cortisol influences gluconeogenesis, vascular tone, and mineralocorticoid-like effects at high sustained exposure.

      '
    biological_pathway: 'The hypothalamic-pituitary-adrenal axis sets diurnal cortisol rhythm and stress responsiveness.

      '
    interpretation: 'Isolated morning elevations are nonspecific; metabolic corroboration increases clinical concern for sustained
      excess.

      '
    implications: 'Hypokalemia with hypercortisolism can reflect mineralocorticoid activity or renal losses in severe states.

      '
    supporting_marker_roles: 'Hemoglobin A1c tracks longer-term glycemic stress that can accompany chronic glucocorticoid
      excess.

      '
