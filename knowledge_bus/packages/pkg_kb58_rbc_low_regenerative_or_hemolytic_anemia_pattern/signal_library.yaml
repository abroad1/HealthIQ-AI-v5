library:
  package_id: KBP-4815
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S58 CBC — Rbc Low Regenerative Or Hemolytic Anemia Pattern
  description: Ingested from inv_rbc_low_regenerative_or_hemolytic_anemia_pattern (cbc_hematology_pass_3.json).
    KB-S58 CBC tranche.
signals:
- signal_id: signal_rbc_low
  name: Rbc Low Regenerative Or Hemolytic Anemia Pattern
  description: A low RBC count with discordant or highly heterogeneous red-cell indices can
    support a regenerative or hemolytic anemia pattern.
  system: hematologic
  primary_metric: rbc
  trigger_direction: low
  supporting_metrics:
  - biomarker_id: rdw_sd
    expected_direction: high
    role: corroborator
    availability: common
    rationale: High RDW-SD supports broad red-cell size dispersion often seen when mixed or
      regenerative populations circulate.
  - biomarker_id: rdw_cv
    expected_direction: high
    role: corroborator
    availability: common
    rationale: High RDW-CV reinforces genuine anisocytosis accompanying reduced erythrocyte
      number.
  - biomarker_id: mchc
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: High MCHC redirects interpretation toward spherocytic or dense-cell hemolytic
      states rather than simple nutritional anemia.
  dependencies:
    biomarkers:
    - mchc
    - rbc
    - rdw_cv
    - rdw_sd
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_rbc_low_lab_range_activation_placeholder
    metric_id: rbc
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: false
    upper_bound_state: suboptimal
    enable_lower_bound: true
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_rbc_low_with_high_rdw_sd_and_high_mchc
    resulting_state: at_risk
    description: Escalate when RBC is low with high RDW-SD and high MCHC, because that combination
      raises concern for clinically important regenerative or hemolytic red-cell loss rather
      than simple deficiency alone.
    conditions:
    - metric_id: rdw_sd
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    - metric_id: mchc
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_rdw_review_2019
    - source_hs_protocol_2021
  output:
    signal_value: rbc
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: rbc
    supporting_markers:
    - rdw_sd
    - rdw_cv
    - mchc
  explanation:
    mechanism: When red cells are lost or rapidly replaced, mixed cell populations can accumulate
      in circulation and broaden the size distribution while RBC number remains reduced.
    biological_pathway: Red-cell destruction, marrow regeneration, and mixed-population turnover
      pathways.
    interpretation: This pattern is useful mainly as a prompt to differentiate simple deficiency
      anemia from regenerative or hemolytic states.
    implications: It commonly prompts reticulocyte and hemolysis testing rather than immediate
      default attribution to iron deficiency alone.
    supporting_marker_roles: High RDW-SD and RDW-CV corroborate a mixed-population anemia,
      while high MCHC acts as a competing marker that raises concern for dense-cell or spherocytic
      physiology.
