library:
  package_id: KBP-4720
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C Wave A — Albumin Low Inflammatory Hypoalbuminemia
  description: Ingested from inv_albumin_low_inflammatory_hypoalbuminemia (Batch_4_Pass_3.json).
    KB-S52C Wave A resolver-clean tranche.
signals:
- signal_id: signal_albumin_low
  name: Albumin Low Inflammatory Hypoalbuminemia
  description: Low albumin is a nonspecific but clinically important marker that commonly
    reflects inflammation, capillary leak, or dilution rather than isolated nutritional
    deficiency alone.
  system: hepatic
  primary_metric: albumin
  trigger_direction: low
  supporting_metrics:
  - biomarker_id: crp
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: Raised CRP supports an inflammatory redistribution or acute-phase context
      when albumin is low.
  - biomarker_id: hematocrit
    expected_direction: low
    role: mechanism_marker
    availability: common
    rationale: Low hematocrit can support dilutional physiology when albumin is reduced
      in fluid-expanded states.
  - biomarker_id: uacr
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: Albuminuria helps distinguish renal protein loss from predominantly
      inflammatory or dilutional hypoalbuminemia.
  dependencies:
    biomarkers:
    - albumin
    - crp
    - hematocrit
    - uacr
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_albumin_low_lab_range_activation_placeholder
    metric_id: albumin
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: false
    upper_bound_state: suboptimal
    enable_lower_bound: true
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_albumin_low_with_crp_high
    resulting_state: at_risk
    description: Escalate when low albumin coincides with high CRP, as this more strongly
      supports a clinically active inflammatory hypoalbuminemic state.
    conditions:
    - metric_id: crp
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_hypoalbuminemia_review_2018
  output:
    signal_value: albumin
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: albumin
    supporting_markers:
    - crp
    - hematocrit
    - uacr
  explanation:
    mechanism: Albumin concentration falls when synthesis is suppressed, distribution
      shifts out of the vascular space, losses increase, or plasma volume expands.
    biological_pathway: Hepatic synthesis, intravascular oncotic balance, acute-phase
      response, and protein distribution across vascular and extravascular compartments.
    interpretation: This pattern is supportive of systemic illness, dilution, or loss
      states and should not be treated as a specific diagnosis by itself.
    implications: The next step is usually to distinguish inflammatory or dilutional
      lowering from renal, gastrointestinal, or hepatic causes of protein loss or
      reduced synthesis.
    supporting_marker_roles: CRP supports an inflammatory mechanism, hematocrit helps
      with dilutional context, and urine albumin helps separate renal loss from other
      causes.
