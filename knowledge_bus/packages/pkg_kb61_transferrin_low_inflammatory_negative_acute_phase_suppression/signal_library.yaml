library:
  package_id: KBP-4830
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S61 Transferrin — Transferrin Low Inflammatory Negative Acute Phase Suppression
  description: Ingested from inv_transferrin_low_inflammatory_negative_acute_phase_suppression
    (transferrin_pass_3.json). KB-S61 transferrin tranche.
signals:
- signal_id: signal_transferrin_low
  name: Transferrin Low Inflammatory Negative Acute Phase Suppression
  description: Low transferrin commonly reflects negative acute-phase suppression in inflammatory
    states and can contribute to functional iron-restriction patterns distinct from absolute
    iron deficiency.
  system: hematologic
  primary_metric: transferrin
  trigger_direction: low
  supporting_metrics:
  - biomarker_id: crp
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: High CRP supports an active inflammatory acute-phase response that suppresses
      transferrin as a negative acute-phase reactant via cytokine-driven hepatic reprogramming.
  - biomarker_id: ferritin
    expected_direction: high
    role: corroborator
    availability: common
    rationale: High ferritin is consistent with inflammatory iron sequestration moving in
      the opposite direction to transferrin, helping distinguish this pattern from absolute
      iron deficiency where ferritin would be low.
  - biomarker_id: rdw_cv
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: Marked RDW-CV elevation competes with a purely inflammatory suppression pattern
      by indicating erythrocyte size heterogeneity, suggesting the possibility of concurrent
      or mixed absolute iron deficiency rather than isolated functional restriction.
  dependencies:
    biomarkers:
    - crp
    - ferritin
    - rdw_cv
    - transferrin
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_transferrin_low_lab_range_activation_placeholder
    metric_id: transferrin
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: false
    upper_bound_state: suboptimal
    enable_lower_bound: true
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_transferrin_low_with_high_crp_and_high_ferritin
    resulting_state: at_risk
    description: Escalate when transferrin is low with CRP above the laboratory maximum and
      ferritin above the laboratory maximum, as this combination is consistent with inflammatory
      negative-acute-phase suppression and functional iron restriction.
    conditions:
    - metric_id: crp
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    - metric_id: ferritin
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_acute_phase_reactants_2023
    - source_biochemistry_transferrin_2025
  output:
    signal_value: transferrin
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: transferrin
    supporting_markers:
    - crp
    - ferritin
    - rdw_cv
  explanation:
    mechanism: Transferrin decreases during inflammation as hepatic protein synthesis reprioritizes
      toward positive acute-phase reactants and away from negative acute-phase proteins, mediated
      primarily by interleukin-6 and related cytokines.
    biological_pathway: Acute-phase signaling, hepcidin-mediated iron sequestration, and inflammation-associated
      iron redistribution pathways leading to functional iron restriction.
    interpretation: A low transferrin result may support an inflammatory negative-acute-phase
      pattern, but requires distinction from hepatic synthetic failure, protein loss, and
      absolute iron deficiency, which can produce similar directional changes.
    implications: This pattern may warrant correlation with CRP, ferritin, soluble transferrin
      receptor, and broader assessment for inflammatory or chronic-disease contexts.
    supporting_marker_roles: High CRP supports active cytokine-driven inflammatory suppression
      of transferrin synthesis; high ferritin corroborates iron sequestration moving in the
      expected inflammatory direction; and high RDW-CV acts as a differential marker that
      competes with a purely inflammatory explanation by suggesting mixed or absolute deficiency.
