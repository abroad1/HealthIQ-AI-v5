description: >
  KBP-0007 — Brain Metabolic Resilience (signal_brain_metabolic_resilience).
  Creation package: detects vascular-driven cognitive decline risk using ghr_index
  (Glucose-to-HDL ratio, canonical mmol/L) as primary metric and pulse_pressure
  as supporting override metric. Thresholds anchored to Farnier et al. 2021
  (ghr_index) and Mattace-Raso et al. Rotterdam Study 2004 (pulse_pressure).
  All threshold values in confirmed SSOT canonical units.
