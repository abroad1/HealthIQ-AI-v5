library:
  package_id: KBP-4799
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S58 CBC — Mchc High Spherocytic Hemolysis Pattern
  description: Ingested from inv_mchc_high_spherocytic_hemolysis_pattern (cbc_hematology_pass_3.json).
    KB-S58 CBC tranche.
signals:
- signal_id: signal_mchc_high
  name: Mchc High Spherocytic Hemolysis Pattern
  description: High MCHC is unusual and, when genuine, raises concern for dense or spherocytic
    red-cell states more than for simple nutritional anemia.
  system: hematologic
  primary_metric: mchc
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: rdw_cv
    expected_direction: high
    role: corroborator
    availability: common
    rationale: Higher RDW-CV supports accompanying red-cell heterogeneity often seen with
      hemolytic or membrane disorders.
  - biomarker_id: rbc
    expected_direction: low
    role: corroborator
    availability: common
    rationale: A reduced RBC count supports clinically relevant anemia rather than an isolated
      high index without red-cell loss.
  - biomarker_id: mch
    expected_direction: low
    role: differential_marker
    availability: common
    rationale: Low MCH redirects interpretation toward hypochromic microcytosis rather than
      dense spherocytic erythrocytes.
  dependencies:
    biomarkers:
    - mch
    - mchc
    - rbc
    - rdw_cv
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_mchc_high_lab_range_activation_placeholder
    metric_id: mchc
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_mchc_high_with_anemia_and_anisocytosis
    resulting_state: at_risk
    description: Escalate when high MCHC coexists with low RBC count and high RDW-CV, because
      that combination is more compatible with clinically relevant spherocytic or hemolytic
      pathology than an isolated index shift.
    conditions:
    - metric_id: rbc
      operator: <
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: below_min
    - metric_id: rdw_cv
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_hs_protocol_2021
    - source_hs_overview_2025
  output:
    signal_value: mchc
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: mchc
    supporting_markers:
    - rdw_cv
    - rbc
    - mch
  explanation:
    mechanism: MCHC rises when erythrocytes become relatively dense, dehydrated, or spherocytic,
      producing an increased measured hemoglobin concentration within cells.
    biological_pathway: Red-cell membrane stability, spherocyte formation, and hemolytic red-cell
      turnover pathways.
    interpretation: When confirmed, high MCHC is a selective hematology clue that can support
      spherocytic hemolysis, but it must be integrated with smear and hemolysis testing.
    implications: This pattern may justify membrane-focused testing and hemolysis work-up
      rather than empiric iron therapy or generic anemia labeling.
    supporting_marker_roles: High RDW-CV supports heterogeneity, low RBC count supports clinically
      relevant anemia, and low MCH acts as a competing marker that redirects toward hypochromic
      microcytosis.
