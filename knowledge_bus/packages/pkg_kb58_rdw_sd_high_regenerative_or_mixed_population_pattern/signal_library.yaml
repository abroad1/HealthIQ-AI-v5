library:
  package_id: KBP-4803
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S58 CBC — Rdw Sd High Regenerative Or Mixed Population Pattern
  description: Ingested from inv_rdw_sd_high_regenerative_or_mixed_population_pattern (cbc_hematology_pass_3.json).
    KB-S58 CBC tranche.
signals:
- signal_id: signal_rdw_sd_high
  name: Rdw Sd High Regenerative Or Mixed Population Pattern
  description: High RDW-SD can also reflect broad absolute size dispersion from regeneration,
    hemolysis, or admixture of erythrocyte populations.
  system: hematologic
  primary_metric: rdw_sd
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: rdw_cv
    expected_direction: high
    role: corroborator
    availability: common
    rationale: Concurrent RDW-CV elevation supports true anisocytosis across both RDW measures.
  - biomarker_id: mchc
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: Higher MCHC redirects toward dense-cell or spherocytic hemolytic physiology
      rather than simple deficiency.
  - biomarker_id: rbc
    expected_direction: low
    role: corroborator
    availability: common
    rationale: Low RBC count supports clinically relevant anemia when mixed red-cell populations
      are suspected.
  dependencies:
    biomarkers:
    - mchc
    - rbc
    - rdw_cv
    - rdw_sd
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_rdw_sd_high_lab_range_activation_placeholder
    metric_id: rdw_sd
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_rdw_sd_high_with_high_mchc
    resulting_state: at_risk
    description: Escalate when high RDW-SD coexists with high MCHC, because that pattern is
      more compatible with clinically relevant dense-cell or hemolytic heterogeneity than
      with isolated borderline anisocytosis.
    conditions:
    - metric_id: mchc
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_rdw_review_2019
    - source_hs_protocol_2021
  output:
    signal_value: rdw_sd
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: rdw_sd
    supporting_markers:
    - rdw_cv
    - mchc
    - rbc
  explanation:
    mechanism: RDW-SD broadens when differently sized erythrocytes coexist in circulation,
      whether from destruction, replacement, or recovery.
    biological_pathway: Red-cell turnover, marrow response, and transitional erythrocyte population
      kinetics.
    interpretation: A raised RDW-SD result should prompt discrimination between deficiency-related
      anisocytosis and broader regenerative or mixed-population states.
    implications: This pattern may justify hemolysis testing, reticulocyte assessment, and
      review of recent treatment or transfusion history.
    supporting_marker_roles: RDW-CV corroborates genuine anisocytosis, high MCHC redirects
      toward dense-cell pathology, and low RBC count supports clinically meaningful anemia.
