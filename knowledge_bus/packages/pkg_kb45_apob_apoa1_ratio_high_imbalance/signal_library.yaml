    imbalance (inv_apob_apoa1_ratio_high, batch-1).'
signals:
- signal_id: signal_lipid_imbalance
  name: ApoB-to-ApoA1 ratio imbalance
  description: 'The ApoB-to-ApoA1 ratio contrasts pro-atherogenic particle load with HDL-related anti-atherogenic capacity
    in circulation.

    '
  system: lipid_transport
  primary_metric: apob_apoa1_ratio
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: crp
    expected_direction: high
    role: severity_marker
    availability: optional
    rationale: Systemic inflammation (CRP) acts synergistically with lipid imbalance to increase total vascular risk.
  dependencies:
    biomarkers:
    - crp
    - apob
    - apoa1
    derived_metrics:
    - apob_apoa1_ratio
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_apob_apoa1_ratio_lab_range_activation_placeholder
    metric_id: apob_apoa1_ratio
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_ratio_plus_inflammation
    description: Escalate if the ratio is high alongside CRP above the laboratory upper bound.
    conditions:
    - metric_id: crp
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    resulting_state: at_risk
    source_refs:
    - source_interheart_2004
  output:
    signal_value: apob_apoa1_ratio
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: apob_apoa1_ratio
    supporting_markers:
    - crp
  explanation:
    mechanism: 'The ratio integrates particle number risk (ApoB) against reverse transport capacity (ApoA1-linked HDL).

      '
    biological_pathway: 'Lipoprotein metabolism couples hepatic production, peripheral exchange, and inflammatory states that
      modify particle composition.

      '
    interpretation: 'A higher ratio suggests atherogenic dominance relative to protective transport capacity for the measured
      assay context.

      '
    implications: 'Systemic inflammation can amplify vascular risk when combined with an adverse lipoprotein balance.

      '
    supporting_marker_roles: 'CRP marks inflammatory stress that can synergize with lipid imbalance to raise overall risk
      concern.

      '
