physiological_claim: TSH is released by the anterior pituitary. It exhibits a log-linear
  relationship with FT4, meaning small changes in T4 cause large changes in TSH.
evidence_strength: strong
research_summary: A TSH > 10 mIU/L is a widely accepted threshold for initiating treatment
  in subclinical hypothyroidism to prevent cardiovascular complications.
