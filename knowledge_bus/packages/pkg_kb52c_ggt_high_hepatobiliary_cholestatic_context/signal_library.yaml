library:
  package_id: KBP-4750
  schema_version: 2.0.0
  package_version: 1.0.0
  library_name: KB-S52C Wave A — Ggt High Hepatobiliary Cholestatic Context
  description: Ingested from inv_ggt_high_hepatobiliary_cholestatic_context (Batch_6_Pass_3.json).
    KB-S52C Wave A resolver-clean tranche.
signals:
- signal_id: signal_ggt_high
  name: Ggt High Hepatobiliary Cholestatic Context
  description: GGT is a hepatobiliary enzyme whose elevation is most informative when
    interpreted alongside ALP and broader liver context.
  system: hepatic
  primary_metric: ggt
  trigger_direction: high
  supporting_metrics:
  - biomarker_id: alp
    expected_direction: high
    role: differential_marker
    availability: common
    rationale: Elevated ALP alongside GGT supports a hepatobiliary or cholestatic
      source rather than isolated enzyme induction alone.
  - biomarker_id: bilirubin
    expected_direction: high
    role: corroborator
    availability: common
    rationale: Concurrent bilirubin elevation can indicate greater cholestatic significance
      or more clinically important biliary obstruction.
  - biomarker_id: alt
    expected_direction: high
    role: mechanism_marker
    availability: common
    rationale: ALT helps show whether the overall pattern is mixed hepatocellular-cholestatic
      rather than predominantly cholestatic.
  dependencies:
    biomarkers:
    - alp
    - alt
    - bilirubin
    - ggt
    derived_metrics: []
    signals: []
  optional_dependencies:
    biomarkers: []
    derived_metrics: []
    signals: []
  thresholds:
  - threshold_id: signal_ggt_high_lab_range_activation_placeholder
    metric_id: ggt
    operator: '>='
    value: 9999.0
    severity: at_risk
    description: Validator placeholder; runtime activation uses lab_range_exceeded.
  activation_logic: lab_range_exceeded
  activation_config:
    enable_upper_bound: true
    upper_bound_state: suboptimal
    enable_lower_bound: false
    lower_bound_state: suboptimal
  override_rules:
  - rule_id: or_ggt_high_with_high_alp
    resulting_state: at_risk
    description: Escalate when GGT and ALP are both high because the combination more
      strongly supports a clinically relevant hepatobiliary pattern than isolated
      GGT elevation.
    conditions:
    - metric_id: alp
      operator: '>'
      condition_type: all_of
      comparator_type: lab_range_boundary
      boundary: above_max
    source_refs:
    - source_ggt_cholestasis_review
  output:
    signal_value: ggt
    signal_state: at_risk
    confidence: confidence_model_v1
    primary_metric: ggt
    supporting_markers:
    - alp
    - bilirubin
    - alt
  explanation:
    mechanism: GGT rises with biliary epithelial and hepatocyte enzyme induction and
      is often used to support hepatic origin of alkaline phosphatase elevation.
    biological_pathway: Concurrent ALP elevation is a key differential feature when
      cholestatic or obstructive patterns are suspected.
    interpretation: High GGT is non-specific but clinically useful as a contextual
      liver-pattern marker.
    implications: This pattern may justify liver-pattern evaluation rather than interpretation
      of GGT in isolation.
    supporting_marker_roles: ALP provides the main differential, bilirubin supports
      cholestatic severity, and ALT helps distinguish hepatocellular from predominantly
      cholestatic patterns.
